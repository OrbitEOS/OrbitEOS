name: Deploy Core to Rockchip

on:
  push:
    branches: [ main ]
    paths:
      - 'orbiteos-core/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orbiteos-core

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        token: ${{ secrets.GH_PAT }}

    - name: Copy files to Core Server (Rockchip)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.CORE_HOST }}
        username: ${{ secrets.CORE_USERNAME }}
        password: ${{ secrets.CORE_PASSWORD }}
        # key: ${{ secrets.CORE_SSH_KEY }} # Usage of key is recommended over password
        source: "orbiteos-core/*"
        target: "~/orbiteos-core"
        strip_components: 1

    - name: Deploy with Docker Compose
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.CORE_HOST }}
        username: ${{ secrets.CORE_USERNAME }}
        password: ${{ secrets.CORE_PASSWORD }}
        # key: ${{ secrets.CORE_SSH_KEY }}
        script: |
          # Aggressive Cleanup: Stop and remove ALL existing containers to ensure clean slate
          echo "Stopping and removing all existing Docker containers..."
          if [ -n "$(docker ps -aq)" ]; then
            docker stop $(docker ps -aq) || true
            docker rm $(docker ps -aq) || true
          fi
          
          echo "Pruning unused Docker objects..."
          docker system prune -f || true

          cd ~/orbiteos-core
          # Ensure directories exist
          mkdir -p config data osgi-config timescaledb-data influxdb2-data grafana-data keycloak-data

          # Check if docker is running
          if ! docker info > /dev/null 2>&1; then
            echo "Docker is not running or current user cannot access it."
            exit 1
          fi

          echo "Deploying OrbitEOS Core Stack..."
          docker compose up -d --build --remove-orphans
          
          echo "Pruning unused images to save space..."
          docker image prune -f

          # Wait for cloudflared to generate the Quick Tunnel URL
          echo "Waiting for Cloudflare Quick Tunnel URL..."
          sleep 15
          echo "=== CLOUDFLARE TUNNEL URL ==="
          docker logs openems-cloudflared 2>&1 | grep -o 'https://.*\.trycloudflare\.com' | tail -1
          echo "=== Use this URL to configure Edge connectivity ==="

