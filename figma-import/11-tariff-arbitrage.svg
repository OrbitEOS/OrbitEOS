      <rect x="0" y="0" width="275" height="4" rx="2" fill="#1a5fff"/>
      <text x="20" y="36" font-size="11" fill="#9ca3af">CURRENT PRICE</text>
      <text x="20" y="62" font-size="24" font-weight="700" fill="#111827">€0.142</text>
      <text x="110" y="62" font-size="12" fill="#9ca3af">/kWh</text>
      <text x="20" y="82" font-size="11" fill="#22c55e">▼ 23% below avg</text>

      <!-- Avg Price Today -->
      <rect x="295" y="0" width="275" height="96" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <rect x="295" y="0" width="275" height="4" rx="2" fill="#f59e0b"/>
      <text x="315" y="36" font-size="11" fill="#9ca3af">AVG PRICE TODAY</text>
      <text x="315" y="62" font-size="24" font-weight="700" fill="#111827">€0.184</text>
      <text x="405" y="62" font-size="12" fill="#9ca3af">/kWh</text>
      <text x="315" y="82" font-size="11" fill="#ef4444">▲ 8% vs yesterday</text>

