      <text x="20" y="206" font-size="10" fill="#9ca3af">€0.10</text>
      <text x="20" y="266" font-size="10" fill="#9ca3af">€0.00</text>
      <text x="20" y="316" font-size="10" fill="#9ca3af">-€0.05</text>

