      <text x="610" y="62" font-size="24" font-weight="700" fill="#22c55e">€34.20</text>
      <text x="610" y="82" font-size="11" fill="#22c55e">from optimized scheduling</text>

      <!-- Next Charge Window -->
      <rect x="885" y="0" width="267" height="96" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <rect x="885" y="0" width="267" height="4" rx="2" fill="#8b5cf6"/>
