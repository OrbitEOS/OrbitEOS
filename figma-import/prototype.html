<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrbitEOS — Interactive Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://unpkg.com/antd@5.22.6/dist/reset.css" rel="stylesheet"/>
  <style>
    :root { --sidebar-w: 240px; --sidebar-rail-w: 56px; --header-h: 56px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; height: 100vh; }

    /* Dark Theme (default) */
    [data-theme="dark"] {
      --bg-primary: #020617; --bg-secondary: #0f172a; --bg-card: #0f172a; --bg-card-hover: #1e293b;
      --bg-sidebar: #020617; --bg-header: #0f172a; --bg-input: #1e293b;
      --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-tertiary: #64748b;
      --brand: #2dd4bf; --brand-hover: #14b8a6; --brand-bg: rgba(45,212,191,0.1);
      --border: rgba(255,255,255,0.06); --border-active: rgba(255,255,255,0.12);
      --success: #22c55e; --warning: #f59e0b; --error: #ef4444; --info: #3b82f6; --purple: #8b5cf6;
      --success-bg: rgba(34,197,94,0.1); --warning-bg: rgba(245,158,11,0.1); --error-bg: rgba(239,68,68,0.1);
      --solar: #f59e0b; --wind: #06b6d4; --battery: #10b981; --grid-color: #ef4444; --ev: #8b5cf6;
      --shadow: 0 4px 12px rgba(0,0,0,0.4);
    }
    /* Light Theme */
    [data-theme="light"] {
      --bg-primary: #f8fafc; --bg-secondary: #ffffff; --bg-card: #ffffff; --bg-card-hover: #f1f5f9;
      --bg-sidebar: #ffffff; --bg-header: #ffffff; --bg-input: #f8fafc;
      --text-primary: #0f172a; --text-secondary: #64748b; --text-tertiary: #94a3b8;
      --brand: #0d9488; --brand-hover: #0f766e; --brand-bg: rgba(13,148,136,0.08);
      --border: #e2e8f0; --border-active: #cbd5e1;
      --success: #16a34a; --warning: #d97706; --error: #dc2626; --info: #2563eb; --purple: #7c3aed;
      --success-bg: rgba(22,163,74,0.08); --warning-bg: rgba(217,119,6,0.08); --error-bg: rgba(220,38,38,0.08);
      --solar: #d97706; --wind: #0891b2; --battery: #059669; --grid-color: #dc2626; --ev: #7c3aed;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }

    .app-layout { display: flex; height: 100vh; background: var(--bg-primary); }
    .sidebar { display: flex; flex-shrink: 0; transition: all 0.25s ease; height: 100vh; }
    .sidebar-rail { width: var(--sidebar-rail-w); background: var(--bg-sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; padding: 8px 0; flex-shrink: 0; }
    .sidebar-rail-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 18px; color: var(--text-tertiary);
      transition: all 0.15s; margin: 2px 0; position: relative; }
    .sidebar-rail-icon:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .sidebar-rail-icon.active { background: var(--brand-bg); color: var(--brand); }
    .sidebar-rail-icon.active::after { content: ''; position: absolute; left: -8px; top: 8px; bottom: 8px;
      width: 3px; border-radius: 2px; background: var(--brand); }
    .sidebar-rail-sep { width: 24px; height: 1px; background: var(--border); margin: 6px 0; }
    .sidebar-panel { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-panel-hidden { display: none; }
    .sidebar-entity-tree { flex: 1; overflow-y: auto; }
    .sidebar-tree-node { padding: 6px 12px; cursor: pointer; font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px; transition: all 0.12s; }
    .sidebar-tree-node:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .sidebar-tree-node.active { color: var(--brand); background: var(--brand-bg); }
    .sidebar-tree-node .tree-expand { width: 14px; text-align: center; font-size: 8px; color: var(--text-tertiary); flex-shrink: 0; }
    .sidebar-tree-node .tree-icon { font-size: 13px; flex-shrink: 0; }
    .sidebar-tree-node .tree-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-tree-node .tree-badge { font-size: 9px; color: var(--text-tertiary); background: var(--bg-secondary);
      padding: 1px 5px; border-radius: 6px; }
    .entity-context-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .sidebar-logo { padding: 16px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .sidebar-logo-icon { width: 28px; height: 28px; background: var(--brand); border-radius: 6px;
      display: flex; align-items: center; justify-content: center; }
    .sidebar-logo-icon svg { width: 16px; height: 16px; }
    .sidebar-logo span { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .sidebar-site { padding: 12px; }
    .sidebar-site-box { padding: 8px 12px; border-radius: 6px; background: var(--bg-secondary);
      border: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; }
    .sidebar-site-box:hover { border-color: var(--brand); }
    .sidebar-site-dropdown { position: absolute; left: 12px; right: 12px; top: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); z-index: 50; max-height: 300px; overflow-y: auto; }
    .sidebar-site-dropdown-item { padding: 8px 12px; cursor: pointer; font-size: 12px; color: var(--text-secondary);
      transition: background 0.15s; border-bottom: 1px solid var(--border); }
    .sidebar-site-dropdown-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .sidebar-site-dropdown-item:last-child { border-bottom: none; }
    .sidebar-site-dropdown-item.active { color: var(--brand); background: var(--brand-bg); }
    .sidebar-site-dropdown-header { padding: 6px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase;
      color: var(--text-tertiary); letter-spacing: 0.04em; background: var(--bg-secondary); }

    /* Entity tree */
    .entity-tree { padding: 0; }
    .entity-node { padding: 8px 12px; cursor: pointer; font-size: 12px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 8px; transition: all 0.15s; border-bottom: 1px solid var(--border); }
    .entity-node:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .entity-node.active { color: var(--brand); background: var(--brand-bg); }
    .entity-node-indent { display: inline-block; }
    .entity-node-icon { font-size: 14px; flex-shrink: 0; }
    .entity-node-name { flex: 1; font-weight: 500; }
    .entity-node-type { font-size: 10px; color: var(--text-tertiary); }
    .entity-node-count { font-size: 10px; color: var(--text-tertiary); background: var(--bg-secondary);
      padding: 1px 6px; border-radius: 8px; }
    .sidebar-nav { flex: 1; padding: 8px; }
    .nav-group-label { padding: 8px 12px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-tertiary); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px;
      font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s ease;
      position: relative; margin: 1px 0; }
    .nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .nav-item.active { background: var(--brand-bg); color: var(--brand); font-weight: 500; }
    .nav-item.active::before { content: ''; position: absolute; left: -8px; top: 6px; bottom: 6px;
      width: 3px; border-radius: 2px; background: var(--brand); }
    .sidebar-user { padding: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sidebar-user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand-bg);
      display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--brand); }
    .sidebar-user-info { flex: 1; }
    .sidebar-user-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .sidebar-user-role { font-size: 11px; color: var(--text-tertiary); }

    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { height: var(--header-h); background: var(--bg-header); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
    .header-left { display: flex; flex-direction: column; }
    .header-breadcrumb { font-size: 13px; color: var(--text-tertiary); }
    .header-breadcrumb strong { color: var(--text-primary); font-weight: 500; }
    .header-subtitle { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card);
      font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s ease; }
    .header-btn:hover { border-color: var(--brand); color: var(--brand); }
    .header-btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .header-btn.primary:hover { background: var(--brand-hover); }
    .alarm-bell { position: relative; cursor: pointer; padding: 6px; border-radius: 6px; transition: all 0.15s; }
    .alarm-bell:hover { background: var(--bg-card-hover); }
    .alarm-bell svg { width: 20px; height: 20px; color: var(--text-secondary); }
    .alarm-bell .badge { position: absolute; top: 2px; right: 2px; min-width: 16px; height: 16px;
      background: var(--error); color: #fff; border-radius: 8px; font-size: 10px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; padding: 0 4px; }
    @keyframes bell-shake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(12deg)} 40%{transform:rotate(-12deg)} 60%{transform:rotate(6deg)} 80%{transform:rotate(-6deg)} }
    .alarm-bell.ringing svg { animation: bell-shake 0.5s ease; }
    .theme-toggle, .lang-toggle { padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border);
      background: var(--bg-card); font-size: 11px; color: var(--text-secondary); cursor: pointer; font-weight: 500; }

    .content { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .page-enter { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 20px; transition: all 0.2s ease; position: relative; overflow: hidden; }
    .stat-card:hover { border-color: var(--border-active); transform: translateY(-1px); box-shadow: var(--shadow); }
    .stat-card .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card .label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-card .value { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-top: 4px; }
    .stat-card .trend { font-size: 11px; margin-top: 4px; font-weight: 500; }
    .stat-card .trend.up { color: var(--success); }
    .stat-card .trend.down { color: var(--error); }
    .stat-grid { display: grid; gap: 16px; margin-bottom: 20px; }
    .stat-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .stat-grid-3 { grid-template-columns: repeat(3, 1fr); }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .card-subtitle { font-size: 11px; color: var(--text-tertiary); margin-bottom: 16px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600;
      color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 10px 16px; font-size: 13px; color: var(--text-primary);
      border-bottom: 1px solid var(--border); }
    .data-table tr:hover td { background: var(--bg-card-hover); }
    .status-dot { display: inline-flex; align-items: center; gap: 6px; padding: 2px 10px;
      border-radius: 10px; font-size: 11px; font-weight: 500; }
    .status-dot.online { background: var(--success-bg); color: var(--success); }
    .status-dot.warning { background: var(--warning-bg); color: var(--warning); }
    .status-dot.error { background: var(--error-bg); color: var(--error); }
    .status-dot.info { background: rgba(59,130,246,0.1); color: var(--info); }
    .progress-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

    /* Energy Flow Hub */
    .flow-hub { position: relative; width: 100%; aspect-ratio: 3/1; min-height: 280px; max-height: 360px;
      background: #0f172a; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 32px 48px;
      transition: box-shadow 1.2s ease, border-color 1.2s ease; }
    [data-theme="light"] .flow-hub { background: #f1f5f9; border-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .flow-node-label { color: #334155; text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
    [data-theme="light"] .flow-node-value { color: #0f172a; text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
    [data-theme="light"] .flow-node-unit { color: #475569; text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
    [data-theme="light"] .flow-battery-soc { color: #0f172a; text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
    [data-theme="light"] .flow-battery-label { color: rgba(13,148,136,0.9); text-shadow: none; }
    [data-theme="light"] .flow-battery-power { color: #475569; text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
    [data-theme="light"] .flow-live-text { color: #334155; text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
    /* Ambient hue — blurred color blobs that melt together like liquid */
    .flow-hue { position: absolute; inset: 0; pointer-events: none; border-radius: 1rem; overflow: hidden; }
    .flow-blob { position: absolute; border-radius: 50%; filter: blur(120px); transition: opacity 1.5s ease; }
    .flow-svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .flow-layout { position: relative; z-index: 2; width: 100%; display: flex; align-items: center;
      justify-content: space-between; max-width: 64rem; }
    .flow-col-left, .flow-col-right { display: flex; flex-direction: column; gap: 48px; }
    .flow-col-right { text-align: right; }
    .flow-node { display: flex; align-items: center; gap: 16px; cursor: pointer; transition: transform 0.2s; }
    .flow-node:hover { transform: scale(1.03); }
    .flow-node-right { display: flex; flex-direction: row-reverse; align-items: center; gap: 16px; cursor: pointer; }
    .flow-node-right:hover { transform: scale(1.03); }
    .flow-icon-box { position: relative; width: 52px; height: 52px; border-radius: 0.75rem;
      background: rgba(0,0,0,0.25); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 200ms; z-index: 2; }
    [data-theme="light"] .flow-icon-box { background: rgba(255,255,255,0.4); border-color: rgba(0,0,0,0.08); }
    .flow-node:hover .flow-icon-box, .flow-node-right:hover .flow-icon-box { background: rgba(0,0,0,0.35); border-color: rgba(255,255,255,0.25); }
    .flow-node-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #ffffff;
      text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.9); }
    .flow-node-value { font-size: 16px; font-weight: 700; color: #ffffff; font-variant-numeric: tabular-nums; line-height: 1.3;
      text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 14px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.9); }
    .flow-node-unit { font-size: 10px; font-weight: 500; color: #ffffff; margin-left: 2px;
      text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.6); }
    .flow-battery-center { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .flow-battery-circle { width: 108px; height: 108px; border-radius: 50%;
      background: rgba(0,0,0,0.25); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(45,212,191,0.3);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; box-shadow: 0 0 30px rgba(45,212,191,0.08); animation: battery-pulse 4s ease-in-out infinite; }
    .flow-battery-soc { font-size: 18px; font-weight: 700; color: #ffffff; font-variant-numeric: tabular-nums; line-height: 1;
      margin-top: 3px; text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 14px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.9); }
    .flow-battery-label { font-size: 8px; font-weight: 700; text-transform: uppercase; color: #2dd4bf; margin-top: 2px;
      letter-spacing: 0.08em; text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.6); }
    .flow-battery-power { font-size: 11px; font-weight: 500; color: #ffffff; margin-top: 8px;
      text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.6); }
    .flow-footer { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 3;
      display: flex; align-items: center; gap: 6px; padding: 5px 14px;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(16px);
      border-radius: 9999px; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
    [data-theme="light"] .flow-footer { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .flow-battery-circle { background: rgba(255,255,255,0.4); }
    [data-theme="light"] .flow-ambient-toggle { background: rgba(255,255,255,0.4); color: rgba(0,0,0,0.4); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .flow-ambient-toggle:hover { background: rgba(255,255,255,0.6); color: rgba(0,0,0,0.6); }
    .flow-live-dot { width: 8px; height: 8px; border-radius: 50%; background: #14b8a6; animation: live-pulse 2s ease-in-out infinite; }
    .flow-live-text { font-size: 10px; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.1em; font-style: italic;
      text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.6); transition: color 1s ease; }
    .flow-device-alert { display: flex; align-items: center; margin-left: 4px; transition: transform 0.2s; }
    .flow-device-alert:hover { transform: scale(1.2); }
    .flow-ambient-toggle { position: absolute; top: 10px; right: 12px; z-index: 4; cursor: pointer;
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); font-size: 13px; transition: all 0.2s; }
    .flow-ambient-toggle:hover { background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.8); }
    .solar-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .solar-ring { position: absolute; width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid rgba(251,191,36,0.4); opacity: 0; animation: pulse-ring 2.5s ease-out infinite; }
    .solar-ring:nth-child(2) { animation-delay: 0.8s; }
    .solar-ring:nth-child(3) { animation-delay: 1.6s; }
    .ev-anim-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .ev-progress-ring { animation: ev-charge 2s linear infinite; }
    .ev-zap-wrap { position: absolute; animation: ev-zap-pulse 1.5s ease-in-out infinite; }
    .grid-arc-1 { animation: grid-arc-pulse 2.5s ease-in-out infinite; }
    .grid-arc-2 { animation: grid-arc-pulse 2.5s ease-in-out infinite 1.2s; }
    /* Wind turbine blade spin */
    .wind-blades { transform-origin: center; animation: wind-spin 3s linear infinite; }
    .wind-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .wind-ring { position: absolute; width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid rgba(6,182,212,0.3); opacity: 0; animation: pulse-ring 3s ease-out infinite; }
    .wind-ring:nth-child(2) { animation-delay: 1s; }
    .wind-ring:nth-child(3) { animation-delay: 2s; }
    /* Building load pulse */
    .building-pulse { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .building-glow { position: absolute; width: 52px; height: 52px; border-radius: 12px;

// ═══════════════════════════════════════════════════════════════════════
// ─── Entity Store (Zustand-like normalized cache) ───
// Every object in the system is an entity with a unique ID and common shape.
// 7-level hierarchy: Platform → Account → Sub-account → Site → Device Group → Device → Sensor/Actuator
// Each entity has: properties (own), state (live), alarms (active).
// Properties cascade UP from children (aggregated) and DOWN from parents (inherited).
// To migrate to production: replace seed data with API hydration, add WebSocket state updates.
// ═══════════════════════════════════════════════════════════════════════
const EntityStore = (() => {
  const _entities = new Map();

  // ── Entity shape ──
  // { id, entityType, parentId, name, properties:{}, state:{}, alarms:[], capabilities:[] }
  // entityType: 'platform'|'account'|'subAccount'|'site'|'deviceGroup'|'device'|'sensor'|'actuator'

  function put(entity) {
    _entities.set(entity.id, entity);
  }

  function get(id) { return _entities.get(id); }

  function getChildren(parentId) {
    return Array.from(_entities.values()).filter(e => e.parentId === parentId);
  }

  function getByType(entityType) {
    return Array.from(_entities.values()).filter(e => e.entityType === entityType);
  }

  function getDescendants(id, types) {
    const result = [];
    const queue = getChildren(id);
    while (queue.length) {
      const e = queue.shift();
      if (!types || types.includes(e.entityType)) result.push(e);
      queue.push(...getChildren(e.id));
    }
    return result;
  }

  // Get all devices under a site (traverses device groups)
  function getSiteDevices(siteId) { return getDescendants(siteId, ['device']); }
  function getSiteSensors(siteId) { return getDescendants(siteId, ['sensor']); }
  function getSiteDeviceGroups(siteId) { return getDescendants(siteId, ['deviceGroup']); }
  function getSiteAlarms(siteId) {
    const all = getDescendants(siteId);
    return all.flatMap(e => (e.alarms || []).map(a => ({...a, entityId: e.id, entityName: e.name})));
  }

  // Cascaded property resolution: own → parent → grandparent
  function getResolvedProperty(id, key) {
    let current = get(id);
    while (current) {
      if (current.properties && current.properties[key] !== undefined) return current.properties[key];
      current = current.parentId ? get(current.parentId) : null;
    }
    return undefined;
  }

  function getAll() { return Array.from(_entities.values()); }
  function size() { return _entities.size; }

  // Aggregate energy flow — walks up for leaf entities, aggregates down for containers
  function getAggregatedEnergyFlow(entityId) {
    const entity = get(entityId);
    if (!entity) return null;
    if (entity.state?.energyFlow) return entity.state.energyFlow;
    // For device-level entities, walk up to nearest site
    if (['device','sensor','actuator','deviceGroup'].includes(entity.entityType)) {
      let cur = entity;
      while (cur) {
        if (cur.state?.energyFlow) return cur.state.energyFlow;
        cur = cur.parentId ? get(cur.parentId) : null;
      }
      return null;
    }
    const sites = getDescendants(entityId, ['site']);
    if (sites.length === 0) return null;
    const agg = { solarActive:false, windActive:false, consumptionActive:false,
      gridExporting:false, gridImporting:false, essSoc:0,
      solarPower:0, windPower:0, buildingPower:0, evPower:0,
      gridPower:0, batteryPower:0, batteryMode:'Mixed', footerText:'' };
    let socCount = 0;
    sites.forEach(s => {
      const ef = s.state?.energyFlow;
      if (!ef) return;
      agg.solarPower += ef.solarPower || 0;
      agg.windPower += ef.windPower || 0;
      agg.buildingPower += ef.buildingPower || 0;
      agg.evPower += ef.evPower || 0;
      agg.gridPower += ef.gridPower || 0;
      agg.batteryPower += ef.batteryPower || 0;
      if (ef.solarActive) agg.solarActive = true;
      if (ef.windActive) agg.windActive = true;
      if (ef.consumptionActive) agg.consumptionActive = true;
      if (ef.gridExporting) agg.gridExporting = true;
      if (ef.gridImporting) agg.gridImporting = true;
      if (ef.essSoc > 0) { agg.essSoc += ef.essSoc; socCount++; }
    });
    if (socCount > 0) agg.essSoc = Math.round(agg.essSoc / socCount);
    ['solarPower','windPower','buildingPower','evPower','gridPower','batteryPower'].forEach(k => {
      agg[k] = Math.round(agg[k] * 10) / 10;
    });
    agg.footerText = `${sites.length} sites aggregated`;
    return agg;
  }

  // Aggregate alarms from all descendants
  function getAggregatedAlarms(entityId) {
    const entity = get(entityId);
    if (!entity) return [];
    const own = (entity.alarms || []).map(a => ({...a, entityId: entity.id, entityName: entity.name}));
    const desc = getDescendants(entityId);
    const child = desc.flatMap(e => (e.alarms || []).map(a => ({...a, entityId: e.id, entityName: e.name})));
    return [...own, ...child];
  }

  // Aggregate peak shaving — walks up for leaf entities
  function getAggregatedPeakShaving(entityId) {
    const entity = get(entityId);
    if (entity?.state?.peakShaving) return {...entity.state.peakShaving, contractLimit: entity.properties?.contractLimit || 40};
    if (['device','sensor','actuator','deviceGroup'].includes(entity?.entityType)) {
      let cur = entity;
      while (cur) {
        if (cur.state?.peakShaving) return {...cur.state.peakShaving, contractLimit: cur.properties?.contractLimit || 40};
        cur = cur.parentId ? get(cur.parentId) : null;
      }
    }
    const sites = getDescendants(entityId, ['site']);
    if (sites.length === 0) return null;
    let liveDemand=0, contractLimit=0, monthPeak=0;
    sites.forEach(s => {
      const ps = s.state?.peakShaving;
      if (!ps) return;
      liveDemand += ps.liveDemand || 0;
      contractLimit += s.properties?.contractLimit || 0;
      monthPeak += ps.monthPeak || 0;
    });
    const headroom = Math.round((contractLimit - liveDemand) * 10) / 10;
    const demandPct = contractLimit > 0 ? Math.round(liveDemand / contractLimit * 100) : 0;
    return { demandPct, liveDemand: Math.round(liveDemand*10)/10, contractLimit, monthPeak: Math.round(monthPeak*10)/10, headroom };
  }

  // Aggregate compliance — walks up for leaf entities
  function getAggregatedCompliance(entityId) {
    const entity = get(entityId);
    if (entity?.properties?.compliance) return entity.properties.compliance;
    if (['device','sensor','actuator','deviceGroup'].includes(entity?.entityType)) {
      let cur = entity;
      while (cur) {
        if (cur.properties?.compliance) return cur.properties.compliance;
        cur = cur.parentId ? get(cur.parentId) : null;
      }
    }
    const sites = getDescendants(entityId, ['site']);
    if (sites.length === 0) return {score:100,tracked:0,compliant:0,actionNeeded:0,auditEntries:'0',retention:'5 yr'};
    let totalScore=0, tracked=0, compliant=0, actionNeeded=0, entries=0;
    sites.forEach(s => {
      const c = s.properties?.compliance;
      if (!c) return;
      totalScore += c.score || 0;
      tracked += c.tracked || 0;
      compliant += c.compliant || 0;
      actionNeeded += c.actionNeeded || 0;
      entries += parseInt(String(c.auditEntries||'0').replace(/,/g,'')) || 0;
    });
    return {
      score: Math.round(totalScore / sites.length),
      tracked, compliant, actionNeeded,
      auditEntries: entries.toLocaleString(),
      retention: '5 yr',
    };
  }

  // Get breadcrumb path from entity to root
  function getPath(entityId) {
    const path = [];
    let current = get(entityId);
    while (current) {
      path.unshift({ id: current.id, name: current.name, entityType: current.entityType });
      current = current.parentId ? get(current.parentId) : null;
    }
    return path;
  }

  return { put, get, getChildren, getByType, getDescendants, getSiteDevices, getSiteSensors,
    getSiteDeviceGroups, getSiteAlarms, getResolvedProperty, getAll, size,
    getAggregatedEnergyFlow, getAggregatedAlarms, getAggregatedPeakShaving,
    getAggregatedCompliance, getPath };
})();

  let _currentUser = null;
  const _users = new Map();

  function register(user) { _users.set(user.id, user); }
  function login(userId) { _currentUser = _users.get(userId) || null; }
  function logout() { _currentUser = null; }
  function currentUser() { return _currentUser; }
  function getUser(id) { return _users.get(id); }
  function getAllUsers() { return Array.from(_users.values()); }
  function updateProfile(updates) {
    if (!_currentUser) return;
    Object.assign(_currentUser, updates);
    _users.set(_currentUser.id, _currentUser);
  }

  return { register, login, logout, currentUser, getUser, getAllUsers, updateProfile };

// ─── Hydrate EntityStore from nested SITES → deviceGroups → devices → sensors/actuators ───
// Walks the existing seed data and registers every entity with a common shape.
// After this, EntityStore is the single source of truth for the entire hierarchy.
SITES.forEach(site => {
  // Site entity was already registered from SITE_SEEDS — merge the deviceGroups data
  const siteEntity = EntityStore.get(site.id);
  // Register device groups, devices, sensors, actuators
  (site.deviceGroups || []).forEach(dg => {
    EntityStore.put({
      id: dg.id, entityType: 'deviceGroup', parentId: site.id, name: dg.name,
      properties: { type: dg.type, deviceCount: dg.devices },
      state: { power: dg.power, status: 'online' },
      alarms: [], capabilities: ['group_control','aggregated_monitoring'],
    });
    (dg.devices_list || []).forEach(dev => {
      EntityStore.put({
        id: dev.id, entityType: 'device', parentId: dg.id, name: dev.name,
        properties: { type: dev.type, manufacturer: dev.manufacturer, model: dev.model, firmware: dev.firmware },
        state: { power: dev.power, status: dev.status },
        alarms: [], capabilities: ['read_telemetry','control','configure','firmware_update'],
      });
      (dev.sensors || []).forEach(s => {
        EntityStore.put({
          id: s.id, entityType: 'sensor', parentId: dev.id, name: s.name,
          properties: { type: s.type, unit: s.unit },
          state: { value: s.value, status: s.status },
          alarms: [], capabilities: ['read_value','configure_threshold'],
        });
      });
      (dev.actuators || []).forEach(a => {
        EntityStore.put({
          id: a.id, entityType: 'actuator', parentId: dev.id, name: a.name,
          properties: { type: a.type, unit: a.unit },
          state: { value: a.value, status: a.status },
          alarms: [], capabilities: ['set_value','read_value','configure_limits'],
        });
      });
    });
  });
});

  // ─── Dashboard (entity-aware — works at any hierarchy level) ───
  getDashboardDevices: (entityId) => {
    const id = entityId || 'dg-maasland';
    const entity = EntityStore.get(id);
    // If this IS a device, return just itself
    if (entity?.entityType === 'device') return [{ name:entity.name, type:entity.properties.type, power:entity.state.power, status:entity.state.status }];
    const devices = EntityStore.getDescendants(id, ['device']);
    return devices.map(d => ({ name:d.name, type:d.properties.type, power:d.state.power, status:d.state.status }));
  },
  getDashboardAlerts: (entityId) => {
    return EntityStore.getAggregatedAlarms(entityId || 'dg-maasland')
      .map(a => ({ sev:a.sev, msg:a.msg, time:a.time, entityName:a.entityName }));
  },

  // ─── Energy Flow (entity-aware — aggregates from descendants) ───
  getEnergyFlowState: (entityId) => {
    return EntityStore.getAggregatedEnergyFlow(entityId || 'dg-maasland') ||
      EntityStore.getAggregatedEnergyFlow('dg-maasland');
  },

  // Device health — computed from EntityStore device states (entity-aware)
  getDeviceHealth: (entityId) => {
    const devices = EntityStore.getDescendants(entityId || 'dg-maasland', ['device']);
    const total = devices.length;
    const online = devices.filter(d => d.state.status === 'online' || d.state.status === 'available').length;
    const offline = devices.filter(d => d.state.status === 'offline').length;
    const error = devices.filter(d => d.state.status === 'error' || d.state.status === 'fault').length;
    const offlineDevices = devices.filter(d => d.state.status === 'offline').map(d => d.name);
    const errorDevices = devices.filter(d => d.state.status === 'error' || d.state.status === 'fault').map(d => d.name);
    return { total, online, offline, error, offlineDevices, errorDevices };
  },

  // Inferred entity status — automatically derived from energy flow data + device health
  getSiteStatus: (entityId) => {
    const ef = MockAPI.getEnergyFlowState(entityId);
    const dh = MockAPI.getDeviceHealth(entityId);
    const totalGen = ef.solarPower + ef.windPower;
    const totalLoad = ef.buildingPower + ef.evPower;
    const selfSufficiency = totalLoad > 0 ? Math.min(100, Math.round((totalGen / totalLoad) * 100)) : 0;

    let deviceStatus = null;
    if (dh.offline > 0 || dh.error > 0) {
      const issues = [...dh.offlineDevices.map(d => d + ' offline'), ...dh.errorDevices.map(d => d + ' error')];
      const ratio = (dh.offline + dh.error) / dh.total;
      deviceStatus = {
        level: ratio > 0.3 ? 'critical' : 'warning',
        color: ratio > 0.3 ? '#ef4444' : '#f59e0b',
        icon: ratio > 0.3 ? 'CloseCircleFilled' : 'ExclamationCircleFilled',
        label:{en:`${dh.offline+dh.error} Device Issue${(dh.offline+dh.error)>1?'s':''}`,nl:`${dh.offline+dh.error} Apparaatprobleem`},
        desc:{en:issues.join(', '),nl:issues.join(', ')},
      };
    }

    let energyStatus;
    if (ef.gridPower === 0 && !ef.gridImporting && !ef.gridExporting && totalGen > 0) {
      energyStatus = {level:'island', color:'#22c55e', icon:'CheckCircleFilled',
        label:{en:'Island Mode',nl:'Eilandmodus'},
        desc:{en:'Off-grid, fully self-sufficient',nl:'Autonoom, volledig zelfvoorzienend'},
        selfSufficiency:100};
    } else if (ef.gridExporting && ef.essSoc > 80) {
      energyStatus = {level:'peak', color:'#22c55e', icon:'CheckCircleFilled',
        label:{en:'Peak Production',nl:'Piekproductie'},
        desc:{en:`Exporting ${fmt(ef.gridPower)} kW, battery ${ef.essSoc}%`,nl:`Exporteert ${fmt(ef.gridPower)} kW, batterij ${ef.essSoc}%`},
        selfSufficiency};
    } else if (ef.gridExporting || selfSufficiency >= 90) {
      energyStatus = {level:'optimal', color:'#22c55e', icon:'CheckCircleFilled',
        label:{en:'Optimal',nl:'Optimaal'},
        desc:{en:'Self-sufficient, exporting surplus',nl:'Zelfvoorzienend, exporteert overschot'},
        selfSufficiency};
    } else if (ef.gridImporting && totalGen > 0 && ef.gridPower <= totalGen * 2) {
      energyStatus = {level:'importing', color:'#f59e0b', icon:'WarningFilled',
        label:{en:'Importing',nl:'Importeert'},
        desc:{en:`Solar low, importing ${fmt(ef.gridPower)} kW`,nl:`Zon laag, importeert ${fmt(ef.gridPower)} kW`},
        selfSufficiency};
    } else if (ef.gridImporting && (ef.gridPower > totalGen * 2 || ef.essSoc < 30)) {
      energyStatus = {level:'grid-heavy', color:'#ef4444', icon:'WarningFilled',
        label:{en:'High Grid Import',nl:'Hoge Netimport'},
        desc:{en:`Importing ${fmt(ef.gridPower)} kW, battery ${ef.essSoc}%`,nl:`Importeert ${fmt(ef.gridPower)} kW, batterij ${ef.essSoc}%`},
        selfSufficiency};
    } else if (ef.gridImporting && totalGen === 0) {
      energyStatus = {level:'grid-dependent', color:'#ef4444', icon:'WarningFilled',
        label:{en:'Grid Dependent',nl:'Netafhankelijk'},
        desc:{en:`No generation, importing ${fmt(ef.gridPower)} kW`,nl:`Geen opwekking, importeert ${fmt(ef.gridPower)} kW`},
        selfSufficiency:0};
    } else {
      energyStatus = {level:'normal', color:'#3b82f6', icon:'InfoCircleFilled',
        label:{en:'Normal',nl:'Normaal'}, desc:{en:'System operating normally',nl:'Systeem functioneert normaal'},
        selfSufficiency};
    }

    return { ...energyStatus, deviceIssue: !!deviceStatus, deviceStatus };
  },

  // ─── Fleet (from EntityStore) ───
  getFleetSites: () => {
    return EntityStore.getByType('site').map(s => ({
      name: s.name, loc: s.properties.location, devices: s.state.devices,
      cap: s.properties.capacity, status: s.state.status, sc: s.state.selfConsumption,
    }));
  },

  // ─── Devices (entity-aware — works at any hierarchy level) ───
  getDevices: (entityId) => {
    const id = entityId || 'dg-maasland';
    const entity = EntityStore.get(id);

// ─── Entity Tree Node (recursive) ───
function EntityTreeNode({ entity, focusedEntityId, setFocusedEntityId, depth, expandedNodes, toggleExpand }) {
  const children = EntityStore.getChildren(entity.id);
  const hasChildren = children.length > 0;
  const isExpanded = expandedNodes.has(entity.id);
  const isActive = entity.id === focusedEntityId;
  const childCount = EntityStore.getDescendants(entity.id).length;

  return (
    <div>
      <div className={`sidebar-tree-node ${isActive?'active':''}`}
        style={{paddingLeft: 12 + depth * 16}}
        onClick={() => setFocusedEntityId(entity.id)}>
        <span className="tree-expand" onClick={(e) => { e.stopPropagation(); if(hasChildren) toggleExpand(entity.id); }}
          style={{cursor: hasChildren?'pointer':'default', opacity: hasChildren?1:0.3}}>
          {hasChildren ? (isExpanded ? '▾' : '▸') : '·'}
        </span>
        <EntityTypeIcon type={entity.entityType} style={{fontSize:13, color: isActive?'var(--brand)':'var(--text-tertiary)'}}/>
        <span className="tree-name">{entity.name}</span>
        {hasChildren && <span className="tree-badge">{childCount}</span>}
      </div>
      {hasChildren && isExpanded && children.map(child => (
        <EntityTreeNode key={child.id} entity={child} focusedEntityId={focusedEntityId}
          setFocusedEntityId={setFocusedEntityId} depth={depth+1}
          expandedNodes={expandedNodes} toggleExpand={toggleExpand}/>
      ))}
    </div>
  );
}

// ─── Sidebar Component ───
function Sidebar({ page, setPage, t, lang, focusedEntityId, setFocusedEntityId, currentApp, setCurrentApp }) {
  const [panelOpen, setPanelOpen] = useState(true);
  const [expandedNodes, setExpandedNodes] = useState(() => {
    // Auto-expand platform → account → subAccount levels so all sites are visible
    const expanded = new Set();
    EntityStore.getByType('platform').forEach(p => expanded.add(p.id));
    EntityStore.getByType('account').forEach(a => expanded.add(a.id));
    EntityStore.getByType('subAccount').forEach(sa => expanded.add(sa.id));
    // Also expand path to focused entity
    const path = EntityStore.getPath(focusedEntityId);
    path.forEach(e => expanded.add(e.id));
    return expanded;
  });
  const app = APPS[currentApp] || APPS.dashboard;

  const toggleExpand = useCallback((id) => {
    setExpandedNodes(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }, []);

  // When focusedEntityId changes, auto-expand the path to it
  useEffect(() => {
    const path = EntityStore.getPath(focusedEntityId);
    setExpandedNodes(prev => {
      const next = new Set(prev);
      path.forEach(e => next.add(e.id));
      return next;
    });
  }, [focusedEntityId]);

  // Get root entities for the tree
  const rootEntities = EntityStore.getByType('platform');

          </div>

            <div key={item.key} className={`nav-item ${page===item.key?'active':''}`}
              style={{padding:'6px 8px',fontSize:12}}
              onClick={() => setPage(item.key)}>
              <NavIcon name={item.key} style={{fontSize:14}}/> {item.label[lang]}
            </div>
          ))}
        </div>

        {/* Entity Hierarchy Tree — for apps that are entity-aware */}
        {['dashboard','alarms','map'].includes(currentApp) && (
          <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
            <div style={{padding:'8px 12px',fontSize:10,fontWeight:600,textTransform:'uppercase',color:'var(--text-tertiary)',
              letterSpacing:'0.04em',borderBottom:'1px solid var(--border)',flexShrink:0}}>
              {lang==='en'?'Entity Hierarchy':'Entiteitshiërarchie'}
            </div>
            <div className="sidebar-entity-tree" style={{flex:1,overflowY:'auto',minHeight:0}}>
              {rootEntities.map(root => (
                <EntityTreeNode key={root.id} entity={root} focusedEntityId={focusedEntityId}
                  setFocusedEntityId={setFocusedEntityId} depth={0}
                  expandedNodes={expandedNodes} toggleExpand={toggleExpand}/>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ─── Header User Profile (top-right avatar + dropdown) ───

  const [open, setOpen] = useState(false);

  const user = UserStore.currentUser();
  const L = {
    en: { online:'Online', away:'Away', role:'Role', account:'Account', phone:'Phone', lastLogin:'Last login',

          <span style={{fontSize:10,color:'var(--text-tertiary)'}}>{user.role}</span>
        </div>
      </div>
      {open && (
        <div style={{position:'absolute',top:'100%',right:0,marginTop:4,width:260,background:'var(--bg-card)',
          border:'1px solid var(--border)',borderRadius:10,boxShadow:'var(--shadow)',zIndex:200,overflow:'hidden'}}>

            <div>

                <span style={{width:6,height:6,borderRadius:'50%',background:user.status==='online'?'var(--success)':'var(--warning)'}}/>
                {user.status==='online'?L.online:L.away}
              </div>
            </div>
          </div>
          {/* Profile details */}
          <div style={{padding:'8px 0'}}>
            <div style={{padding:'6px 16px',fontSize:12,color:'var(--text-secondary)',display:'flex',justifyContent:'space-between'}}>
              <span style={{color:'var(--text-tertiary)'}}>{L.role}</span><span>{user.role}</span>
            </div>
            <div style={{padding:'6px 16px',fontSize:12,color:'var(--text-secondary)',display:'flex',justifyContent:'space-between'}}>
              <span style={{color:'var(--text-tertiary)'}}>{L.account}</span>

            <div style={{padding:'8px 16px',fontSize:12,color:'var(--text-secondary)',cursor:'pointer',display:'flex',alignItems:'center',gap:8,
              transition:'background 0.12s'}}
              onMouseEnter={e => e.currentTarget.style.background='var(--bg-card-hover)'}

              onClick={() => { setCurrentApp('configuration'); setPage('configuration'); setOpen(false); }}>

// ─── Header Component ───
function Header({ page, t, lang, setLang, themeName, setTheme, alarms, alarmCount, showAlarms, setShowAlarms, focusedEntityId, setFocusedEntityId, setPage, setCurrentApp }) {
  const titles = { dashboard:t.dashboard, energyFlow:t.energyFlow, fleet:t.fleet, devices:t.devices,

  const breadcrumbPath = EntityStore.getPath(focusedEntityId);
  return (
    <div className="header">
      <div className="header-left">
        <div className="header-breadcrumb" style={{display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
          {breadcrumbPath.map((ent, i) => (
            <span key={ent.id} style={{display:'inline-flex',alignItems:'center',gap:3}}>
              {i > 0 && <span style={{color:'var(--text-tertiary)',margin:'0 2px'}}>/</span>}
              <EntityTypeIcon type={ent.entityType} style={{fontSize:12,color: i===breadcrumbPath.length-1?'var(--brand)':'var(--text-tertiary)'}}/>
              <span style={{cursor:'pointer',color: i===breadcrumbPath.length-1?'var(--text-primary)':'var(--text-tertiary)',

          <strong style={{fontSize:13}}>{titles[page]||page}</strong>
        </div>
      </div>
      <div className="header-right">
        <button className="lang-toggle" onClick={()=>setLang(lang==='en'?'nl':'en')}>
          <GlobalOutlined style={{marginRight:4}}/>{lang==='en'?'EN':'NL'}
        </button>
        <button className="theme-toggle" onClick={()=>setTheme(themeName==='dark'?'light':'dark')}>
          {themeName==='dark'?<><SunOutlined style={{marginRight:4}}/>Light</>:<><MoonOutlined style={{marginRight:4}}/>Dark</>}

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>

            {alarmCount>0 && <div className="badge">{alarmCount>9?'9+':alarmCount}</div>}

                <span style={{fontSize:13,fontWeight:600,color:'var(--text-primary)'}}>{t.alerts}</span>

              {alarms.slice(0,5).map((a,i) => (
                <div key={i} className="alarm-dropdown-item">

  return (
    <div>

// ─── Widget Registry ───
// Each widget is a self-contained micro-frontend manifest.
// The dashboard shell knows NOTHING about individual widgets — it reads this registry.
// To add a marketplace widget: call WidgetRegistry.register({...manifest}).
// Contract: { id, label:{en,nl}, desc:{en,nl}, icon:string, size:'full'|'half', chromeless?:bool,
//             component: React component ({t,lang,currentSite,data}) => JSX,
//             dataProvider: (siteId, MockAPI) => data object }
const WidgetRegistry = (() => {
  const _widgets = new Map();
  return {
    register(manifest) { _widgets.set(manifest.id, manifest); },
    get(id) { return _widgets.get(id); },
    getAll() { return Array.from(_widgets.values()); },
    getAllIds() { return Array.from(_widgets.keys()); },
    has(id) { return _widgets.has(id); },
  };
})();

// ─── Drag helpers (shared by drawer and grid) ───
function useDragReorder(items, setItems) {
  const dragIdx = React.useRef(null);
  const [dragOverIdx, setDragOverIdx] = React.useState(null);
  const onDragStart = (idx) => (e) => {
    dragIdx.current = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', idx);
    requestAnimationFrame(() => e.target.classList.add('dragging'));
  };
  const onDragEnd = (e) => {
    e.target.classList.remove('dragging');
    dragIdx.current = null;
    setDragOverIdx(null);
  };
  const onDragOver = (idx) => (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOverIdx(idx); };
  const onDragLeave = () => setDragOverIdx(null);
  const onDrop = (idx) => (e) => {
    e.preventDefault();
    setDragOverIdx(null);
    const from = dragIdx.current;
    if (from === null || from === idx) return;
    const next = [...items];
    const [moved] = next.splice(from, 1);
    next.splice(idx, 0, moved);
    setItems(next);
    dragIdx.current = null;
  };
  return { dragOverIdx, onDragStart, onDragEnd, onDragOver, onDragLeave, onDrop };
}

// ─── Customize Drawer ───
// Reads widget metadata from WidgetRegistry — the drawer itself knows nothing about individual widgets.
function CustomizeDrawer({widgets, setWidgets, onClose, lang}) {
  const toggle = (idx) => {
    const next = [...widgets];
    next[idx] = {...next[idx], visible: !next[idx].visible};

  const resetLayout = () => setWidgets(MockAPI.getDefaultWidgetLayout());
  const drag = useDragReorder(widgets, setWidgets);

// ─── Dashboard Page — Pure Shell ───
// Two customize modes:
//   1. Grid mode (drag icon): drag-reposition widgets directly on the grid
//   2. List mode (list icon): slide-out drawer for enable/disable + reorder
// Both modes share the same widgets state. The shell knows nothing about individual widgets.
function DashboardPage({t, lang, currentSite, focusedEntityId, setFocusedEntityId}) {
  const entityId = focusedEntityId || currentSite;
  const entity = EntityStore.get(entityId);
  const children = entity ? EntityStore.getChildren(entityId) : [];
  const entityTypeName = entity ? {platform:'Platform',account:'Account',subAccount:'Sub-Account',
    site:'Site',deviceGroup:'Device Group',device:'Device',sensor:'Sensor',actuator:'Actuator'}[entity.entityType] : '';
  const childrenByType = {};
  children.forEach(c => { childrenByType[c.entityType] = (childrenByType[c.entityType]||0) + 1; });
  const [widgets, setWidgets] = useState(() => {
    try {
      const saved = localStorage.getItem('orbiteos-dashboard-layout');
      if (saved) {
        const parsed = JSON.parse(saved);
        const defaults = MockAPI.getDefaultWidgetLayout();
        const savedIds = new Set(parsed.map(w => w.id));
        const merged = parsed
          .filter(p => WidgetRegistry.has(p.id))
          .map(p => {
            const def = defaults.find(d => d.id === p.id);
            return { id: p.id, visible: p.visible != null ? p.visible : (def ? def.visible : true) };
          });
        defaults.forEach(d => { if (!savedIds.has(d.id) && WidgetRegistry.has(d.id)) merged.push({id:d.id, visible:d.visible}); });
        return merged;
      }
    } catch(e) {}
    return MockAPI.getDefaultWidgetLayout();
  });
  const [gridCustomize, setGridCustomize] = useState(false);
  const [listDrawer, setListDrawer] = useState(false);

  useEffect(() => {
    localStorage.setItem('orbiteos-dashboard-layout', JSON.stringify(widgets));
  }, [widgets]);

  const visibleWidgets = widgets.filter(w => w.visible);

  // Grid drag-reorder (operates on ALL widgets array by visible index mapping)
  const gridDrag = useDragReorder(widgets, setWidgets);
  // Map visible widget index to full widgets array index
  const visibleToFullIdx = (visIdx) => {
    const wId = visibleWidgets[visIdx]?.id;
    return widgets.findIndex(w => w.id === wId);
  };

  const toggleVisibility = (widgetId) => {
    const idx = widgets.findIndex(w => w.id === widgetId);
    if (idx < 0) return;
    const next = [...widgets];
    next[idx] = {...next[idx], visible: !next[idx].visible};
    setWidgets(next);
  };

  return (
    <div className={`page-enter ${gridCustomize ? 'customize-active' : ''}`}>
      <div className="widget-header">
        <div className="widget-header-title">
          <ThunderboltOutlined style={{marginRight:8,color:'var(--brand)'}}/>
          {lang==='nl'?'Energie Dashboard':'Energy Dashboard'}
        </div>
        <div className="customize-header-controls">
          <Tooltip title={gridCustomize ? (lang==='nl'?'Klaar':'Done') : (lang==='nl'?'Widgets verplaatsen':'Rearrange widgets')}>
            <div className={`customize-icon-btn ${gridCustomize?'active':''}`}
              onClick={()=>setGridCustomize(!gridCustomize)}>
              {gridCustomize ? <CheckOutlined/> : <DragOutlined/>}
            </div>
          </Tooltip>
          <Tooltip title={lang==='nl'?'Widget lijst':'Widget list'}>
            <div className="customize-icon-btn" onClick={()=>setListDrawer(true)}>
              <UnorderedListOutlined/>
            </div>
          </Tooltip>
        </div>
      </div>

      {/* Widget Grid — shell renders from registry, zero widget knowledge */}
      <div className="widget-grid">
        {visibleWidgets.map((w, visIdx) => {
          const manifest = WidgetRegistry.get(w.id);
          if (!manifest) return null;
          const Renderer = manifest.component;
          const widgetData = manifest.dataProvider(entityId);
          const isFullWidth = manifest.size === 'full';
          const IconComp = resolveIcon(manifest.icon);
          const fullIdx = visibleToFullIdx(visIdx);

          if (manifest.chromeless) {
            return (
              <div key={w.id} style={{gridColumn:'1 / -1', position:'relative'}}
                draggable={gridCustomize}
                onDragStart={gridCustomize ? gridDrag.onDragStart(fullIdx) : undefined}
                onDragEnd={gridCustomize ? gridDrag.onDragEnd : undefined}
                onDragOver={gridCustomize ? gridDrag.onDragOver(fullIdx) : undefined}
                onDragLeave={gridCustomize ? gridDrag.onDragLeave : undefined}
                onDrop={gridCustomize ? gridDrag.onDrop(fullIdx) : undefined}
                className={gridCustomize ? `${gridDrag.dragOverIdx===fullIdx?'drag-over':''}` : ''}>
                <Renderer t={t} lang={lang} currentSite={entityId} data={widgetData}/>
                {gridCustomize && (
                  <div className="chromeless-customize-bar">
                    <span style={{fontSize:10,color:'var(--text-tertiary)',marginRight:4}}>{manifest.label[lang]}</span>
                    <span style={{cursor:'grab',color:'var(--text-tertiary)',fontSize:12}}>⣿</span>
                  </div>
                )}
              </div>
            );
          }
          return (
            <div key={w.id}
              className={`widget-panel ${gridCustomize?'customize-mode':''} ${gridCustomize && gridDrag.dragOverIdx===fullIdx?'drag-over':''}`}
              style={isFullWidth ? {gridColumn:'1 / -1'} : {}}
              draggable={gridCustomize}
              onDragStart={gridCustomize ? gridDrag.onDragStart(fullIdx) : undefined}
              onDragEnd={gridCustomize ? gridDrag.onDragEnd : undefined}
              onDragOver={gridCustomize ? gridDrag.onDragOver(fullIdx) : undefined}
              onDragLeave={gridCustomize ? gridDrag.onDragLeave : undefined}
              onDrop={gridCustomize ? gridDrag.onDrop(fullIdx) : undefined}>
              {gridCustomize && (
                <div className="widget-panel-visibility">
                  <Tooltip title={lang==='nl'?'Verbergen':'Hide'}>
                    <div className="customize-icon-btn" style={{width:22,height:22,fontSize:11}}
                      onClick={(e)=>{e.stopPropagation();toggleVisibility(w.id);}}>
                      <EyeInvisibleOutlined/>
                    </div>
                  </Tooltip>
                </div>
              )}
              {gridCustomize && <div className="widget-panel-drag-handle">⣿</div>}
              <div className="widget-panel-header">
                <div className="widget-panel-title">
                  <span style={{color:'var(--brand)'}}>{React.createElement(IconComp)}</span>
                  {manifest.label[lang]}
                </div>
              </div>
              <div className="widget-panel-body">
                <Renderer t={t} lang={lang} currentSite={entityId} data={widgetData}/>
              </div>
            </div>
          );
        })}
      </div>

      {listDrawer && <CustomizeDrawer widgets={widgets} setWidgets={setWidgets} onClose={()=>setListDrawer(false)} lang={lang}/>}
    </div>
  );
}

// ─── Energy Flow Hub Icons (matching Figma / production Lucide style) ───
// Ambient background — blurred color blobs that melt together
// Large, high-opacity blobs on a solid dark base (#0f172a).
// They overlap and blur into each other creating a living, colored atmosphere.
function EnergyAmbientHues({ef}) {
  const sz = (pwr, min, max) => Math.round(Math.min(max, min + (pwr / 25) * (max - min)));
  const blobs = [];

  const hasLeft = ef.solarPower > 0 || ef.windPower > 0;
  const hasRight = ef.buildingPower > 0 || ef.evPower > 0 || ef.gridPower > 0;

  // Solar — warm golden sunlight
  if (ef.solarPower > 0) {
    // If no wind, solar expands to fill entire left side
    const noWind = ef.windPower <= 0;
    blobs.push({color:'rgb(255,195,60)', x:'30%', y: noWind ? '50%' : '30%',
      size:sz(ef.solarPower, noWind ? 450 : 380, noWind ? 700 : 600), op:0.55, key:'solar'});
  }

  // Wind — fresh mint-teal
  if (ef.windPower > 0) {
    const noSolar = ef.solarPower <= 0;
    blobs.push({color:'rgb(100,220,190)', x:'30%', y: noSolar ? '50%' : '70%',
      size:sz(ef.windPower, noSolar ? 450 : 350, noSolar ? 700 : 550), op:0.50, key:'wind'});
  }

  // Building — warm peach
  if (ef.buildingPower > 0) blobs.push(
    {color:'rgb(245,200,160)', x: hasLeft ? '68%' : '50%', y:'25%',
      size:sz(ef.buildingPower, 350, 540), op:0.45, key:'bldg'});

  // EV — soft lilac
  if (ef.evPower > 0) blobs.push(
    {color:'rgb(190,160,230)', x: hasLeft ? '68%' : '50%', y:'50%',
      size:sz(ef.evPower, 320, 500), op:0.45, key:'ev'});

  // Grid import — warm red (danger/heat)
  if (ef.gridImporting && ef.gridPower > 0) blobs.push(
    {color:'rgb(220,80,70)', x: hasLeft ? '68%' : '45%', y:'75%',
      size:sz(ef.gridPower, 380, 650), op:0.50, key:'grid'});

  // Grid export — sage green
  if (ef.gridExporting && ef.gridPower > 0) blobs.push(
    {color:'rgb(130,215,160)', x: hasLeft ? '68%' : '50%', y:'75%',
      size:sz(ef.gridPower, 350, 560), op:0.50, key:'grid'});

  // Fill guarantee: if no left sources, right blobs shift center to cover
  // If no right sources, left blobs are already large enough with blur to reach
  // If NOTHING active (impossible in practice), show a neutral cool wash
  if (blobs.length === 0) blobs.push(
    {color:'rgb(60,80,110)', x:'50%', y:'50%', size:500, op:0.4, key:'idle'});

  return <div className="flow-hue">
    {blobs.map(b => <div key={b.key} className="flow-blob" style={{
      background: b.color, width: b.size, height: b.size,
      left: b.x, top: b.y, transform: 'translate(-50%,-50%)',
      opacity: b.op,
    }}/>)}
  </div>;
}

// ─── SVG Flow Particle Layer (production-matching animateMotion) ───
// Paths: left icons ~12%, center hub ~50%, right icons ~88% of viewBox width
// Vertical: 2 left nodes at 35%/65%, 3 right nodes at 22%/50%/78% of height
const PATH_SOLAR   = 'M 95 145 C 180 145 300 200 400 200';
const PATH_WIND    = 'M 95 265 C 180 265 300 200 400 200';
const PATH_LOAD    = 'M 400 200 C 500 200 620 90  705 90';
const PATH_EV      = 'M 400 200 C 500 200 620 200 705 200';
const PATH_GRID    = 'M 400 200 C 500 200 620 310 705 310';
const PATH_GRID_IN = 'M 705 310 C 620 310 500 200 400 200';

// Gentle particle speed proportional to power.
// 2 kW → ~8s (slow trickle), 10 kW → ~4s, 30+ kW → ~2.5s
function flowDur(kw) { return Math.max(3, Math.min(10, 30 / Math.max(kw, 0.5))).toFixed(1) + 's'; }

// Particle group: small glowing dots evenly staggered along a path
function FlowParticles({power, color, path}) {
  if (!power || power <= 0) return null;
  const dur = flowDur(power);
  const durN = parseFloat(dur);
  const n = power > 20 ? 4 : power > 8 ? 3 : 2;
  const particles = [];
  for (let i = 0; i < n; i++) {
    const begin = (durN * i / n).toFixed(1) + 's';
    particles.push(
      <circle key={i} r={2} fill={color} filter="url(#glow)" opacity={0.85}>
        <animateMotion dur={dur} repeatCount="indefinite" begin={begin} path={path}/>
      </circle>
    );
  }
  return <>{particles}</>;
}

function FlowSvgLayer({ef}) {
  const {solarActive, windActive, consumptionActive, gridExporting, gridImporting} = ef;
  return (
    <svg className="flow-svg-layer" viewBox="0 0 800 400">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Background flow channels — subtle guides */}
      <path d={PATH_SOLAR} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="4 6"/>
      <path d={PATH_WIND}  fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="4 6"/>
      <path d={PATH_LOAD}  fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="4 6"/>
      <path d={PATH_EV}    fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="4 6"/>
      <path d={PATH_GRID}  fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="4 6"/>

      {/* Active particles — speed proportional to power value */}
      {solarActive && ef.solarPower > 0 &&
        <FlowParticles power={ef.solarPower} color={AMBER} path={PATH_SOLAR}/>}
      {windActive && ef.windPower > 0 &&
        <FlowParticles power={ef.windPower} color="#06b6d4" path={PATH_WIND}/>}
      {consumptionActive && ef.buildingPower > 0 &&
        <FlowParticles power={ef.buildingPower} color="#38bdf8" path={PATH_LOAD}/>}
      {consumptionActive && ef.evPower > 0 &&
        <FlowParticles power={ef.evPower} color="#8b5cf6" path={PATH_EV}/>}
      {gridExporting && ef.gridPower > 0 &&
        <FlowParticles power={ef.gridPower} color={COLOR_EXPORT} path={PATH_GRID}/>}
      {gridImporting && ef.gridPower > 0 &&
        <FlowParticles power={ef.gridPower} color={COLOR_IMPORT} path={PATH_GRID_IN}/>}
    </svg>
  );
}

// ─── Login Page ───
// Time-of-day palette — used by both page background and canvas
function getTimeOfDayPalette() {
  const h = new Date().getHours();
  const m = new Date().getMinutes();
  const t = h + m / 60;
  // [hour, glowR,G,B, glowOpacity, particleR,G,B, bgBottomR,G,B]
  // Teal-green base throughout — subtle shifts in warmth/coolness with time
  const stops = [
    [0,  10, 40, 50, 0.15,   20,120,130,  10, 50, 50],   // midnight — dark teal
    [5,  15, 55, 60, 0.18,   30,140,140,  12, 58, 55],   // pre-dawn — teal lifting
    [6,  30, 80, 70, 0.20,   60,180,160,  15, 68, 60],   // dawn — warmer teal
    [9,  25, 90, 80, 0.20,   45,200,180,  16, 72, 68],   // morning — bright teal
    [12, 30,110, 95, 0.22,   45,212,191,  19, 78, 74],   // noon — brand teal peak
    [15, 25,100, 88, 0.20,   40,200,178,  17, 74, 70],   // afternoon — teal
    [17, 20, 85, 78, 0.18,   35,180,165,  15, 68, 65],   // late afternoon — softer teal
    [19, 18, 60, 65, 0.18,   30,140,145,  13, 58, 58],   // dusk — cooler teal
    [21, 12, 45, 55, 0.16,   25,120,135,  11, 52, 52],   // evening — muted teal
    [24, 10, 40, 50, 0.15,   20,120,130,  10, 50, 50],   // midnight wrap
  ];
  let lo = stops[0], hi = stops[1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i][0] && t < stops[i+1][0]) { lo = stops[i]; hi = stops[i+1]; break; }
  }
  const frac = (t - lo[0]) / (hi[0] - lo[0] || 1);
  const lerp = (a, b) => Math.round(a + (b - a) * frac);
  return {
    r: lerp(lo[1], hi[1]), g: lerp(lo[2], hi[2]), b: lerp(lo[3], hi[3]),
    o: lo[4] + (hi[4] - lo[4]) * frac,
    pr: lerp(lo[5], hi[5]), pg: lerp(lo[6], hi[6]), pb: lerp(lo[7], hi[7]),
    bgR: lerp(lo[8], hi[8]), bgG: lerp(lo[9], hi[9]), bgB: lerp(lo[10], hi[10]),
  };
}

function LoginPage({t, setPage, setCurrentApp, lang, setLang}) {
  const canvasRef = useRef(null);
  const timeGlow = useMemo(() => getTimeOfDayPalette(), []);

  // Page background gradient — dark base with time-tinted corner
  const bgGrad = `linear-gradient(135deg, #020617 0%, rgb(${Math.round(2 + timeGlow.bgR*0.3)},${Math.round(6 + timeGlow.bgG*0.3)},${Math.round(23 + timeGlow.bgB*0.3)}) 50%, rgb(${timeGlow.bgR},${timeGlow.bgG},${timeGlow.bgB}) 100%)`;
  // Card picks up a whisper of the time color
  const cardBorder = `rgba(${timeGlow.pr},${timeGlow.pg},${timeGlow.pb},0.12)`;
  const cardBg = `rgba(${Math.round(15 + timeGlow.bgR * 0.4)},${Math.round(23 + timeGlow.bgG * 0.4)},${Math.round(42 + timeGlow.bgB * 0.4)},0.85)`;

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width = canvas.parentElement.clientWidth;
    const H = canvas.height = canvas.parentElement.clientHeight;
    // Gentle left→right river: each particle drifts rightward with slight vertical wobble
    const particles = Array.from({length:90}, () => {
      const driftX = 0.12 + Math.random() * 0.18; // slow rightward: 0.12–0.30 px/frame
      const driftY = (Math.random() - 0.5) * 0.08; // very slight vertical wander
      return {
        x: Math.random()*W, y: Math.random()*H, r: 1+Math.random()*2,
        vx: driftX, vy: driftY, baseDriftX: driftX, baseDriftY: driftY,
        baseO: 0.12+Math.random()*0.3, o: 0, boost: 0,
        origR: 0, color: [45,212,191],
      };
    });
    particles.forEach(p => { p.o = p.baseO; p.origR = p.r; });

    // Ripple rings from clicks (no mouse tracking)
    const ripples = [];

    // Click → subtle ripple + gentle push (satisfying on sign-in button)
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
      particles.forEach(p => {
        const dx = p.x - cx, dy = p.y - cy;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const force = Math.max(0, 1 - d / 160) * 1.5;
        p.vx += (dx / d) * force;
        p.vy += (dy / d) * force;
        p.boost = Math.max(0, 1 - d / 140);
        if (d < 120) {
          p.color = [45 + Math.round(80 * (1 - d/120)), 212 + Math.round(20 * (1 - d/120)), 191 + Math.round(30 * (1 - d/120))];
        }
      });
      ripples.push({ x: cx, y: cy, radius: 0, maxRadius: 150, opacity: 0.2, speed: 3 });
    });

    // Set particle base color to time-of-day tint
    particles.forEach(p => { p.color = [timeGlow.pr, timeGlow.pg, timeGlow.pb]; });

    let raf;
    function draw() {
      ctx.clearRect(0,0,W,H);

      // Ambient time-of-day glow — single wide wash centered behind the login card
      const g1 = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, Math.max(W,H)*0.7);
      g1.addColorStop(0, `rgba(${timeGlow.r},${timeGlow.g},${timeGlow.b},${timeGlow.o})`);
      g1.addColorStop(0.5, `rgba(${timeGlow.r},${timeGlow.g},${timeGlow.b},${timeGlow.o*0.4})`);
      g1.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, W, H);

      // Draw ripple rings
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rip = ripples[i];
        rip.radius += rip.speed;
        rip.opacity *= 0.96;
        if (rip.opacity < 0.005) { ripples.splice(i, 1); continue; }
        ctx.beginPath(); ctx.arc(rip.x, rip.y, rip.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(45,212,191,${rip.opacity})`;
        ctx.lineWidth = 1.5; ctx.stroke();
        // Inner glow
        if (rip.radius < 60) {
          const grad = ctx.createRadialGradient(rip.x, rip.y, 0, rip.x, rip.y, rip.radius);
          grad.addColorStop(0, `rgba(45,212,191,${rip.opacity * 0.3})`);
          grad.addColorStop(1, 'rgba(45,212,191,0)');
          ctx.fillStyle = grad; ctx.fill();
        }
      }

      particles.forEach(p => {
        // Steer velocity back toward base river drift (recovers after click push)
        p.vx += (p.baseDriftX - p.vx) * 0.04;
        p.vy += (p.baseDriftY - p.vy) * 0.04;

        p.x += p.vx; p.y += p.vy;
        // Wrap: exit right → re-enter left (river flow); vertical wraps normally
        if (p.x > W + 10) { p.x = -10; p.y = Math.random() * H; }
        if (p.x < -10) p.x = W + 10;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

        // Boost fades out quickly
        if (p.boost > 0) { p.boost *= 0.92; if (p.boost < 0.01) p.boost = 0; }
        // Color fades back to time-of-day tint
        p.color[0] += (timeGlow.pr - p.color[0]) * 0.06;
        p.color[1] += (timeGlow.pg - p.color[1]) * 0.06;
        p.color[2] += (timeGlow.pb - p.color[2]) * 0.06;
        // Render radius grows with boost
        const drawR = p.origR + p.boost * 3;
        const drawO = Math.min(1, p.baseO + p.boost * 0.6);

        ctx.beginPath(); ctx.arc(p.x, p.y, drawR, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${Math.round(p.color[0])},${Math.round(p.color[1])},${Math.round(p.color[2])},${drawO})`;
        ctx.fill();
        // Glow halo on boosted particles
        if (p.boost > 0.1) {
          ctx.beginPath(); ctx.arc(p.x, p.y, drawR + 4, 0, Math.PI*2);
          ctx.fillStyle = `rgba(45,212,191,${p.boost * 0.15})`;
          ctx.fill();
        }
      });

      raf = requestAnimationFrame(draw);
    }
    draw();
    return () => cancelAnimationFrame(raf);
  }, []);
  return (
    <div className="login-layout" style={{background: bgGrad}}>
      {/* Animated particle background (full screen) */}
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,zIndex:0}}/>

      {/* Centered login card */}
      <div className="login-card" style={{borderColor: cardBorder, background: cardBg}}>
        {/* Language selector — top right */}
        <div style={{position:'absolute',top:12,right:12}}>
          <Select value={lang} onChange={v=>setLang(v)} size="small" variant="borderless"
            style={{width:100}} options={[{value:'en',label:'English'},{value:'nl',label:'Nederlands'}]}/>
        </div>

        {/* Logo + branding + time-aware greeting */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:44,height:44,background:'var(--brand)',borderRadius:10,display:'inline-flex',
            alignItems:'center',justifyContent:'center',marginBottom:12}}>
            <svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M12 2l8 14H4l8-14z"/></svg>
          </div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>OrbitEOS</div>
          <div style={{fontSize:13,color:'var(--text-secondary)'}}>{(() => {
            const h = new Date().getHours();
            const greetings = {
              en: h < 6 ? 'Good night' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening',
              nl: h < 6 ? 'Goedenacht' : h < 12 ? 'Goedemorgen' : h < 18 ? 'Goedemiddag' : 'Goedenavond',
            };
            return greetings[lang] || greetings.en;
          })()}</div>
        </div>

        {/* Form fields */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:500,color:'var(--text-primary)',marginBottom:4}}>{t.email}</div>
          <Input placeholder="jan@orbiteos.com"/>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:500,color:'var(--text-primary)',marginBottom:4}}>{t.password}</div>
          <Input.Password placeholder="••••••••"/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <label style={{fontSize:11,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
