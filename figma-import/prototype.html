  // ─── Self-Consumption & Autarky (entity-aware) ───
  getSelfConsumption: (entityId) => {
    const ef = MockAPI.getEnergyFlowState(entityId);
    if (!ef) return {selfConsumption:0,autarky:0,solarFraction:0,directUse:0,batteryUse:0,gridFeedIn:0};
    const totalGen = ef.solarPower + ef.windPower;
    const totalLoad = ef.buildingPower + ef.evPower;
    const directUse = Math.min(totalGen, totalLoad);
    const batteryContrib = ef.batteryMode === 'Discharging' ? ef.batteryPower : 0;
    const gridFeedIn = ef.gridExporting ? ef.gridPower : 0;
    const selfConsumption = totalGen > 0 ? Math.round((directUse / totalGen) * 100) : 0;
    const autarky = totalLoad > 0 ? Math.min(100, Math.round(((directUse + batteryContrib) / totalLoad) * 100)) : 0;
    const solarFraction = totalLoad > 0 ? Math.min(100, Math.round((ef.solarPower / totalLoad) * 100)) : 0;
    return { selfConsumption, autarky, solarFraction, directUse: Math.round(directUse*10)/10,
      batteryUse: Math.round(batteryContrib*10)/10, gridFeedIn: Math.round(gridFeedIn*10)/10 };
  },

  // ─── Energy Balance Today (entity-aware) ───
  getEnergyBalance: (entityId) => {
    const ef = MockAPI.getEnergyFlowState(entityId);
    if (!ef) return {produced:0,consumed:0,imported:0,exported:0,stored:0,co2Avoided:0};
    const hourOfDay = new Date().getHours() || 14;
    const factor = hourOfDay / 24;
    const produced = Math.round((ef.solarPower + ef.windPower) * hourOfDay * (0.6 + Math.random()*0.2) * 10) / 10;
    const consumed = Math.round((ef.buildingPower + ef.evPower) * hourOfDay * (0.7 + Math.random()*0.15) * 10) / 10;
    const imported = ef.gridImporting ? Math.round(ef.gridPower * hourOfDay * 0.4 * 10) / 10 : Math.round(consumed * 0.1 * 10) / 10;
    const exported = ef.gridExporting ? Math.round(ef.gridPower * hourOfDay * 0.5 * 10) / 10 : 0;
    const stored = ef.batteryMode === 'Charging' ? Math.round(ef.batteryPower * hourOfDay * 0.3 * 10) / 10 : 0;
    const co2Avoided = Math.round(produced * 0.42 * 10) / 10;
    return { produced, consumed, imported, exported, stored, co2Avoided };
  },

  // ─── Solar Production Stats (entity-aware) ───
  getSolarStats: (entityId) => {
    const id = entityId || 'dg-maasland';
    const ef = MockAPI.getEnergyFlowState(id);
    const devices = EntityStore.getDescendants(id, ['device']);
    const solarDevices = devices.filter(d => d.properties.type === 'Solar Inverter' || d.properties.type === 'Hybrid Inverter');
    const totalCapacity = solarDevices.reduce((acc, d) => {
      const model = d.properties.model || '';
      const match = model.match(/(\d+\.?\d*)/);
      return acc + (match ? parseFloat(match[1]) : 5);
    }, 0);
    const currentOutput = ef?.solarPower || 0;
    const hourOfDay = new Date().getHours() || 14;
    const dailyYield = Math.round(currentOutput * hourOfDay * 0.55 * 10) / 10;
    const monthlyYield = Math.round(dailyYield * 24.5 * 10) / 10;
    const lifetimeYield = Math.round(totalCapacity * 1100 * (0.8 + Math.random()*0.2) * 10) / 10;
    const specificYield = totalCapacity > 0 ? Math.round(dailyYield / totalCapacity * 1000) / 1000 : 0;
    const peakToday = Math.round(currentOutput * (1.1 + Math.random()*0.15) * 10) / 10;
    return { currentOutput, dailyYield, monthlyYield, lifetimeYield: `${(lifetimeYield/1000).toFixed(1)} MWh`,
      specificYield: `${specificYield.toFixed(2)} kWh/kWp`, peakToday, installedCapacity: `${totalCapacity} kWp`,
      strings: solarDevices.length, activePanels: solarDevices.filter(d => d.state.status === 'online').length,
      totalPanels: solarDevices.length };
  },

  // ─── Weather / Irradiance Forecast (entity-aware — uses site location) ───
  getWeatherForecast: (entityId) => {
    const entity = EntityStore.get(entityId || 'dg-maasland');
    let site = entity;
    while (site && site.entityType !== 'site') { site = site.parentId ? EntityStore.get(site.parentId) : null; }
    const lat = site?.properties?.lat || 52.0;
    const hour = new Date().getHours() || 14;
    const isDaytime = hour >= 7 && hour <= 20;
    const baseTemp = 12 + Math.round(Math.sin((hour - 6) / 24 * Math.PI * 2) * 8);
    const irradiance = isDaytime ? Math.round(400 + Math.random() * 500) : 0;
    const forecast = [];
    for (let h = 0; h < 24; h++) {
      const isDay = h >= 7 && h <= 20;
      forecast.push({
        hour: h,
        temp: Math.round(8 + Math.sin((h - 6) / 24 * Math.PI * 2) * 10),
        irradiance: isDay ? Math.round(200 + Math.sin((h - 6) / 14 * Math.PI) * 700) : 0,
        clouds: Math.round(20 + Math.random() * 40),
        wind: Math.round(3 + Math.random() * 8),
      });
    }
    return { temp: baseTemp, irradiance, condition: irradiance > 500 ? 'Sunny' : irradiance > 200 ? 'Partly Cloudy' : isDaytime ? 'Overcast' : 'Night',
      humidity: Math.round(55 + Math.random() * 25), windSpeed: Math.round(3 + Math.random() * 8),
      forecast, sunrise: '06:48', sunset: '19:42', location: site?.properties?.location || 'Netherlands' };
  },

  // ─── Grid Details (entity-aware) ───
  getGridDetails: (entityId) => {
    const ef = MockAPI.getEnergyFlowState(entityId);
    const entity = EntityStore.get(entityId || 'dg-maasland');
    let site = entity;
    while (site && site.entityType !== 'site') { site = site.parentId ? EntityStore.get(site.parentId) : null; }
    const devices = EntityStore.getDescendants(entityId || 'dg-maasland', ['device']);
    const meters = devices.filter(d => ['Power Analyzer','Energy Meter','Smart Meter','CT Meter'].includes(d.properties.type));
    const sensors = meters.flatMap(d => EntityStore.getChildren(d.id).filter(c => c.entityType === 'sensor'));
    const freqSensor = sensors.find(s => s.properties.type === 'frequency');
    const voltageSensor = sensors.find(s => s.properties.type === 'voltage');
    const pfSensor = sensors.find(s => s.properties.type === 'ratio' && s.name.includes('Factor'));
    return {
      power: ef?.gridPower || 0, direction: ef?.gridExporting ? 'export' : ef?.gridImporting ? 'import' : 'balanced',
      frequency: freqSensor?.state?.value || 50.01, voltage: voltageSensor?.state?.value || 230,
      powerFactor: pfSensor?.state?.value || 0.97,
      connection: site?.properties?.connection || '3×25A', dso: site?.properties?.dso || 'Stedin',
      todayImport: Math.round((ef?.gridImporting ? ef.gridPower : 0) * 14 * 0.4 * 10) / 10,
      todayExport: Math.round((ef?.gridExporting ? ef.gridPower : 0) * 14 * 0.5 * 10) / 10,
    };
  },

  // ─── Rules Engine (entity-aware) ───
  getRules: (entityId) => {
    const id = entityId || 'dg-maasland';
    const entity = EntityStore.get(id);
    const ef = MockAPI.getEnergyFlowState(id);
    const hasBattery = EntityStore.getDescendants(id, ['device']).some(d => d.properties.type === 'Battery' || d.properties.type === 'Battery Storage');
    const hasEV = EntityStore.getDescendants(id, ['device']).some(d => d.properties.type === 'EV Charger');
    const hasSolar = ef?.solarActive;
    const rules = [
      {name:'Self-consumption Optimizer',strategy:'Self-consumption',priority:'1 (Highest)',exec:Math.round(80+Math.random()*120),last:'2 min ago',status:'Active'},
    ];
    if (hasBattery) rules.push({name:'Peak Demand Limiter',strategy:'Peak Shaving',priority:'2',exec:Math.round(20+Math.random()*40),last:'15 min ago',status:'Active'});
    if (hasSolar) rules.push({name:'EPEX Day-ahead Scheduler',strategy:'Tariff Arbitrage',priority:'3',exec:Math.round(10+Math.random()*30),last:'1 hour ago',status:'Active'});
    rules.push({name:'Grid Congestion Handler',strategy:'Grid Congestion',priority: hasBattery?'4':'2',exec:Math.round(1+Math.random()*5),last:'Yesterday',status:'Standby'});
    if (hasBattery) rules.push({name:'Emergency Backup Reserve',strategy:'Emergency Backup',priority:'0 (Override)',exec:1,last:'5 days ago',status:'Active'});
    if (hasEV) rules.push({name:'Smart EV Charging',strategy:'EV Optimization',priority:'5',exec:Math.round(5+Math.random()*15),last:'3 hours ago',status:'Active'});
    return rules;
  },
  getActiveRule: (entityId) => {
    const ef = MockAPI.getEnergyFlowState(entityId);
    if (ef?.solarActive && ef.solarPower > 2) {
      return { name:'Self-consumption Optimizer', description:'Maximize use of locally generated energy before importing from grid',
        when:['Solar generation > 2 kW','Battery SoC < 95%'], and:['Grid export price < €0.08/kWh','No peak shaving event active'],
        then:['Charge battery at max rate','Reduce grid export to 0 kW'] };
    }
    return { name:'Peak Demand Limiter', description:'Prevent demand from exceeding contracted limit to avoid penalty charges',
      when:['Live demand > 85% of limit','15-min window active'], and:['Battery SoC > 20%','No emergency backup active'],
      then:['Discharge battery','Reduce non-essential loads'] };
  },

  // ─── Tariff Arbitrage (constant/market-level — walks up to nearest site with prices) ───
  getTariffPrices: (entityId) => {
    return EntityStore.getResolvedProperty(entityId || 'dg-maasland', 'tariffPrices') ||
      EntityStore.get('dg-maasland').properties.tariffPrices;
  },
  getChargeSchedule: (entityId) => {
    const hasBattery = EntityStore.getDescendants(entityId || 'dg-maasland', ['device']).some(d => d.properties.type === 'Battery' || d.properties.type === 'Battery Storage');
    const ef = MockAPI.getEnergyFlowState(entityId);
    const schedule = [];
    if (hasBattery) {
      schedule.push({time:'02:00 – 06:00',action:'Charge battery @ low tariff',cost:'€1.80',color:'var(--success)'});
      if (ef?.solarActive) schedule.push({time:'12:00 – 14:00',action:'Solar surplus → Battery',cost:'€0.00',color:'var(--info)'});
      schedule.push({time:'17:00 – 19:00',action:'Discharge → Avoid peak price',cost:'-€8.40',color:'var(--error)'});
    } else {
      schedule.push({time:'02:00 – 06:00',action:'Shift flexible loads to off-peak',cost:'€2.40',color:'var(--success)'});
      schedule.push({time:'17:00 – 19:00',action:'Reduce grid import (peak hours)',cost:'-€4.20',color:'var(--warning)'});
    }
    return schedule;
  },
  getTariffForecast: (entityId) => {
    const ef = MockAPI.getEnergyFlowState(entityId);
    const totalLoad = (ef?.buildingPower || 5) + (ef?.evPower || 0);
    const withoutOpt = (totalLoad * 0.22 * 24 * 0.7).toFixed(2);
    const cost = (withoutOpt * 0.35).toFixed(2);
    return { cost: `€${cost}`, withoutOpt: `€${withoutOpt}`, savingPct: '65' };
  },

  // ─── Peak Shaving (entity-aware — aggregates from descendants) ───
  getPeakShavingState: (entityId) => {
    return EntityStore.getAggregatedPeakShaving(entityId || 'dg-maasland') ||
      EntityStore.getAggregatedPeakShaving('dg-maasland');
  },
  getDemandBars: (entityId) => {
    const ps = MockAPI.getPeakShavingState(entityId);
    if (!ps) return [20,25,30,35,38,42,39,36,32,28,24,20,18,22,28,32];
    const limit = ps.contractLimit || 40;
    const live = ps.liveDemand || 30;
    return Array.from({length:16}, (_,i) => {
      const base = live * (0.5 + Math.sin(i/16*Math.PI)*0.5);
      return Math.round(Math.min(limit * 1.1, base + (Math.random()-0.3) * limit * 0.15));
    });
  },
  getPeakEvents: (entityId) => {
    const ps = MockAPI.getPeakShavingState(entityId);
    const hasBattery = EntityStore.getDescendants(entityId || 'dg-maasland', ['device']).some(d => d.properties.type === 'Battery' || d.properties.type === 'Battery Storage');
    const limit = ps?.contractLimit || 40;
    const peak1 = (limit * 1.03).toFixed(1), peak2 = (limit * 0.995).toFixed(1), peak3 = (limit * 1.065).toFixed(1);
    return [
      {time:'Mar 23, 09:15',peak:`${peak1} kW`,dur:'4 min',response:hasBattery?'Discharged 2.8 kWh':'Load curtailment',result:'Mitigated',penalty:'€120',peakColor:'var(--error)',respColor:'var(--success)',resultClass:'online'},
      {time:'Mar 21, 17:42',peak:`${peak2} kW`,dur:'8 min',response:hasBattery?'Discharged 1.2 kWh':'EV charging paused',result:'Mitigated',penalty:'€120',peakColor:'var(--warning)',respColor:'var(--success)',resultClass:'online'},
      {time:'Mar 18, 08:30',peak:`${peak3} kW`,dur:'12 min',response:hasBattery?'Battery SoC too low':'No response available',result:'Breach',penalty:'€0',peakColor:'var(--error)',respColor:'var(--error)',resultClass:'error'},
    ];
  },

  // ─── Battery Management (entity-aware — reads sensor children for SoC/SoH/temp/cycles) ───
  getBatteries: (entityId) => {
    const id = entityId || 'dg-maasland';
    const entity = EntityStore.get(id);
    const devices = entity?.entityType === 'device' ? [entity] : EntityStore.getDescendants(id, ['device']);
    return devices.filter(d => d.properties.type === 'Battery Storage' || d.properties.type === 'Battery' ||
      (d.properties.type && d.properties.type.toLowerCase().includes('battery')))
      .map(d => {
        const sensors = EntityStore.getChildren(d.id).filter(c => c.entityType === 'sensor');
        const sensorVal = (type) => { const s = sensors.find(s => s.properties.type === type || s.name.toLowerCase().includes(type)); return s ? s.state.value : null; };
        const soc = sensorVal('percentage') ?? sensorVal('charge') ?? 50;
        const soh = sensors.find(s => s.name.includes('Health'))?.state?.value ?? 95;
        const temp = sensorVal('temperature') ?? 25;
        const cycles = sensorVal('counter') ?? sensors.find(s => s.name.includes('Cycle'))?.state?.value ?? 0;
        return {
          name: d.name, serial: d.id.toUpperCase(), soc, soh, cycles, temp, power: d.state.power,
          cap: d.properties.capacity || d.properties.model || '—',
          color: soc > 60 ? 'var(--success)' : soc > 30 ? 'var(--warning)' : 'var(--error)',
        };
      });
  },
  getBatteryFleetSummary: (entityId) => {
    const batteries = MockAPI.getBatteries(entityId);
    if (batteries.length === 0) return {totalCap:'0 kWh',available:'0 kWh',avgSoh:'—',throughput:'0 kWh'};
    const totalCap = batteries.reduce((acc,b) => { const m = String(b.cap).match(/(\d+\.?\d*)/); return acc + (m?parseFloat(m[1]):10); }, 0);
    const avgSoc = batteries.reduce((acc,b) => acc+b.soc, 0) / batteries.length;
    const available = (totalCap * avgSoc / 100).toFixed(1);
    const avgSoh = (batteries.reduce((acc,b) => acc+b.soh, 0) / batteries.length).toFixed(1);
    const throughput = Math.round(totalCap * 0.8 * (25 + Math.random()*10));
    return { totalCap:`${totalCap.toFixed(1)} kWh`, available:`${available} kWh`, avgSoh:`${avgSoh}%`, throughput:`${throughput} kWh` };
  },

  // ─── EV Charging (entity-aware) ───
  getChargers: (entityId) => {
    const id = entityId || 'dg-maasland';
    const entity = EntityStore.get(id);
    const devices = entity?.entityType === 'device' ? [entity] : EntityStore.getDescendants(id, ['device']);
    const statusMap = {online:'Charging',available:'Available',fault:'Fault',offline:'Offline',idle:'Available',warning:'Warning'};
    return devices.filter(d => d.properties.type === 'EV Charger')
      .map(d => {
        const st = d.state.status;
        const displayStatus = statusMap[st] || st;
        // Check sensors for session/vehicle info
        const sensors = EntityStore.getChildren(d.id).filter(c => c.entityType === 'sensor');
        const sessionSensor = sensors.find(s => s.name.toLowerCase().includes('session') || s.name.toLowerCase().includes('vehicle'));
        return {
          name: d.name, id: d.id.toUpperCase(), power: d.state.power, status: displayStatus,
          vehicle: sessionSensor?.state?.value || '—', soc: null,
          color: st==='online'?'var(--success)':st==='fault'?'var(--error)':st==='available'?'var(--text-tertiary)':'var(--warning)',
        };
      });
  },
  getChargingSessions: (entityId) => {
    const chargers = MockAPI.getChargers(entityId);
    const vehicles = ['Tesla M3','VW ID.4','BMW iX3','Hyundai Ioniq 5','Polestar 2','Audi Q4 e-tron','Kia EV6','Mercedes EQA'];
    return chargers.filter(c => c.status === 'Charging' || Math.random() > 0.3).slice(0,5).map((c,i) => ({
      charger: c.id, vehicle: vehicles[i % vehicles.length],
      energy: `${(8 + Math.random() * 30).toFixed(1)} kWh`,
      cost: `€${(1 + Math.random() * 5).toFixed(2)}`,

// ─── Entity Tree Node (recursive) ───
function EntityTreeNode({ entity, focusedEntityId, setFocusedEntityId, depth, expandedNodes, toggleExpand }) {
  const children = EntityStore.getChildren(entity.id);
  const hasChildren = children.length > 0;
  const isExpanded = expandedNodes.has(entity.id);
  const isActive = entity.id === focusedEntityId;
  const childCount = EntityStore.getDescendants(entity.id).length;

  return (
    <div>
      <div className={`sidebar-tree-node ${isActive?'active':''}`}
        style={{paddingLeft: 12 + depth * 16}}
        onClick={() => setFocusedEntityId(entity.id)}>
        <span className="tree-expand" onClick={(e) => { e.stopPropagation(); if(hasChildren) toggleExpand(entity.id); }}
          style={{cursor: hasChildren?'pointer':'default', opacity: hasChildren?1:0.3}}>
          {hasChildren ? (isExpanded ? '▾' : '▸') : '·'}
        </span>
        <EntityTypeIcon type={entity.entityType} style={{fontSize:13, color: isActive?'var(--brand)':'var(--text-tertiary)'}}/>
        <span className="tree-name">{entity.name}</span>
        {hasChildren && <span className="tree-badge">{childCount}</span>}
      </div>
      {hasChildren && isExpanded && children.map(child => (
        <EntityTreeNode key={child.id} entity={child} focusedEntityId={focusedEntityId}
          setFocusedEntityId={setFocusedEntityId} depth={depth+1}
          expandedNodes={expandedNodes} toggleExpand={toggleExpand}/>
      ))}
    </div>
  );
}

// ─── Entity Scope Selector (Cascading searchable combo: Account → Sub-account → Site) ───
function EntityScopeSelector({ focusedEntityId, setFocusedEntityId, lang }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const ref = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  useEffect(() => { if (open && inputRef.current) inputRef.current.focus(); }, [open]);

  // Build cascading options: Account → Sub-account → Site
  const accounts = EntityStore.getByType('account');
  const buildTree = () => {
    const items = [];
    accounts.forEach(acc => {
      items.push({ ...acc, depth: 0 });
      const subs = EntityStore.getChildren(acc.id).filter(c => c.entityType === 'subAccount');
      subs.forEach(sub => {
        items.push({ ...sub, depth: 1 });
        const sites = EntityStore.getChildren(sub.id).filter(c => c.entityType === 'site');
        sites.forEach(site => {
          items.push({ ...site, depth: 2 });
          // Nested sites
          const nested = EntityStore.getChildren(site.id).filter(c => c.entityType === 'site');
          nested.forEach(ns => items.push({ ...ns, depth: 3 }));
        });
      });
      // Direct sites under account
      const directSites = EntityStore.getChildren(acc.id).filter(c => c.entityType === 'site');
      directSites.forEach(site => items.push({ ...site, depth: 1 }));
    });
    return items;
  };

  const allItems = useMemo(buildTree, []);
  const filtered = search
    ? allItems.filter(item => item.name.toLowerCase().includes(search.toLowerCase()))
    : allItems;

  // Current focused entity name for display
  const focused = EntityStore.get(focusedEntityId);
  const focusedName = focused ? focused.name : '—';

  const depthColors = ['var(--text-primary)', 'var(--text-secondary)', 'var(--text-primary)', 'var(--text-secondary)'];
  const depthIcons = { account: BankOutlined, subAccount: TeamOutlined, site: HomeOutlined };

  return (
    <div ref={ref} style={{position:'relative',display:'inline-flex'}}>
      <div onClick={() => setOpen(!open)}
        style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:6,cursor:'pointer',
          fontSize:12,fontWeight:500,color:'var(--text-secondary)',background: open?'var(--bg-card-hover)':'transparent',
          border:'1px solid transparent',transition:'all 0.15s'}}
        onMouseEnter={e => { if(!open) e.currentTarget.style.borderColor='var(--border)'; }}
        onMouseLeave={e => { if(!open) e.currentTarget.style.borderColor='transparent'; }}>
        <EntityTypeIcon type={focused?.entityType||'site'} style={{fontSize:12,color:'var(--brand)'}}/>
        <span style={{color:'var(--text-primary)',fontWeight:600}}>{focusedName}</span>
        <span style={{fontSize:10,color:'var(--text-tertiary)',transform:open?'rotate(180deg)':'rotate(0)',transition:'transform 0.15s'}}>▾</span>
      </div>
      {open && (
        <div style={{position:'absolute',top:'100%',left:0,marginTop:4,width:280,background:'var(--bg-card)',
          border:'1px solid var(--border)',borderRadius:10,boxShadow:'var(--shadow)',zIndex:200,overflow:'hidden'}}>
          {/* Search input */}
          <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)'}}>
            <input ref={inputRef} value={search} onChange={e => setSearch(e.target.value)}
              placeholder={lang==='nl'?'Zoek account, site...':'Search account, site...'}
              style={{width:'100%',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',fontSize:12,
                background:'var(--bg-secondary)',color:'var(--text-primary)',outline:'none'}}/>
          </div>
          {/* Results */}
          <div style={{maxHeight:280,overflowY:'auto',padding:'4px 0'}}>
            {filtered.length === 0 && (
              <div style={{padding:'16px',textAlign:'center',fontSize:12,color:'var(--text-tertiary)'}}>
                {lang==='nl'?'Geen resultaten':'No results'}
              </div>
            )}
            {filtered.map(item => {
              const isActive = item.id === focusedEntityId;
              const Icon = depthIcons[item.entityType] || HomeOutlined;
              return (
                <div key={item.id}
                  style={{padding:'6px 12px',paddingLeft: 12 + (search ? 0 : item.depth * 16),display:'flex',alignItems:'center',gap:8,
                    cursor:'pointer',fontSize:12,color: isActive?'var(--brand)':depthColors[item.depth],
                    fontWeight: isActive?600: item.depth===0?600: item.depth===1?500:400,
                    background: isActive?'var(--brand-bg)':'transparent',transition:'background 0.1s'}}
                  onMouseEnter={e => { if(!isActive) e.currentTarget.style.background='var(--bg-card-hover)'; }}
                  onMouseLeave={e => { if(!isActive) e.currentTarget.style.background= isActive?'var(--brand-bg)':'transparent'; }}
                  onClick={() => { setFocusedEntityId(item.id); setOpen(false); setSearch(''); }}>
                  <span style={{fontSize:13,color: isActive?'var(--brand)':'var(--text-tertiary)',flexShrink:0}}>
                    {React.createElement(Icon)}
                  </span>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</span>
                  {item.entityType==='site' && <span style={{fontSize:10,color:'var(--text-tertiary)',flexShrink:0}}>
                    {EntityStore.getDescendants(item.id).filter(d=>d.entityType==='device').length} {lang==='nl'?'apparaten':'devices'}
                  </span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Header Component ───
function Header({ page, t, lang, setLang, themeId, setThemeId, alarms, alarmCount, showAlarms, setShowAlarms, focusedEntityId, setFocusedEntityId, setPage, navigateWithLoader, setCurrentApp, currentApp }) {
  const titles = { dashboard:t.dashboard, energyFlow:t.energyFlow, fleet:t.fleet, devices:t.devices,
    alerts:t.alerts, rulesEngine:t.rulesEngine, tariffArbitrage:t.tariffArbitrage, peakShaving:t.peakShaving,
    batteryMgmt:t.batteryMgmt, evCharging:t.evCharging, configuration:t.configuration };
  const [bellRing, setBellRing] = useState(false);
  const [spotlightOpen, setSpotlightOpen] = useState(false);
  useEffect(() => { if(alarmCount>0){setBellRing(true); setTimeout(()=>setBellRing(false),600);} }, [alarmCount]);

  // Ctrl+K / Cmd+K shortcut
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setSpotlightOpen(true); }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  const navigateToEntity = (entityId) => {
    setFocusedEntityId(entityId);
    setCurrentApp('configuration');
    navigateWithLoader('configuration');
  };

  const appObj = NavigationStore.getApp(currentApp);
  const appLabel = appObj ? appObj.label[lang] : '';
  return (
    <div className="header">
      <div className="header-left">
        <div className="header-breadcrumb" style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
          <span style={{fontSize:13,color:'var(--text-tertiary)'}}>{appLabel}</span>
          <span style={{color:'var(--text-tertiary)'}}>/</span>
          <strong style={{fontSize:13,color:'var(--text-primary)'}}>{titles[page]||page}</strong>
        </div>
      </div>
      <div className="header-right">
        <button className="header-btn" onClick={() => setSpotlightOpen(true)} style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'var(--text-tertiary)'}}>
          <SearchOutlined/><span className="spotlight-kbd" style={{marginLeft:4}}>⌘K</span>
        </button>
        <SpotlightSearch open={spotlightOpen} onClose={() => setSpotlightOpen(false)} lang={lang} t={t} navigateToEntity={navigateToEntity}/>
        <button className="lang-toggle" onClick={()=>setLang(lang==='en'?'nl':'en')}>
          <GlobalOutlined style={{marginRight:4}}/>{lang==='en'?'EN':'NL'}
        </button>
        <Select value={themeId} onChange={v => setThemeId(v)} size="small" variant="borderless"
          style={{minWidth:120}} popupMatchSelectWidth={false}
          options={ThemeStore.getAll().map(th => ({
            value: th.id,
            label: React.createElement('span',{style:{display:'flex',alignItems:'center',gap:6}},
              React.createElement('span',{style:{width:10,height:10,borderRadius:'50%',background:th.preview,display:'inline-block',border:'1px solid rgba(128,128,128,0.3)',flexShrink:0}}),
              th.name)
          }))}/>
        <div style={{position:'relative'}}>
          <div className={`alarm-bell ${bellRing?'ringing':''}`} onClick={()=>setShowAlarms(!showAlarms)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            {alarmCount>0 && <div className="badge">{alarmCount>9?'9+':alarmCount}</div>}
          </div>
          {showAlarms && (
            <div className="alarm-dropdown">
              <div className="alarm-dropdown-header">
                <span style={{fontSize:13,fontWeight:600,color:'var(--text-primary)'}}>{t.alerts}</span>
                <span style={{fontSize:11,color:'var(--brand)',cursor:'pointer'}}
                  onClick={()=>{setShowAlarms(false);}}>Clear all</span>
              </div>
              {alarms.slice(0,5).map((a,i) => (
                <div key={i} className="alarm-dropdown-item">
                  <div className="alarm-dot" style={{background: a.sev==='critical'?'var(--error)':a.sev==='warning'?'var(--warning)':'var(--info)'}}/>
                  <div>
                    <div style={{fontSize:12,color:'var(--text-primary)'}}>{a.msg}</div>
                    <div style={{fontSize:11,color:'var(--text-tertiary)'}}>{a.dev} · {a.time}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* User Profile */}
        <HeaderUserProfile lang={lang} setPage={setPage} setCurrentApp={setCurrentApp}/>
      </div>
    </div>
  );
}

// ─── StatCard ───
function StatCard({label, value, trend, trendDir, color}) {
  return (
    <div className="stat-card">
      <div className="top-bar" style={{background: color||'var(--brand)'}}/>

      <div className="value">{value}</div>

  );
}

// ─── Widget Registry ───
// Each widget is a self-contained micro-frontend manifest.
// The dashboard shell knows NOTHING about individual widgets — it reads this registry.
// To add a marketplace widget: call WidgetRegistry.register({...manifest}).
// Contract: { id, label:{en,nl}, desc:{en,nl}, icon:string, size:'full'|'half', chromeless?:bool,
//             component: React component ({t,lang,currentSite,data}) => JSX,
//             dataProvider: (siteId, MockAPI) => data object }
const WidgetRegistry = (() => {
  const _widgets = new Map();
  return {
    register(manifest) { _widgets.set(manifest.id, manifest); },
    get(id) { return _widgets.get(id); },
    getAll() { return Array.from(_widgets.values()); },
    getAllIds() { return Array.from(_widgets.keys()); },
    has(id) { return _widgets.has(id); },
  };
})();

// ─── Drag helpers (shared by drawer and grid) ───
function useDragReorder(items, setItems) {
  const dragIdx = React.useRef(null);
  const [dragOverIdx, setDragOverIdx] = React.useState(null);
  const onDragStart = (idx) => (e) => {
    dragIdx.current = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', idx);
    requestAnimationFrame(() => e.target.classList.add('dragging'));
  };
  const onDragEnd = (e) => {
    e.target.classList.remove('dragging');
    dragIdx.current = null;
    setDragOverIdx(null);
  };
  const onDragOver = (idx) => (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOverIdx(idx); };
  const onDragLeave = () => setDragOverIdx(null);
  const onDrop = (idx) => (e) => {
    e.preventDefault();
    setDragOverIdx(null);
    const from = dragIdx.current;
    if (from === null || from === idx) return;
    const next = [...items];
    const [moved] = next.splice(from, 1);
    next.splice(idx, 0, moved);
    setItems(next);
    dragIdx.current = null;
  };
  return { dragOverIdx, onDragStart, onDragEnd, onDragOver, onDragLeave, onDrop };
}

// ─── Customize Drawer ───
// Reads widget metadata from WidgetRegistry — the drawer itself knows nothing about individual widgets.
function CustomizeDrawer({widgets, setWidgets, onClose, lang}) {
  const toggle = (idx) => {
    const next = [...widgets];
    next[idx] = {...next[idx], visible: !next[idx].visible};
    setWidgets(next);
  };
  const resetLayout = () => setWidgets(MockAPI.getDefaultWidgetLayout());
  const drag = useDragReorder(widgets, setWidgets);
  return (
    <div className="customize-overlay" onClick={(e)=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="customize-drawer">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:16,fontWeight:600,color:'var(--text-primary)'}}>
            <SettingOutlined style={{marginRight:8}}/>{lang==='nl'?'Dashboard Aanpassen':'Customize Dashboard'}
          </div>
          <button className="widget-btn" onClick={onClose} style={{width:28,height:28,fontSize:16}}>×</button>
        </div>
        <div style={{fontSize:12,color:'var(--text-tertiary)',marginBottom:16}}>
          {lang==='nl'?'Schakel widgets in/uit en versleep om te herordenen.':'Toggle widgets on/off and drag to reorder.'}
        </div>
        {widgets.map((w, idx) => {
          const manifest = WidgetRegistry.get(w.id);
          if (!manifest) return null;
          return (
            <div key={w.id}
              className={`customize-item ${w.visible?'':'disabled'} ${drag.dragOverIdx===idx?'drag-over':''}`}
              draggable onDragStart={drag.onDragStart(idx)} onDragEnd={drag.onDragEnd}
              onDragOver={drag.onDragOver(idx)} onDragLeave={drag.onDragLeave} onDrop={drag.onDrop(idx)}>
              <div className="drag-handle" title={lang==='nl'?'Versleep':'Drag to reorder'}>⣿</div>
              <Switch size="small" checked={w.visible} onChange={()=>toggle(idx)}/>
              <span style={{fontSize:16,color:w.visible?'var(--brand)':'var(--text-tertiary)'}}>
                {React.createElement(resolveIcon(manifest.icon))}
              </span>
              <div style={{flex:1}}>
                <div className="customize-item-name">{manifest.label[lang]}</div>
                <div className="customize-item-desc">{manifest.desc[lang]}</div>
              </div>
            </div>
          );
        })}
        <div style={{marginTop:16,display:'flex',gap:8}}>
          <button className="header-btn" onClick={resetLayout} style={{flex:1}}>
            <SwapOutlined style={{marginRight:4}}/>{lang==='nl'?'Standaard Herstellen':'Reset to Default'}
          </button>
          <button className="header-btn primary" onClick={onClose} style={{flex:1}}>
            {lang==='nl'?'Klaar':'Done'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Dashboard Page — Pure Shell ───
// Two customize modes:
//   1. Grid mode (drag icon): drag-reposition widgets directly on the grid
//   2. List mode (list icon): slide-out drawer for enable/disable + reorder
// Both modes share the same widgets state. The shell knows nothing about individual widgets.
function DashboardPage({t, lang, currentSite, focusedEntityId, setFocusedEntityId}) {
  const entityId = focusedEntityId || currentSite;
  const entity = EntityStore.get(entityId);
  const children = entity ? EntityStore.getChildren(entityId) : [];
  const entityTypeName = entity ? {platform:'Platform',account:'Account',subAccount:'Sub-Account',
    site:'Site',deviceGroup:'Device Group',device:'Device',sensor:'Sensor',actuator:'Actuator'}[entity.entityType] : '';
  const childrenByType = {};
  children.forEach(c => { childrenByType[c.entityType] = (childrenByType[c.entityType]||0) + 1; });
  const [widgets, setWidgets] = useState(() => {
    try {
      const saved = localStorage.getItem('orbiteos-dashboard-layout');
      if (saved) {
        const parsed = JSON.parse(saved);
        const defaults = MockAPI.getDefaultWidgetLayout();
        const savedIds = new Set(parsed.map(w => w.id));
        const merged = parsed
          .filter(p => WidgetRegistry.has(p.id))
          .map(p => {
            const def = defaults.find(d => d.id === p.id);
            return { id: p.id, visible: p.visible != null ? p.visible : (def ? def.visible : true) };
          });
        defaults.forEach(d => { if (!savedIds.has(d.id) && WidgetRegistry.has(d.id)) merged.push({id:d.id, visible:d.visible}); });
        return merged;
      }
    } catch(e) {}
    return MockAPI.getDefaultWidgetLayout();
  });
  const [gridCustomize, setGridCustomize] = useState(false);
  const [listDrawer, setListDrawer] = useState(false);
  const [treePinned, setTreePinned] = useState(false);
  const [treeHovered, setTreeHovered] = useState(false);
  const treeHoverTimer = useRef(null);
  const [treeExpandedNodes, setTreeExpandedNodes] = useState(() => {
    const expanded = new Set();
    EntityStore.getByType('platform').forEach(p => expanded.add(p.id));
    EntityStore.getByType('account').forEach(a => expanded.add(a.id));
    EntityStore.getByType('subAccount').forEach(sa => expanded.add(sa.id));
    const path = EntityStore.getPath(focusedEntityId);
    path.forEach(e => expanded.add(e.id));
    return expanded;
  });

  const toggleTreeExpand = useCallback((id) => {
    setTreeExpandedNodes(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }, []);

  useEffect(() => {
    const path = EntityStore.getPath(focusedEntityId);
    setTreeExpandedNodes(prev => { const next = new Set(prev); path.forEach(e => next.add(e.id)); return next; });

    if (treePinned) return;
    clearTimeout(treeHoverTimer.current);
    treeHoverTimer.current = setTimeout(() => setTreeHovered(true), 120);
  }, [treePinned]);

  const onTreeMouseLeave = useCallback(() => {
    if (treePinned) return;
    clearTimeout(treeHoverTimer.current);
    treeHoverTimer.current = setTimeout(() => setTreeHovered(false), 250);
  }, [treePinned]);

  useEffect(() => {
    localStorage.setItem('orbiteos-dashboard-layout', JSON.stringify(widgets));
  }, [widgets]);

  const visibleWidgets = widgets.filter(w => w.visible);

  // Grid drag-reorder (operates on ALL widgets array by visible index mapping)
  const gridDrag = useDragReorder(widgets, setWidgets);
  // Map visible widget index to full widgets array index
  const visibleToFullIdx = (visIdx) => {
    const wId = visibleWidgets[visIdx]?.id;
    return widgets.findIndex(w => w.id === wId);
  };

  const toggleVisibility = (widgetId) => {
    const idx = widgets.findIndex(w => w.id === widgetId);
    if (idx < 0) return;
    const next = [...widgets];
    next[idx] = {...next[idx], visible: !next[idx].visible};
    setWidgets(next);

              <span style={{fontSize:10,fontWeight:600,textTransform:'uppercase',color:'var(--text-tertiary)',letterSpacing:'0.04em',whiteSpace:'nowrap'}}>
                {lang==='nl'?'Entiteitsboom':'Entity Tree'}

                  <svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor" style={{transform:treePinned?'rotate(0deg)':'rotate(45deg)',transition:'transform 0.2s'}}>

// Extracted widget grid as its own component to enable per-widget memoization
const WidgetGrid = React.memo(function WidgetGrid({visibleWidgets, entityId, t, lang, gridCustomize, gridDrag, visibleToFullIdx, toggleVisibility}) {
  // Cache widget data — only recompute when entityId changes, not on every parent re-render
  const widgetDataCache = useMemo(() => {
    const cache = {};
    visibleWidgets.forEach(w => {
      const manifest = WidgetRegistry.get(w.id);
      if (manifest) cache[w.id] = manifest.dataProvider(entityId);
    });
    return cache;
  }, [entityId, visibleWidgets]);

  return (
      <div className="widget-grid">
        {visibleWidgets.map((w, visIdx) => {
          const manifest = WidgetRegistry.get(w.id);
          if (!manifest) return null;
          const Renderer = manifest.component;
          const widgetData = widgetDataCache[w.id] || manifest.dataProvider(entityId);
          const isFullWidth = manifest.size === 'full';
          const IconComp = resolveIcon(manifest.icon);
          const fullIdx = visibleToFullIdx(visIdx);

          if (manifest.chromeless) {
            return (
              <div key={w.id} style={{gridColumn:'1 / -1', position:'relative'}}
                draggable={gridCustomize}
                onDragStart={gridCustomize ? gridDrag.onDragStart(fullIdx) : undefined}
                onDragEnd={gridCustomize ? gridDrag.onDragEnd : undefined}
                onDragOver={gridCustomize ? gridDrag.onDragOver(fullIdx) : undefined}
                onDragLeave={gridCustomize ? gridDrag.onDragLeave : undefined}
                onDrop={gridCustomize ? gridDrag.onDrop(fullIdx) : undefined}
                className={gridCustomize ? `${gridDrag.dragOverIdx===fullIdx?'drag-over':''}` : ''}>
                <Renderer t={t} lang={lang} currentSite={entityId} data={widgetData}/>
                {gridCustomize && (
                  <div className="chromeless-customize-bar">
                    <span style={{fontSize:10,color:'var(--text-tertiary)',marginRight:4}}>{manifest.label[lang]}</span>
                    <span style={{cursor:'grab',color:'var(--text-tertiary)',fontSize:12}}>⣿</span>
                  </div>
                )}
              </div>
            );
          }
          return (
            <div key={w.id}
              className={`widget-panel ${gridCustomize?'customize-mode':''} ${gridCustomize && gridDrag.dragOverIdx===fullIdx?'drag-over':''}`}
              style={isFullWidth ? {gridColumn:'1 / -1'} : {}}
              draggable={gridCustomize}
              onDragStart={gridCustomize ? gridDrag.onDragStart(fullIdx) : undefined}
              onDragEnd={gridCustomize ? gridDrag.onDragEnd : undefined}
              onDragOver={gridCustomize ? gridDrag.onDragOver(fullIdx) : undefined}
              onDragLeave={gridCustomize ? gridDrag.onDragLeave : undefined}
              onDrop={gridCustomize ? gridDrag.onDrop(fullIdx) : undefined}>
              {gridCustomize && (
                <div className="widget-panel-visibility">
                  <Tooltip title={lang==='nl'?'Verbergen':'Hide'}>
                    <div className="customize-icon-btn" style={{width:22,height:22,fontSize:11}}
                      onClick={(e)=>{e.stopPropagation();toggleVisibility(w.id);}}>
                      <EyeInvisibleOutlined/>
                    </div>
                  </Tooltip>
                </div>
              )}
              {gridCustomize && <div className="widget-panel-drag-handle">⣿</div>}
              <div className="widget-panel-header">
                <div className="widget-panel-title">
                  <span style={{color:'var(--brand)'}}>{React.createElement(IconComp)}</span>
                  {manifest.label[lang]}
                </div>
              </div>
              <div className="widget-panel-body">
                <Renderer t={t} lang={lang} currentSite={entityId} data={widgetData}/>
              </div>
            </div>
          );
        })}
      </div>
  );
});

// ─── Energy Flow Hub Icons (matching Figma / production Lucide style) ───
// Ambient background — blurred color blobs that melt together
// Large, high-opacity blobs on a solid dark base (#0f172a).
// They overlap and blur into each other creating a living, colored atmosphere.
const EnergyAmbientHues = React.memo(function EnergyAmbientHues({ef}) {
  const sz = (pwr, min, max) => Math.round(Math.min(max, min + (pwr / 25) * (max - min)));
  const blobs = [];

  const hasLeft = ef.solarPower > 0 || ef.windPower > 0;
  const hasRight = ef.buildingPower > 0 || ef.evPower > 0 || ef.gridPower > 0;

  // Solar — warm amber glow
  if (ef.solarPower > 0) {
    const noWind = ef.windPower <= 0;
    blobs.push({color:'rgb(245,158,11)', x:'30%', y: noWind ? '50%' : '30%',
      size:sz(ef.solarPower, noWind ? 450 : 380, noWind ? 700 : 600), op:0.45, key:'solar'});
  }

  // Wind — cool cyan
  if (ef.windPower > 0) {
    const noSolar = ef.solarPower <= 0;
    blobs.push({color:'rgb(34,211,238)', x:'30%', y: noSolar ? '50%' : '70%',
      size:sz(ef.windPower, noSolar ? 450 : 350, noSolar ? 700 : 550), op:0.40, key:'wind'});
  }

  // Building — warm orange
  if (ef.buildingPower > 0) blobs.push(
    {color:'rgb(249,115,22)', x: hasLeft ? '68%' : '50%', y:'25%',
      size:sz(ef.buildingPower, 350, 540), op:0.35, key:'bldg'});

  // EV — soft violet
  if (ef.evPower > 0) blobs.push(
    {color:'rgb(167,139,250)', x: hasLeft ? '68%' : '50%', y:'50%',
      size:sz(ef.evPower, 320, 500), op:0.35, key:'ev'});

  // Grid import — rose
  if (ef.gridImporting && ef.gridPower > 0) blobs.push(
    {color:'rgb(244,63,94)', x: hasLeft ? '68%' : '45%', y:'75%',
      size:sz(ef.gridPower, 380, 650), op:0.40, key:'grid'});

  // Grid export — emerald green
  if (ef.gridExporting && ef.gridPower > 0) blobs.push(
    {color:'rgb(52,211,153)', x: hasLeft ? '68%' : '50%', y:'75%',
      size:sz(ef.gridPower, 350, 560), op:0.40, key:'grid'});

  // Fill guarantee: if no left sources, right blobs shift center to cover
  // If no right sources, left blobs are already large enough with blur to reach
  // If NOTHING active (impossible in practice), show a neutral cool wash
  if (blobs.length === 0) blobs.push(
    {color:'rgb(60,80,110)', x:'50%', y:'50%', size:500, op:0.4, key:'idle'});

  return <div className="flow-hue">
    {blobs.map(b => <div key={b.key} className="flow-blob" style={{
      background: b.color, width: b.size, height: b.size,
      left: b.x, top: b.y, transform: 'translate(-50%,-50%)',
      opacity: b.op,
    }}/>)}
  </div>;
});

// Evaluate cubic bezier at parameter t (0..1)
function bezierPoint(p0, p1, p2, p3, t) {
  const u = 1 - t;
  return {
    x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
    y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y,
  };
}

// Speed: 2 kW → 15s (slow trickle), 10 kW → 8s, 30+ kW → 5s
function flowSpeed(kw) { return Math.max(5, Math.min(15, 60 / Math.max(kw, 0.5))); }

function FlowCanvasLayer({ef}) {
  const canvasRef = useRef(null);
  const efRef = useRef(ef);
  const cssW = useRef(0);
  const cssH = useRef(0);
  efRef.current = ef;

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;

    // Track which path set is active
    let isVertical = false;
    function getActivePaths() { return isVertical ? FLOW_PATHS_MOBILE : FLOW_PATHS_DESKTOP; }
    function getCoordSpace() { return isVertical ? {w:800,h:600} : {w:800,h:400}; }

    function buildParticles() {
      const particles = [];
      const ef = efRef.current;
      const paths = getActivePaths();
      const channels = [];
      if (ef.solarActive && ef.solarPower > 0)
        channels.push({path: paths.solar, color: COLOR_SOLAR, power: ef.solarPower});
      if (ef.windActive && ef.windPower > 0)
        channels.push({path: paths.wind, color: COLOR_WIND, power: ef.windPower});
      if (ef.consumptionActive && ef.buildingPower > 0)
        channels.push({path: paths.load, color: COLOR_BUILDING, power: ef.buildingPower});
      if (ef.consumptionActive && ef.evPower > 0)
        channels.push({path: paths.ev, color: COLOR_EV, power: ef.evPower});
      if (ef.gridExporting && ef.gridPower > 0)
        channels.push({path: paths.grid, color: COLOR_EXPORT, power: ef.gridPower});
      if (ef.gridImporting && ef.gridPower > 0)
        channels.push({path: paths.gridIn, color: COLOR_IMPORT, power: ef.gridPower});

      channels.forEach(ch => {
        const n = ch.power > 20 ? 4 : ch.power > 8 ? 3 : 2;
        const dur = flowSpeed(ch.power);
        for (let i = 0; i < n; i++) {
          particles.push({ path: ch.path, color: ch.color, dur, offset: i / n });
        }
      });
      return particles;
    }

    // Parse hex color to {r,g,b}
    function parseColor(c) {
      if (c.startsWith('#') && c.length >= 7) {
        return { r: parseInt(c.slice(1,3),16), g: parseInt(c.slice(3,5),16), b: parseInt(c.slice(5,7),16) };
      }
      return { r:100, g:180, b:200 };
    }

    let particles = buildParticles();
    let lastRebuild = Date.now();
    let animTime = 0; // accumulated animation time in ms
    let lastFrame = performance.now();
    let paused = document.hidden;

    // Pause animation when tab is hidden — prevents particle rush on restore
    function onVisChange() {
      if (document.hidden) { paused = true; }
      else { paused = false; lastFrame = performance.now(); }
    }
    document.addEventListener('visibilitychange', onVisChange);

    function draw(now) {
      if (paused) { raf = requestAnimationFrame(draw); return; }

      // Cap delta to 50ms (20fps min) — prevents burst after minimize/maximize
      const delta = Math.min(now - lastFrame, 50);
      lastFrame = now;
      animTime += delta;

      if (Date.now() - lastRebuild > 2000) {
        particles = buildParticles();
        lastRebuild = Date.now();
      }

      const w = cssW.current;
      const h = cssH.current;
      if (!w || !h) { raf = requestAnimationFrame(draw); return; }

      ctx.clearRect(0, 0, w, h);

      // Scale factors: path coords map to coordinate space
      const cs = getCoordSpace();
      const scX = w / cs.w;
      const scY = h / cs.h;
      const paths = getActivePaths();

      // Draw dashed guide paths
      ctx.save();
      ctx.setLineDash([4, 6]);
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1;
      Object.entries(paths).forEach(([key, pts]) => {
        if (key === 'gridIn') return;
        ctx.beginPath();
        ctx.moveTo(pts[0].x * scX, pts[0].y * scY);
        ctx.bezierCurveTo(pts[1].x*scX, pts[1].y*scY, pts[2].x*scX, pts[2].y*scY, pts[3].x*scX, pts[3].y*scY);
        ctx.stroke();
      });
      ctx.restore();

      // Draw particles — small, subtle
      const elapsed = animTime / 1000;
      particles.forEach(p => {
        const t = ((elapsed / p.dur + p.offset) % 1);
        const pt = bezierPoint(p.path[0], p.path[1], p.path[2], p.path[3], t);
        const sx = pt.x * scX;
        const sy = pt.y * scY;
        const {r,g,b} = parseColor(p.color);

        // Soft glow — small radius
        const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 6);
        grad.addColorStop(0, `rgba(${r},${g},${b},0.3)`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sx, sy, 6, 0, Math.PI * 2);
        ctx.fill();

        // Core dot — 1.5px radius
        ctx.beginPath();
        ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = 0.85;
        ctx.fill();
        ctx.globalAlpha = 1;
      });

      raf = requestAnimationFrame(draw);
    }

    function resize() {
      const parent = canvas.parentElement;
      if (!parent) return;
      const dpr = window.devicePixelRatio || 1;
      const cw = parent.clientWidth;
      const ch = parent.clientHeight;
      cssW.current = cw;
      cssH.current = ch;
      // Switch to vertical paths if container is roughly square or taller than wide
      const wasVertical = isVertical;
      isVertical = ch > cw * 0.7;
      if (wasVertical !== isVertical) { particles = buildParticles(); }
      canvas.width = cw * dpr;
      canvas.height = ch * dpr;
      canvas.style.width = cw + 'px';
      canvas.style.height = ch + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    resize();
    // Use ResizeObserver to handle container resizes (e.g. tree panel pin/unpin)
    let ro;
    const parent = canvas.parentElement;
    if (typeof ResizeObserver !== 'undefined' && parent) {
      ro = new ResizeObserver(() => resize());
      ro.observe(parent);
    }
    window.addEventListener('resize', resize);
    raf = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
      document.removeEventListener('visibilitychange', onVisChange);
      if (ro) ro.disconnect();
    };
  }, []);

  return <canvas ref={canvasRef} className="flow-canvas-layer"/>;
}

          <div style={{display:'flex',alignItems:'flex-end',gap:3,height:200,paddingTop:20}}>

          <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:10,color:'var(--text-tertiary)'}}>
            <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:00</span>

// ─── Spotlight Search ───
function SpotlightSearch({ open, onClose, lang, t, navigateToEntity }) {
  const [query, setQuery] = useState('');
  const [activeIdx, setActiveIdx] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => { if (open && inputRef.current) { inputRef.current.focus(); setQuery(''); setActiveIdx(0); } }, [open]);

  const results = useMemo(() => {
    if (!query.trim()) return { entities: [], alarms: [], users: [] };
    const q = query.toLowerCase();
    const entities = EntityStore.getAll().filter(e => {
      const tags = (e.properties?.tags || []).join(' ').toLowerCase();
      const name = (e.name || '').toLowerCase();
      const type = (e.entityType || '').toLowerCase();
      const mfr = (e.properties?.manufacturer || '').toLowerCase();
      const serial = (e.properties?.serialNumber || '').toLowerCase();
      return name.includes(q) || type.includes(q) || tags.includes(q) || mfr.includes(q) || serial.includes(q);
    }).slice(0, 6);
    const allAlarms = EntityStore.getAggregatedAlarms('orbiteos');
    const alarms = allAlarms.filter(a => (a.msg||'').toLowerCase().includes(q) || (a.dev||'').toLowerCase().includes(q)).slice(0, 3);
    const users = USERS.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || u.role.toLowerCase().includes(q)).slice(0, 3);
    return { entities, alarms, users };
  }, [query]);

  const allItems = [...results.entities.map(e => ({type:'entity',data:e})), ...results.alarms.map(a => ({type:'alarm',data:a})), ...results.users.map(u => ({type:'user',data:u}))];

  const handleKeyDown = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i+1, allItems.length-1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i-1, 0)); }
    else if (e.key === 'Enter' && allItems[activeIdx]) {
      const item = allItems[activeIdx];
      if (item.type === 'entity') navigateToEntity(item.data.id);
      onClose();
    }
    else if (e.key === 'Escape') onClose();
  };

  if (!open) return null;

  const getEntityPath = (entity) => {
    const path = EntityStore.getPath(entity.id);
    return path.slice(0, -1).map(p => p.name).join(' > ');
  };

  let idx = 0;
  return ReactDOM.createPortal(
    <div className="spotlight-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="spotlight-panel">
        <input ref={inputRef} className="spotlight-input" placeholder={t.searchEntities}
          value={query} onChange={e => { setQuery(e.target.value); setActiveIdx(0); }} onKeyDown={handleKeyDown}/>
        <div className="spotlight-results">
          {query.trim() && allItems.length === 0 && (
            <div className="spotlight-empty">{t.noResults}<br/><span style={{fontSize:11}}>Try searching by tag, device name, or serial number</span></div>
          )}
          {results.entities.length > 0 && <div className="spotlight-section">Entities</div>}
          {results.entities.map(e => {
            const i = idx++;
            return (
              <div key={e.id} className={`spotlight-item ${i===activeIdx?'active':''}`}
                onClick={() => { navigateToEntity(e.id); onClose(); }} onMouseEnter={() => setActiveIdx(i)}>
                <div className="spotlight-item-icon"><EntityTypeIcon type={e.entityType}/></div>
                <div className="spotlight-item-info">
                  <div className="spotlight-item-name">{e.name}</div>
                  <div className="spotlight-item-path">{e.entityType} · {getEntityPath(e)}</div>
                </div>
                {(e.properties?.tags||[]).slice(0,2).map(tag => <span key={tag} className="config-tag">{tag}</span>)}
              </div>
            );
          })}
          {results.alarms.length > 0 && <div className="spotlight-section">Alarms</div>}
          {results.alarms.map((a,ai) => {
            const i = idx++;
            return (
              <div key={ai} className={`spotlight-item ${i===activeIdx?'active':''}`} onMouseEnter={() => setActiveIdx(i)}>
                <div className="spotlight-item-icon" style={{color:a.sev==='critical'?'var(--error)':a.sev==='warning'?'var(--warning)':'var(--info)'}}>
                  <ExclamationCircleFilled/>
                </div>
                <div className="spotlight-item-info">
                  <div className="spotlight-item-name">{a.msg}</div>
                  <div className="spotlight-item-path">{a.sev} · {a.entityName||a.dev}</div>
                </div>
              </div>
            );
          })}
          {results.users.length > 0 && <div className="spotlight-section">Users</div>}
          {results.users.map((u,ui) => {
            const i = idx++;
            return (
              <div key={ui} className={`spotlight-item ${i===activeIdx?'active':''}`} onMouseEnter={() => setActiveIdx(i)}>
                <div className="spotlight-item-icon"><UserOutlined/></div>
                <div className="spotlight-item-info">
                  <div className="spotlight-item-name">{u.name}</div>
                  <div className="spotlight-item-path">{u.role} · {u.account}</div>
                </div>
              </div>
            );
          })}
          {!query.trim() && (
            <div className="spotlight-empty" style={{padding:20}}>
              <div style={{marginBottom:8}}>Type to search entities, alarms, users...</div>
              <div style={{fontSize:11}}>
                <span className="spotlight-kbd">↑↓</span> navigate &nbsp;
                <span className="spotlight-kbd">↵</span> select &nbsp;
                <span className="spotlight-kbd">esc</span> close
              </div>
            </div>
          )}
        </div>
      </div>
    </div>,
    document.body
  );
}

// ─── Config Nav List (recursive hierarchy with indent lines) ───
function ConfigNavList({ entity, selectedId, onSelect, expandedNodes, onToggle, filter }) {
  const children = EntityStore.getChildren(entity.id);
  const hasChildren = children.length > 0;
  const isExpanded = expandedNodes.has(entity.id);
  const isActive = entity.id === selectedId;
  const directChildren = children.length;
  const status = entity.state?.status || '';

  // Filter logic — name match on this entity or any descendant
  if (filter) {
    const q = filter.toLowerCase();
    const nameMatch = entity.name.toLowerCase().includes(q);
    const descendantMatch = EntityStore.getDescendants(entity.id).some(d => d.name.toLowerCase().includes(q));
    if (!nameMatch && !descendantMatch) return null;
  }

  const statusColor = status === 'online' ? 'var(--success)' : status === 'warning' ? 'var(--warning)' : (status === 'fault' || status === 'error') ? 'var(--error)' : null;

  const nameRef = useRef(null);
  const [isTruncated, setIsTruncated] = useState(false);
  useEffect(() => {
    const el = nameRef.current;
    if (el) setIsTruncated(el.scrollWidth > el.clientWidth);
  });

  const rowInner = (
    <div className={`config-nav-item ${isActive ? 'active' : ''}`}
      onClick={(e) => { e.stopPropagation(); onSelect(entity.id); }}>
      {statusColor && <span style={{width:6,height:6,borderRadius:'50%',background:statusColor,flexShrink:0}}/>}
      <span className="nav-icon">
        <EntityTypeIcon type={entity.entityType} style={{fontSize:13, color:isActive?'var(--brand)':'var(--text-tertiary)'}}/>
      </span>
      <span className="nav-name" ref={nameRef}>{entity.name}</span>
      {hasChildren && <span className="nav-count">{directChildren}</span>}
      {hasChildren && (
        <span className={`nav-arrow ${isExpanded ? 'open' : ''}`}
          onClick={(e) => { e.stopPropagation(); onToggle(entity.id); }}>
          <RightOutlined style={{fontSize:9}}/>
        </span>
      )}
    </div>
  );
  const row = isTruncated
    ? <Tooltip title={entity.name} placement="right" mouseEnterDelay={0.4}>{rowInner}</Tooltip>
    : rowInner;

  if (!hasChildren) return row;

  return (
    <div>
      {row}
      {isExpanded && (
        <div className="config-nav-children">
          {children.map(child => (
            <ConfigNavList key={child.id} entity={child} selectedId={selectedId} onSelect={onSelect}
              expandedNodes={expandedNodes} onToggle={onToggle} filter={filter}/>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Tab Content: Overview ───
function OverviewTabContent({ entity, t, lang, editMode }) {
  const props = entity.properties || {};
  const state = entity.state || {};
  const etype = entity.entityType;

  const fields = [];
  if (etype === 'platform') {
    fields.push(['Version', props.version], ['Uptime', state.uptime], ['Accounts', state.totalAccounts], ['Sites', state.totalSites], ['Devices', state.totalDevices], ['Timezone', props.timezone], ['Currency', props.currency]);
  } else if (etype === 'account') {
    fields.push(['Type', props.type], ['Contact', props.contactEmail], ['Plan', props.plan], ['VAT', props.vatNumber], ['Contract Start', props.contractStart], ['Contract End', props.contractEnd], ['Users', state.users], ['Sites', state.sites], ['Devices', state.devices]);
  } else if (etype === 'subAccount') {
    fields.push(['Region', props.region], ['DSO', props.dso], ['Language', props.lang], ['Sites', state.sites], ['Devices', state.devices]);
  } else if (etype === 'site') {
    fields.push(['Location', props.location], ['Type', props.type], ['Capacity', props.capacity], ['DSO', props.dso], ['Connection', props.connection], ['Contract Limit', props.contractLimit ? `${props.contractLimit} kW` : '—'], ['Status', state.status], ['Self-consumption', state.selfConsumption ? `${state.selfConsumption}%` : '—']);
  } else if (etype === 'deviceGroup') {
    fields.push(['Type', props.type], ['Devices', props.deviceCount], ['Power', state.power], ['Status', state.status]);
  } else if (etype === 'device') {
    fields.push([t.manufacturer, props.manufacturer], [t.model, props.model], [t.firmwareVersion, props.firmware], ['Power', state.power], ['Status', state.status], [t.serialNumber, props.serialNumber || '—'], [t.installDate, props.installDate || '—']);
  } else if (etype === 'sensor') {
    fields.push(['Type', props.type], ['Unit', props.unit], ['Value', `${state.value} ${props.unit || ''}`], ['Status', state.status]);
  } else if (etype === 'actuator') {
    fields.push(['Type', props.type], ['Unit', props.unit], ['Value', `${state.value} ${props.unit || ''}`], ['Status', state.status]);
  }

  return (
    <div className="config-prop-grid">
      {fields.map(([label, value]) => (
        <div key={label}>
          <div className="config-prop-label">{label}</div>
          {editMode ? <Input size="small" defaultValue={value || ''} style={{marginTop:2}}/> :
            <div className="config-prop-value">{value || '—'}</div>}
        </div>
      ))}
    </div>
  );
}

// ─── Tab Content: Entity List (generic CRUD table for child entities) ───
function EntityListTab({ parentId, childType, t, lang, onNavigate, onAdd }) {
  const children = EntityStore.getChildren(parentId).filter(c => c.entityType === childType);
  const columns = [];
  if (childType === 'account') columns.push({title:'Name',key:'name'},{title:'Type',key:'type'},{title:'Plan',key:'plan'},{title:'Users',key:'users'},{title:'Sites',key:'sites'},{title:'Status',key:'status'});
  else if (childType === 'subAccount') columns.push({title:'Name',key:'name'},{title:'Region',key:'region'},{title:'Sites',key:'sites'},{title:'Devices',key:'devices'});
  else if (childType === 'site') columns.push({title:'Name',key:'name'},{title:'Location',key:'location'},{title:'Type',key:'type'},{title:'Capacity',key:'capacity'},{title:'Devices',key:'devices'},{title:'Status',key:'status'});
  else if (childType === 'deviceGroup') columns.push({title:'Name',key:'name'},{title:'Type',key:'type'},{title:'Devices',key:'deviceCount'},{title:'Power',key:'power'},{title:'Status',key:'status'});
  else if (childType === 'device') columns.push({title:'Name',key:'name'},{title:'Type',key:'type'},{title:t.manufacturer,key:'manufacturer'},{title:'Power',key:'power'},{title:'Status',key:'status'});
  else if (childType === 'sensor') columns.push({title:'Name',key:'name'},{title:'Type',key:'type'},{title:'Value',key:'value'},{title:'Unit',key:'unit'},{title:'Status',key:'status'});
  else if (childType === 'actuator') columns.push({title:'Name',key:'name'},{title:'Type',key:'type'},{title:'Value',key:'value'},{title:'Unit',key:'unit'},{title:'Status',key:'status'});

  const getVal = (entity, key) => {
    if (key === 'name') return entity.name;
    if (key === 'status') return entity.state?.status || '—';
    if (key === 'power') return entity.state?.power || '—';
    if (key === 'value') return entity.state?.value !== undefined ? `${entity.state.value}` : '—';
    return entity.properties?.[key] || entity.state?.[key] || '—';
  };

  const typeLabels = { account:'Account', subAccount:'Sub-account', site:'Site', deviceGroup:'Device Group', device:'Device', sensor:'Sensor', actuator:'Actuator' };

  return (
    <div className="config-tab-content">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:600,color:'var(--text-primary)'}}>{typeLabels[childType]}s ({children.length})</span>
        <button className="header-btn primary" style={{fontSize:11,padding:'4px 12px'}} onClick={() => onAdd(childType)}>
          <PlusOutlined style={{marginRight:4}}/>Add {typeLabels[childType]}
        </button>
      </div>
      <table className="data-table" style={{fontSize:12}}>
        <thead><tr>{columns.map(c => <th key={c.key}>{c.title}</th>)}<th style={{width:60}}>Actions</th></tr></thead>
        <tbody>
          {children.map(child => (
            <tr key={child.id} style={{cursor:'pointer'}} onClick={() => onNavigate(child.id)}>
              {columns.map(c => (
                <td key={c.key}>
                  {c.key === 'status' ? <span className={`status-dot ${getVal(child,c.key)==='online'||getVal(child,c.key)==='active'?'online':getVal(child,c.key)==='fault'?'error':getVal(child,c.key)==='warning'?'warning':'info'}`}>{getVal(child,c.key)}</span>
                    : c.key === 'name' ? <span style={{fontWeight:500}}>{child.name}</span>
                    : getVal(child, c.key)}
                </td>
              ))}
              <td onClick={e => e.stopPropagation()}>
                <span style={{cursor:'pointer',color:'var(--text-tertiary)',marginRight:8}} onClick={() => onNavigate(child.id)}><EditOutlined/></span>
                <span style={{cursor:'pointer',color:'var(--error)'}} onClick={() => {
                  const desc = EntityStore.getDescendants(child.id);
                  Modal.confirm({ title:`Delete ${child.name}?`, content: desc.length > 0 ? `This will also remove ${desc.length} child entities.` : 'This action cannot be undone.',
                    okText:'Delete', okType:'danger', onOk:() => { EntityStore.remove(child.id); }
                  });
                }}><DeleteOutlined/></span>
              </td>
            </tr>
          ))}
          {children.length === 0 && <tr><td colSpan={columns.length+1} style={{textAlign:'center',color:'var(--text-tertiary)',padding:20}}>No {typeLabels[childType].toLowerCase()}s yet</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

            EntityStore.update(entity.id, { properties: { tags: [...tags, newTag.trim()] } }); setNewTag('');
          }}}/>
        <button className="header-btn primary" style={{fontSize:11,padding:'2px 10px'}}
          onClick={() => { if (newTag.trim() && !tags.includes(newTag.trim())) {

function ConfigurationPage({ t, lang, navigateWithLoader, focusedEntityId, setFocusedEntityId }) {
  const [selectedEntityId, setSelectedEntityId] = useState('orbiteos');
  const [expandedNodes, setExpandedNodes] = useState(() => {
    const set = new Set(['orbiteos']);
    EntityStore.getByType('account').forEach(a => set.add(a.id));
    EntityStore.getByType('subAccount').forEach(sa => set.add(sa.id));
    return set;
  });
  const [treeFilter, setTreeFilter] = useState('');
  const [activeTab, setActiveTab] = useState('overview');
  const [editMode, setEditMode] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [drawerChildType, setDrawerChildType] = useState(null);

  const selectedEntity = EntityStore.get(selectedEntityId);
  const tabs = selectedEntity ? TabRegistry.getTabsForEntity(selectedEntity) : [];

  const handleSelect = (entityId) => {
    setSelectedEntityId(entityId);
    setActiveTab('overview');
    setEditMode(false);
    // Auto-expand ancestors
    const path = EntityStore.getPath(entityId);
    setExpandedNodes(prev => {
      const next = new Set(prev);
      path.forEach(p => next.add(p.id));
      return next;
    });
  };

  const handleToggle = (id) => {
    setExpandedNodes(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const handleAdd = (childType) => {
    setDrawerChildType(childType);
    setDrawerOpen(true);
  };

  const handleDrawerClose = (newId) => {
    setDrawerOpen(false);
    if (newId) handleSelect(newId);
  };

  const handleDelete = () => {
    if (!selectedEntity || selectedEntity.entityType === 'platform') return;
    const desc = EntityStore.getDescendants(selectedEntityId);
    Modal.confirm({
      title: `${t.deleteConfirm} ${selectedEntity.name}?`,
      content: desc.length > 0 ? `${t.deleteWarning} ${desc.length} ${t.childEntities}.` : undefined,
      okText: t.deleteEntity, okType: 'danger',
      onOk: () => {
        const parentId = selectedEntity.parentId;
        EntityStore.remove(selectedEntityId);
        handleSelect(parentId || 'orbiteos');
      },
    });
  };

  // Build breadcrumb
  const breadcrumb = selectedEntity ? EntityStore.getPath(selectedEntityId) : [];

  // Render tab content
  const renderTabContent = (tabDef) => {
    if (!selectedEntity) return null;
    const key = tabDef.key;
    if (key === 'overview') return <OverviewTabContent entity={selectedEntity} t={t} lang={lang} editMode={editMode}/>;
    if (tabDef.type === 'children') return <EntityListTab parentId={selectedEntityId} childType={tabDef.childType} t={t} lang={lang} onNavigate={handleSelect} onAdd={handleAdd}/>;
    if (key === 'usersRoles') return <UsersRolesTab entityId={selectedEntityId} t={t} lang={lang}/>;
    if (key === 'events') return <EventsTab entity={selectedEntity} lang={lang}/>;
    if (key === 'alarms') return <AlarmsTab entity={selectedEntity}/>;
    if (key === 'auditLog') return <AuditLogTab entity={selectedEntity}/>;
    if (key === 'tags') return <TagsTab entity={selectedEntity}/>;
    if (key === 'globalSettings') return <GlobalSettingsTab entity={selectedEntity} t={t}/>;
    if (key === 'connection') return <ConnectionTab entity={selectedEntity}/>;
    if (key === 'firmware') return <FirmwareTab entity={selectedEntity}/>;
    if (key === 'thresholds') return <ThresholdsTab entity={selectedEntity}/>;
    if (key === 'commands') return <CommandsTab entity={selectedEntity}/>;
    if (key === 'siteSettings') return <SiteSettingsTab entity={selectedEntity} t={t}/>;
    if (key === 'compliance') return <ComplianceTab entity={selectedEntity}/>;
    if (key === 'location') return <LocationTab entity={selectedEntity}/>;
    if (key === 'billing') return <BillingTab entity={selectedEntity}/>;
    if (key === 'apiKeys') return <ApiKeysTab entity={selectedEntity}/>;
    if (key === 'domains') return <DomainsTab entity={selectedEntity}/>;
    if (key === 'regionalSettings') return <RegionalSettingsTab entity={selectedEntity} t={t}/>;
    if (key === 'groupSettings') return <GroupSettingsTab entity={selectedEntity} t={t}/>;

    // Fallback
    return <div className="config-tab-content" style={{color:'var(--text-tertiary)',fontSize:12,padding:20,textAlign:'center'}}>{tabDef.label[lang]}</div>;

  const platform = EntityStore.get('orbiteos');

  return (

            {platform && <ConfigNavList entity={platform} selectedId={selectedEntityId} onSelect={handleSelect}
              expandedNodes={expandedNodes} onToggle={handleToggle} filter={treeFilter}/>}

        {/* Detail Panel */}
        <div className="config-detail-panel">
          {selectedEntity ? (

              <div style={{fontSize:40,marginBottom:12}}><ApartmentOutlined/></div>
              <div style={{fontSize:14}}>Select an entity from the tree</div>
