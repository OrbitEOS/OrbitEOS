// Time-of-day palette — used by both page background and canvas
function getTimeOfDayPalette() {
  const h = new Date().getHours();
  const m = new Date().getMinutes();
  const t = h + m / 60;
  // [hour, glowR,G,B, glowOpacity, particleR,G,B, bgBottomR,G,B]
  // Teal-green base throughout — subtle shifts in warmth/coolness with time
  const stops = [
    [0,  10, 40, 50, 0.15,   20,120,130,  10, 50, 50],   // midnight — dark teal
    [5,  15, 55, 60, 0.18,   30,140,140,  12, 58, 55],   // pre-dawn — teal lifting
    [6,  30, 80, 70, 0.20,   60,180,160,  15, 68, 60],   // dawn — warmer teal
    [9,  25, 90, 80, 0.20,   45,200,180,  16, 72, 68],   // morning — bright teal
    [12, 30,110, 95, 0.22,   45,212,191,  19, 78, 74],   // noon — brand teal peak
    [15, 25,100, 88, 0.20,   40,200,178,  17, 74, 70],   // afternoon — teal
    [17, 20, 85, 78, 0.18,   35,180,165,  15, 68, 65],   // late afternoon — softer teal
    [19, 18, 60, 65, 0.18,   30,140,145,  13, 58, 58],   // dusk — cooler teal
    [21, 12, 45, 55, 0.16,   25,120,135,  11, 52, 52],   // evening — muted teal
    [24, 10, 40, 50, 0.15,   20,120,130,  10, 50, 50],   // midnight wrap
  ];
  let lo = stops[0], hi = stops[1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (t >= stops[i][0] && t < stops[i+1][0]) { lo = stops[i]; hi = stops[i+1]; break; }
  }
  const frac = (t - lo[0]) / (hi[0] - lo[0] || 1);
  const lerp = (a, b) => Math.round(a + (b - a) * frac);
  return {
    r: lerp(lo[1], hi[1]), g: lerp(lo[2], hi[2]), b: lerp(lo[3], hi[3]),
    o: lo[4] + (hi[4] - lo[4]) * frac,
    pr: lerp(lo[5], hi[5]), pg: lerp(lo[6], hi[6]), pb: lerp(lo[7], hi[7]),
    bgR: lerp(lo[8], hi[8]), bgG: lerp(lo[9], hi[9]), bgB: lerp(lo[10], hi[10]),
  };
}

/**
 * OrbitLoader — Reusable loading glow control
 *
 * Two modes:
 *   ambient (default) — transparent overlay, glow breathes over content
 *   solid             — opaque background, blocks content (login transition)
 *
 * Usage:
 *   <OrbitLoader />                              — ambient, pulses forever
 *   <OrbitLoader mode="solid" />                 — opaque background
 *   <OrbitLoader stopping onDone={fn} />         — triggers exit then calls fn
 *   <OrbitLoader color={{r:59,g:130,b:246}} />   — blue glow
 *   <OrbitLoader size={{width:200,height:200}} /> — fixed size
 *
 * Global overlay via LoaderStore:
 *   LoaderStore.start()                — ambient overlay
 *   LoaderStore.start({mode:'solid'})  — solid overlay (login)
 *   LoaderStore.stop()                 — exit + dissolve
 */
function OrbitLoader({ stopping = false, color, onDone, size = 'full', className, mode = 'ambient' }) {
  const canvasRef = useRef(null);
  const doneRef = useRef(false);
  const stoppingRef = useRef(stopping);
  const exitStartRef = useRef(null);
  const modeRef = useRef(mode);

  const R = color?.r ?? 45, G = color?.g ?? 212, B = color?.b ?? 191;
  const solid = mode === 'solid';

  useEffect(() => { stoppingRef.current = stopping; }, [stopping]);
  useEffect(() => { modeRef.current = mode; }, [mode]);

  useEffect(() => {
    const cvs = canvasRef.current;
    if (!cvs) return;
    const par = cvs.parentElement;
    const ctx = cvs.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const W = par.clientWidth, H = par.clientHeight;
    if (!W || !H) return;
    cvs.width = W * dpr; cvs.height = H * dpr;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Theme-aware background color (solid mode only)
    const isDark = document.body.getAttribute('data-theme') !== 'light';
    const BG_R = isDark ? 2 : 248, BG_G = isDark ? 6 : 250, BG_B = isDark ? 23 : 252;
    const isSolid = modeRef.current === 'solid';

    const cx = W / 2, cy = H / 2;
    const dim = Math.min(W, H);
    const PEAK = dim * 0.44;            // gentle peak
    const REST = dim * 0.16;            // soft resting glow
    const CYCLE = 2000;                 // ms per breath — slow, calm
    const ATK = 0.25;                   // gentle rise (25% = 500ms)
    let raf, paused = document.hidden;

    function onVis() { paused = document.hidden; }
    document.addEventListener('visibilitychange', onVis);

    // Single glow draw — one gradient, one arc
    function glow(radius, alpha) {
      if (alpha < 0.005 || radius < 1) return;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      const coreAlpha = alpha * 0.9;
      g.addColorStop(0,    isDark ? `rgba(255,255,255,${coreAlpha})` : `rgba(${R},${G},${B},${coreAlpha})`);
      g.addColorStop(0.05, `rgba(${R},${G},${B},${alpha * 0.75})`);
      g.addColorStop(0.3,  `rgba(${R},${G},${B},${alpha * 0.22})`);
      g.addColorStop(0.65, `rgba(${R},${G},${B},${alpha * 0.05})`);
      g.addColorStop(1,    `rgba(${R},${G},${B},0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
    }

    // Pulse: 0→1→0, gentle rise, slow release
    function pulse(elapsed) {
      const t = (elapsed % CYCLE) / CYCLE;
      if (t < ATK) { const p = t / ATK; return p * p; }
      const p = (t - ATK) / (1 - ATK);
      return 1 - p * p;
    }

    const t0 = performance.now();
    let bgAlpha = isSolid ? 1 : 0;
    const EXIT_DUR = isSolid ? 1500 : 800; // ambient exits faster

    function draw(now) {
      if (paused) { raf = requestAnimationFrame(draw); return; }
      const elapsed = now - t0;
      ctx.clearRect(0, 0, W, H);

      // Exit fade
      if (stoppingRef.current) {
        if (!exitStartRef.current) exitStartRef.current = now;
        const ex = now - exitStartRef.current;
        const t = Math.min(ex / EXIT_DUR, 1);
        const fade = 1 - t * t * (3 - 2 * t); // S-curve

        if (fade > 0.001) {
          if (isSolid) {
            ctx.fillStyle = `rgba(${BG_R},${BG_G},${BG_B},${fade})`;
            ctx.fillRect(0, 0, W, H);
          }
          const p = pulse(elapsed);
          glow(REST + p * (PEAK - REST), (0.20 + p * 0.40) * fade);
        }

        if (t >= 1 && !doneRef.current) {
          doneRef.current = true;
          cancelAnimationFrame(raf);
          document.removeEventListener('visibilitychange', onVis);
          if (onDone) onDone();
          return;
        }
        raf = requestAnimationFrame(draw);
        return;
      }

      // Active
      if (isSolid) {
        ctx.fillStyle = `rgba(${BG_R},${BG_G},${BG_B},1)`;
        ctx.fillRect(0, 0, W, H);
      }
      const p = pulse(elapsed);
      glow(REST + p * (PEAK - REST), 0.20 + p * 0.40);
      raf = requestAnimationFrame(draw);
    }

    raf = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(raf); document.removeEventListener('visibilitychange', onVis); };
  }, [R, G, B, solid]);

  const wrapStyle = size === 'full'
    ? { position:'relative', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', width:'100%', height:'100%' }
    : { position:'relative', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', width: size.width, height: size.height };

  return (
    <div className={className} style={wrapStyle}>
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,zIndex:1}}/>
    </div>
  );
}

/**
 * OrbitLoaderOverlay — Full-content overlay driven by LoaderStore.
 *
 * Any page/component can trigger:
 *   LoaderStore.start()                — ambient glow over content
 *   LoaderStore.start({mode:'solid'})  — opaque overlay (login)
 *   LoaderStore.stop()                 — exit + dissolve
 *   navigateWithLoader('page')         — ambient start + navigate + auto-stop
 */
function OrbitLoaderOverlay({ onDone }) {
  const { active, stopping, mode } = useLoaderStore();

  const handleDone = useCallback(() => {
    LoaderStore._reset();
    if (onDone) onDone();
  }, [onDone]);

  if (!active) return null;

  // Ambient: pointer-events none so content stays interactive
  // Solid: blocks interaction until stopping
  const blockInput = mode === 'solid' && !stopping;

  return (
    <div style={{
      position:'absolute', inset:0, zIndex:10,
      pointerEvents: blockInput ? 'auto' : 'none',
    }}>
      <OrbitLoader stopping={stopping} onDone={handleDone}
        mode={mode} size="full" className="orbit-overlay-inner" />
    </div>
  );
}

function LoginPage({t, setPage, setCurrentApp, lang, setLang, themeId, setThemeId}) {
  const canvasRef = useRef(null);
  const [emailVal, setEmailVal] = useState('jan@orbiteos.com');
  const [passwordVal, setPasswordVal] = useState('orbit2026');
  const [greetName, setGreetName] = useState('Jan');
  const [error, setError] = useState(null); // {type, message}
  const [fieldErrors, setFieldErrors] = useState({}); // {email?, password?}
  const [shaking, setShaking] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [successPhase, setSuccessPhase] = useState(0); // 0=none, 1=checkmark, 2=card-exit, 3=done
  const [attemptsLeft, setAttemptsLeft] = useState(null);
  const [lockCountdown, setLockCountdown] = useState(0);
  const formRef = useRef(null);
  const timeGlow = useMemo(() => getTimeOfDayPalette(), []);
  const activeTheme = ThemeStore.getById(themeId) || ThemeStore.getAll()[0];

  // Extract first name from email on blur (e.g. "jan.de.vries@acme.nl" → "Jan")
  const onEmailBlur = useCallback(() => {
    const prefix = emailVal.split('@')[0] || '';
    const raw = prefix.split(/[._-]/)[0];
    if (raw.length >= 2) {
      setGreetName(raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase());
    } else {
      setGreetName('');
    }
    // Clear email field error on blur if user fixed it
    if (fieldErrors.email && emailVal.trim() && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal.trim())) {
      setFieldErrors(prev => ({...prev, email: null}));
    }
  }, [emailVal, fieldErrors.email]);

  // Lockout countdown timer
  useEffect(() => {
    if (lockCountdown <= 0) return;
    const iv = setInterval(() => {
      setLockCountdown(prev => {
        if (prev <= 1) { setError(null); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [lockCountdown]);

  // SUD error mapper — maps error codes to {message, fieldErrors}
  const mapError = useCallback((result) => {
    const errs = {};
    let msg = '';
    switch (result.error) {
      case 'emptyEmail':
        msg = t.errEmptyEmail; errs.email = true; break;
      case 'invalidEmail':
        msg = t.errInvalidEmail; errs.email = true; break;
      case 'emptyPassword':
        msg = t.errEmptyPassword; errs.password = true; break;
      case 'shortPassword':
        msg = t.errShortPassword; errs.password = true; break;
      case 'noAccount':
        msg = t.errNoAccount; errs.email = true; break;
      case 'wrongPassword':
        msg = t.errWrongPassword; errs.password = true; break;
      case 'locked':
        msg = (t.errLocked || '').replace('{secs}', result.secsLeft || 30);
        setLockCountdown(result.secsLeft || 30);
        break;
      case 'inactive':
        msg = t.errInactive; break;
      default:
        msg = 'Something went wrong. Please try again.';
    }
    // Show attempts warning
    if (result._attempts && result._remaining) {
      setAttemptsLeft(result._remaining);
    } else {
      setAttemptsLeft(null);
    }
    return { msg, errs };
  }, [t]);

  // Handle login
  const handleLogin = useCallback(() => {
    if (submitting) return;
    setError(null);
    setFieldErrors({});
    setAttemptsLeft(null);

    const result = UserStore.authenticate(emailVal, passwordVal);

    if (!result.ok) {
      const { msg, errs } = mapError(result);
      setError({ message: msg });
      setFieldErrors(errs);
      // SUD delight: gentle shake on error
      setShaking(true);
      setTimeout(() => setShaking(false), 500);
      return;
    }

    // SUD Success Sequence: checkmark → card exit → shell assemble
    setSubmitting(true);
    setSuccessPhase(1); // Button morphs to checkmark
    setTimeout(() => setSuccessPhase(2), 600); // Card scales down + fades
    setTimeout(() => {
      setCurrentApp && setCurrentApp('dashboard');
      LoaderStore.start({ mode: 'solid' });
      setPage('dashboard');
      setTimeout(() => LoaderStore.stop(), 4200);
    }, 1100); // Transition to shell after card fully exits
  }, [emailVal, passwordVal, submitting, mapError, setPage, setCurrentApp]);

  // Handle Enter key
  const onKeyDown = useCallback((e) => {
    if (e.key === 'Enter') handleLogin();
  }, [handleLogin]);

  // SSO click handler
  const handleSso = useCallback(() => {
    setError({ message: t.errSsoUnavailable });
    setShaking(true);
    setTimeout(() => setShaking(false), 500);
  }, [t]);

  // Page background gradient — uses theme's base colors with time tint
  const themeBgBase = activeTheme.cssVars['--bg-primary'] || '#020617';
  const themeBgSec = activeTheme.cssVars['--bg-secondary'] || '#0f172a';
  const isDarkTheme = activeTheme.mode === 'dark';
  const bgGrad = isDarkTheme
    ? `linear-gradient(135deg, ${themeBgBase} 0%, rgb(${Math.round(2 + timeGlow.bgR*0.3)},${Math.round(6 + timeGlow.bgG*0.3)},${Math.round(23 + timeGlow.bgB*0.3)}) 50%, rgb(${timeGlow.bgR},${timeGlow.bgG},${timeGlow.bgB}) 100%)`
    : `linear-gradient(135deg, ${themeBgBase} 0%, ${themeBgSec} 100%)`;
  const cardBorder = isDarkTheme
    ? `rgba(${timeGlow.pr},${timeGlow.pg},${timeGlow.pb},0.12)`
    : (activeTheme.cssVars['--border'] || '#e2e8f0');
  const cardBg = isDarkTheme
    ? `rgba(${Math.round(15 + timeGlow.bgR * 0.4)},${Math.round(23 + timeGlow.bgG * 0.4)},${Math.round(42 + timeGlow.bgB * 0.4)},0.85)`
    : (activeTheme.cssVars['--bg-card'] || 'rgba(255,255,255,0.92)');

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width = canvas.parentElement.clientWidth;
    const H = canvas.height = canvas.parentElement.clientHeight;
    // Parse theme brand color to RGB for particles
    const brandHex = activeTheme.preview || '#d97706';
    const brandR = parseInt(brandHex.slice(1,3),16), brandG = parseInt(brandHex.slice(3,5),16), brandB = parseInt(brandHex.slice(5,7),16);
    // Gentle left→right river: each particle drifts rightward with slight vertical wobble
    const particles = Array.from({length:90}, () => {
      const driftX = 0.12 + Math.random() * 0.18;
      const driftY = (Math.random() - 0.5) * 0.08;
      return {
        x: Math.random()*W, y: Math.random()*H, r: 1+Math.random()*2,
        vx: driftX, vy: driftY, baseDriftX: driftX, baseDriftY: driftY,
        baseO: 0.12+Math.random()*0.3, o: 0, boost: 0,
        origR: 0, color: [brandR,brandG,brandB],
      };
    });
    particles.forEach(p => { p.o = p.baseO; p.origR = p.r; });

    // Ripple rings from clicks (no mouse tracking)
    const ripples = [];

    // Click → subtle ripple + gentle push (satisfying on sign-in button)
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
      particles.forEach(p => {
        const dx = p.x - cx, dy = p.y - cy;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const force = Math.max(0, 1 - d / 160) * 1.5;
        p.vx += (dx / d) * force;
        p.vy += (dy / d) * force;
        p.boost = Math.max(0, 1 - d / 140);
        if (d < 120) {
          p.color = [brandR + Math.round(80 * (1 - d/120)), brandG + Math.round(20 * (1 - d/120)), brandB + Math.round(30 * (1 - d/120))];
        }
      });
      ripples.push({ x: cx, y: cy, radius: 0, maxRadius: 150, opacity: 0.2, speed: 3 });
    });

    // Set particle base color to time-of-day tint
    particles.forEach(p => { p.color = [timeGlow.pr, timeGlow.pg, timeGlow.pb]; });

    let raf;
    let loginPaused = document.hidden;
    function onLoginVis() {
      if (document.hidden) loginPaused = true;
      else loginPaused = false;
    }
    document.addEventListener('visibilitychange', onLoginVis);

    function draw() {
      if (loginPaused) { raf = requestAnimationFrame(draw); return; }
      ctx.clearRect(0,0,W,H);

      // Ambient time-of-day glow — single wide wash centered behind the login card
      const g1 = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, Math.max(W,H)*0.7);
      g1.addColorStop(0, `rgba(${timeGlow.r},${timeGlow.g},${timeGlow.b},${timeGlow.o})`);
      g1.addColorStop(0.5, `rgba(${timeGlow.r},${timeGlow.g},${timeGlow.b},${timeGlow.o*0.4})`);
      g1.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, W, H);

      // Draw ripple rings
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rip = ripples[i];
        rip.radius += rip.speed;
        rip.opacity *= 0.96;
        if (rip.opacity < 0.005) { ripples.splice(i, 1); continue; }
        ctx.beginPath(); ctx.arc(rip.x, rip.y, rip.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${brandR},${brandG},${brandB},${rip.opacity})`;
        ctx.lineWidth = 1.5; ctx.stroke();
        // Inner glow
        if (rip.radius < 60) {
          const grad = ctx.createRadialGradient(rip.x, rip.y, 0, rip.x, rip.y, rip.radius);
          grad.addColorStop(0, `rgba(${brandR},${brandG},${brandB},${rip.opacity * 0.3})`);
          grad.addColorStop(1, `rgba(${brandR},${brandG},${brandB},0)`);
          ctx.fillStyle = grad; ctx.fill();
        }
      }

      particles.forEach(p => {
        // Steer velocity back toward base river drift (recovers after click push)
        p.vx += (p.baseDriftX - p.vx) * 0.04;
        p.vy += (p.baseDriftY - p.vy) * 0.04;

        p.x += p.vx; p.y += p.vy;
        // Wrap: exit right → re-enter left (river flow); vertical wraps normally
        if (p.x > W + 10) { p.x = -10; p.y = Math.random() * H; }
        if (p.x < -10) p.x = W + 10;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

        // Boost fades out quickly
        if (p.boost > 0) { p.boost *= 0.92; if (p.boost < 0.01) p.boost = 0; }
        // Color fades back to time-of-day tint
        p.color[0] += (timeGlow.pr - p.color[0]) * 0.06;
        p.color[1] += (timeGlow.pg - p.color[1]) * 0.06;
        p.color[2] += (timeGlow.pb - p.color[2]) * 0.06;
        // Render radius grows with boost
        const drawR = p.origR + p.boost * 3;
        const drawO = Math.min(1, p.baseO + p.boost * 0.6);

        ctx.beginPath(); ctx.arc(p.x, p.y, drawR, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${Math.round(p.color[0])},${Math.round(p.color[1])},${Math.round(p.color[2])},${drawO})`;
        ctx.fill();
        // Glow halo on boosted particles
        if (p.boost > 0.1) {
          ctx.beginPath(); ctx.arc(p.x, p.y, drawR + 4, 0, Math.PI*2);
          ctx.fillStyle = `rgba(${brandR},${brandG},${brandB},${p.boost * 0.15})`;
          ctx.fill();
        }
      });

      raf = requestAnimationFrame(draw);
    }
    draw();
    return () => { cancelAnimationFrame(raf); document.removeEventListener('visibilitychange', onLoginVis); };
  }, []);

  // On success, LoginPage calls setPage('loading') — the App component handles the shell + overlay

  return (
    <div className={`login-layout ${successPhase >= 2 ? 'login-bg-exit' : ''}`} style={{background: bgGrad}}>
      {/* Animated particle background (full screen) */}
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,zIndex:0,opacity:successPhase>=2?0:1,transition:'opacity 0.5s ease'}}/>

      {/* Centered login card */}
      <div className={`login-card ${successPhase >= 2 ? 'login-card-exit' : ''}`} style={{borderColor: cardBorder, background: cardBg}}>
        {/* Theme + Language selectors — top row */}
        <div style={{position:'absolute',top:12,right:12,display:'flex',alignItems:'center',gap:4}}>
          <Select value={themeId} onChange={v => setThemeId(v)} size="small" variant="borderless"
            style={{minWidth:110}} popupMatchSelectWidth={false}
            options={ThemeStore.getAll().map(th => ({
              value: th.id,
              label: React.createElement('span',{style:{display:'flex',alignItems:'center',gap:6}},
                React.createElement('span',{style:{width:8,height:8,borderRadius:'50%',background:th.preview,display:'inline-block',border:'1px solid rgba(128,128,128,0.3)',flexShrink:0}}),
                th.name)
            }))}/>
          <Select value={lang} onChange={v=>setLang(v)} size="small" variant="borderless"
            style={{width:100}} options={[{value:'en',label:'English'},{value:'nl',label:'Nederlands'}]}/>
        </div>

        {/* Logo + branding + time-aware greeting */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:44,height:44,background:'var(--brand)',borderRadius:10,display:'inline-flex',
            alignItems:'center',justifyContent:'center',marginBottom:12}}>
            <svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M12 2l8 14H4l8-14z"/></svg>
          </div>
          <div style={{fontSize:20,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>OrbitEOS</div>
          {greetName && <div style={{fontSize:14,color:'var(--brand)',fontWeight:500,transition:'all 0.3s ease',opacity:0.9}}>{(() => {
            const h = new Date().getHours();
            const greetings = {
              en: h < 5 ? 'Good evening' : h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening',
              nl: h < 5 ? 'Goedenavond' : h < 12 ? 'Goedemorgen' : h < 18 ? 'Goedemiddag' : 'Goedenavond',
            };
            return `${greetings[lang] || greetings.en}, ${greetName}`;
          })()}</div>}
        </div>

        {/* Error banner — SUD: slide-in, clear language, actionable */}
        {error && (
          <div className="login-error">
            <span className="login-error-icon"><ExclamationCircleOutlined/></span>
            <span className="login-error-text">{error.message}</span>
          </div>
        )}

        {/* Form fields */}
        <div ref={formRef} className={shaking ? 'login-shake' : ''}>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:500,color:'var(--text-primary)',marginBottom:4}}>{t.email}</div>
            <Input placeholder="jan@orbiteos.com" value={emailVal}
              className={fieldErrors.email ? 'login-field-error' : ''}
              onChange={e => { setEmailVal(e.target.value); if(fieldErrors.email) setFieldErrors(p=>({...p,email:null})); }}
              onBlur={onEmailBlur} onKeyDown={onKeyDown} status={fieldErrors.email ? 'error' : ''}/>
          </div>
          <div style={{marginBottom:4}}>
            <div style={{fontSize:12,fontWeight:500,color:'var(--text-primary)',marginBottom:4}}>{t.password}</div>
            <Input.Password placeholder="••••••••" value={passwordVal}
              className={fieldErrors.password ? 'login-field-error' : ''}
              onChange={e => { setPasswordVal(e.target.value); if(fieldErrors.password) setFieldErrors(p=>({...p,password:null})); }}
              onKeyDown={onKeyDown} status={fieldErrors.password ? 'error' : ''}/>
          </div>
          <div style={{height: attemptsLeft ? 4 : 12}}/>
          {attemptsLeft && attemptsLeft <= 3 && (
            <div className="login-attempts-warn" style={{marginBottom:8}}>
              <WarningOutlined style={{marginRight:4,fontSize:11}}/>
              {(t.loginAttemptsLeft||'').replace('{n}', attemptsLeft)}
            </div>
          )}
          {lockCountdown > 0 && (
            <div style={{textAlign:'center',marginBottom:8,fontSize:20,fontWeight:700,color:'#f59e0b',fontVariantNumeric:'tabular-nums'}}>
              0:{String(lockCountdown).padStart(2,'0')}
            </div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <label style={{fontSize:11,color:'var(--text-secondary)',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
              <input type="checkbox"/> {t.rememberMe}
            </label>
            <span style={{fontSize:11,color:'var(--brand)',cursor:'pointer'}}>{t.forgotPassword}</span>
          </div>
          <button className={successPhase >= 1 ? 'login-btn-success' : ''}
            style={{width:'100%',padding:'10px',fontSize:14,fontWeight:600,borderRadius:8,border:'none',
            background: lockCountdown > 0 ? 'var(--text-tertiary)' : 'var(--brand)',
            color:'#fff',cursor: lockCountdown > 0 ? 'not-allowed' : 'pointer',
            transition:'all 0.3s ease',letterSpacing:'0.02em',
            boxShadow: lockCountdown > 0 ? 'none' : `0 2px 8px ${activeTheme.cssVars['--brand-bg'] || 'rgba(217,119,6,0.3)'}`,
            opacity: submitting && !successPhase ? 0.7 : 1}}
            disabled={lockCountdown > 0 || submitting}
            onMouseEnter={e=>{if(lockCountdown<=0&&!successPhase)e.target.style.background='var(--brand-hover)';}}
            onMouseLeave={e=>{if(lockCountdown<=0&&!successPhase)e.target.style.background='var(--brand)';}}
            onClick={handleLogin}>
            {successPhase >= 1
              ? React.createElement(CheckOutlined, {style:{fontSize:18}})
              : t.signInBtn}
          </button>
        </div>

        {/* Register link */}
        <div style={{textAlign:'center',marginTop:14,fontSize:12,color:'var(--text-secondary)'}}>
          {lang==='nl'?'Geen account?':'No account?'}{' '}
          <span style={{color:'var(--brand)',cursor:'pointer',fontWeight:500}}
            onMouseEnter={e=>e.target.style.textDecoration='underline'}
            onMouseLeave={e=>e.target.style.textDecoration='none'}>
            {lang==='nl'?'Registreren':'Register'}
          </span>
        </div>

        {/* SSO divider */}
        <div style={{display:'flex',alignItems:'center',gap:12,margin:'16px 0 12px'}}>
          <div style={{flex:1,height:1,background:'rgba(255,255,255,0.08)'}}/>
          <span style={{fontSize:10,color:'var(--text-tertiary)',textTransform:'uppercase',letterSpacing:'0.05em'}}>{lang==='nl'?'of':'or'}</span>
          <div style={{flex:1,height:1,background:'rgba(255,255,255,0.08)'}}/>
        </div>

        {/* SSO icon buttons — Google, Apple, Microsoft */}
        <div style={{display:'flex',justifyContent:'center',gap:12}}>
          {/* Google */}
          <button style={{width:40,height:40,borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.05)',
            cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s ease',padding:0}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.12)'}

// ─── Entity Browser Page ───
function EntityBrowserPage({t, currentSite}) {
  const site = MockAPI.getSite(currentSite);
  const [selectedEntity, setSelectedEntity] = useState(null);
  const [expandedGroups, setExpandedGroups] = useState(new Set(site.deviceGroups.map(g=>g.id)));
  const [expandedDevices, setExpandedDevices] = useState(new Set());

  const toggleGroup = (id) => { const s = new Set(expandedGroups); s.has(id)?s.delete(id):s.add(id); setExpandedGroups(s); };
  const toggleDevice = (id) => { const s = new Set(expandedDevices); s.has(id)?s.delete(id):s.add(id); setExpandedDevices(s); };

  // Count totals
  let totalDevices=0, totalSensors=0, totalActuators=0;
  site.deviceGroups.forEach(g => g.devices_list.forEach(d => {
    totalDevices++; totalSensors += (d.sensors||[]).length; totalActuators += (d.actuators||[]).length;
  }));

  return (
    <div className="page-enter">
      <div className="stat-grid stat-grid-4" style={{marginBottom:16}}>
        <StatCard label="Device Groups" value={site.deviceGroups.length} color="var(--info)"/>
        <StatCard label="Devices" value={totalDevices} color="var(--brand)"/>
        <StatCard label="Sensors" value={totalSensors} color="var(--solar)"/>
        <StatCard label="Actuators" value={totalActuators} color="var(--purple)"/>
      </div>
      <div className="entity-layout">
        {/* Entity Tree */}
        <div className="card" style={{padding:0,overflow:'auto',maxHeight:'calc(100vh - 260px)'}}>
          <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:600,color:'var(--text-primary)'}}><HomeOutlined style={{marginRight:6}}/>{site.name}</span>
            <span className="status-dot online" style={{fontSize:10}}>{site.status==='online'?t.online:t.maintenance}</span>
          </div>
          {site.deviceGroups.map(group => (
            <div key={group.id}>
              <div className={`entity-node ${selectedEntity?.id===group.id?'active':''}`}
                onClick={()=>{toggleGroup(group.id);setSelectedEntity({...group,entityType:'deviceGroup'});}}>
                <span className="entity-node-icon" style={{color:group.type==='Generation'?'var(--solar)':group.type==='Storage'?'var(--battery)':group.type==='EV Charging'?'var(--ev)':group.type==='Metering'?'var(--info)':'var(--text-secondary)'}}>{React.createElement(group.type==='Generation'?ThunderboltOutlined:group.type==='Storage'?DatabaseOutlined:group.type==='EV Charging'?CarOutlined:group.type==='Metering'?BarChartOutlined:group.type==='HVAC'?ExperimentOutlined:group.type==='Infrastructure'?BuildOutlined:group.type==='Grid'?ApiOutlined:group.type==='Gateway'?WifiOutlined:AppstoreOutlined)}</span>
                <span className="entity-node-name">{group.name}</span>
                <span className="entity-node-count">{group.devices_list.length}</span>
                <span style={{fontSize:10,color:'var(--text-tertiary)'}}>{expandedGroups.has(group.id)?'▼':'▶'}</span>
              </div>
              {expandedGroups.has(group.id) && group.devices_list.map(device => (
                <div key={device.id}>
                  <div className={`entity-node ${selectedEntity?.id===device.id?'active':''}`}
                    style={{paddingLeft:32}} onClick={()=>{toggleDevice(device.id);setSelectedEntity({...device,entityType:'device'});}}>
                    <span className="entity-node-icon" style={{fontSize:12,color:device.status==='online'||device.status==='available'?'var(--success)':device.status==='fault'||device.status==='error'?'var(--error)':device.status==='warning'?'var(--warning)':'var(--text-tertiary)'}}>
                      {React.createElement(device.status==='online'||device.status==='available'?CheckCircleFilled:device.status==='fault'||device.status==='error'?CloseCircleFilled:device.status==='warning'?ExclamationCircleFilled:MinusCircleFilled)}
                    </span>
                    <span className="entity-node-name" style={{fontSize:12}}>{device.name}</span>
                    {((device.sensors||[]).length + (device.actuators||[]).length) > 0 &&
                      <span className="entity-node-count">{(device.sensors||[]).length + (device.actuators||[]).length}</span>}
                    <span style={{fontSize:10,color:'var(--text-tertiary)'}}>{expandedDevices.has(device.id)?'▼':'▶'}</span>
                  </div>
                  {expandedDevices.has(device.id) && (
                    <>
                      {(device.sensors||[]).map(s => (
                        <div key={s.id} className={`entity-node ${selectedEntity?.id===s.id?'active':''}`}
                          style={{paddingLeft:56,fontSize:11}} onClick={()=>setSelectedEntity({...s,entityType:'sensor'})}>
                          <span style={{color:'var(--solar)',fontSize:11}}><RadarChartOutlined/></span>
                          <span style={{flex:1,color:'var(--text-secondary)'}}>{s.name}</span>
                          <span style={{fontSize:11,fontWeight:600,color:'var(--text-primary)'}}>{s.value} {s.unit}</span>
                        </div>
                      ))}
                      {(device.actuators||[]).map(a => (
                        <div key={a.id} className={`entity-node ${selectedEntity?.id===a.id?'active':''}`}
                          style={{paddingLeft:56,fontSize:11}} onClick={()=>setSelectedEntity({...a,entityType:'actuator'})}>
                          <span style={{color:'var(--purple)',fontSize:11}}><SlidersOutlined/></span>
                          <span style={{flex:1,color:'var(--text-secondary)'}}>{a.name}</span>
                          <span style={{fontSize:11,fontWeight:600,color:'var(--text-primary)'}}>{a.value} {a.unit}</span>
                        </div>
                      ))}
                    </>
                  )}
                </div>
              ))}
            </div>
          ))}
        </div>
        {/* Detail Panel */}
        <div className="card">
          {selectedEntity ? (
            <>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
                <div style={{width:40,height:40,borderRadius:8,background:'var(--brand-bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>
                  {React.createElement(selectedEntity.entityType==='deviceGroup'?AppstoreOutlined:selectedEntity.entityType==='device'?HddOutlined:selectedEntity.entityType==='sensor'?RadarChartOutlined:SlidersOutlined)}
                </div>
                <div>
                  <div style={{fontSize:16,fontWeight:600,color:'var(--text-primary)'}}>{selectedEntity.name}</div>
                  <div style={{fontSize:12,color:'var(--text-tertiary)'}}>
                    {selectedEntity.entityType==='deviceGroup'?`Device Group · ${selectedEntity.type}`:
                     selectedEntity.entityType==='device'?`${selectedEntity.type} · ${selectedEntity.manufacturer} ${selectedEntity.model}`:
                     selectedEntity.entityType==='sensor'?`Sensor · ${selectedEntity.type}`:`Actuator · ${selectedEntity.type}`}
                  </div>
                </div>
                {selectedEntity.status && <span className={`status-dot ${selectedEntity.status==='online'||selectedEntity.status==='available'?'online':selectedEntity.status==='fault'?'error':'warning'}`} style={{marginLeft:'auto'}}>{selectedEntity.status}</span>}
              </div>

              {/* Universal 8 tabs */}
              <Tabs defaultActiveKey="overview" items={[
                {key:'overview',label:'Overview',children:(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    {selectedEntity.entityType==='device' && <>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Manufacturer</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.manufacturer}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Model</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.model}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Firmware</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.firmware}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Power</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.power}</div></div>
                    </>}
                    {selectedEntity.entityType==='deviceGroup' && <>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Type</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.type}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Devices</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.devices_list?.length||0}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Total Power</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.power}</div></div>
                    </>}
                    {(selectedEntity.entityType==='sensor'||selectedEntity.entityType==='actuator') && <>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Type</span><div style={{fontSize:13,fontWeight:500,color:'var(--text-primary)'}}>{selectedEntity.type}</div></div>
                      <div><span style={{fontSize:11,color:'var(--text-tertiary)'}}>Value</span><div style={{fontSize:18,fontWeight:700,color:'var(--brand)'}}>{selectedEntity.value} {selectedEntity.unit}</div></div>
                    </>}
                  </div>
                )},
                {key:'children',label:'Children',children:(
                  selectedEntity.entityType==='device' ? (
                    <div>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--text-primary)',marginBottom:8}}>Sensors ({(selectedEntity.sensors||[]).length})</div>
                      {(selectedEntity.sensors||[]).map(s=>(
                        <div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                          <span style={{color:'var(--text-secondary)'}}>{s.name}</span>
                          <span style={{fontWeight:600,color:'var(--text-primary)'}}>{s.value} {s.unit}</span>
                        </div>
                      ))}
                      <div style={{fontSize:12,fontWeight:600,color:'var(--text-primary)',marginTop:16,marginBottom:8}}>Actuators ({(selectedEntity.actuators||[]).length})</div>
                      {(selectedEntity.actuators||[]).map(a=>(
                        <div key={a.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                          <span style={{color:'var(--text-secondary)'}}>{a.name}</span>
                          <span style={{fontWeight:600,color:'var(--purple)'}}>{a.value} {a.unit}</span>
                        </div>
                      ))}
                    </div>
                  ) : <div style={{color:'var(--text-tertiary)',fontSize:12}}>No children for this entity type</div>
                )},
                {key:'state',label:'State',children:<div style={{fontSize:12,color:'var(--text-tertiary)'}}>Real-time state data (connected via MQTT)</div>},
                {key:'automations',label:'Automations',children:<div style={{fontSize:12,color:'var(--text-tertiary)'}}>Flow rules targeting this entity</div>},
                {key:'events',label:'Events',children:<div style={{fontSize:12,color:'var(--text-tertiary)'}}>Event log from this entity</div>},
                {key:'alarms',label:'Alarms',children:<div style={{fontSize:12,color:'var(--text-tertiary)'}}>Active and historical alarms</div>},
                {key:'dashboard',label:'Dashboard',children:<div style={{fontSize:12,color:'var(--text-tertiary)'}}>Entity-specific dashboard widgets</div>},
                {key:'audit',label:'Audit Log',children:<div style={{fontSize:12,color:'var(--text-tertiary)'}}>Change history and access log</div>},
              ]}/>
            </>
          ) : (
            <div style={{textAlign:'center',padding:40,color:'var(--text-tertiary)'}}>
              <div style={{fontSize:40,marginBottom:12}}><ApartmentOutlined/></div>
              <div style={{fontSize:14}}>Select an entity from the tree</div>
              <div style={{fontSize:12,marginTop:4}}>Platform → Account → Site → Device Group → Device → Sensor/Actuator</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── App ───
function App() {
  const [page, setPage] = useState('login');
  const [lang, setLang] = useState(localStorage.getItem('orbiteos-lang') || 'en');
  const [themeId, setThemeId] = useState(ThemeStore.getActive().id);
  const activeTheme = ThemeStore.getById(themeId) || ThemeStore.getAll()[0];
  const [alarms, setAlarms] = useState([]);
  const [alarmCount, setAlarmCount] = useState(0);
  const [showAlarms, setShowAlarms] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [focusedEntityId, setFocusedEntityId] = useState('dg-maasland');
  const [currentApp, setCurrentApp] = useState('dashboard');
  const prevPageRef = useRef('login');

  const t = T[lang];

  // Persist preferences
  useEffect(() => { localStorage.setItem('orbiteos-lang', lang); }, [lang]);
  useEffect(() => {
    ThemeStore.setActive(themeId);
    const theme = ThemeStore.getById(themeId);
    if (!theme) return;
    document.body.setAttribute('data-theme', theme.mode);
    // Apply CSS variable overrides from the active theme
    Object.entries(theme.cssVars || {}).forEach(([key, value]) => {
      document.body.style.setProperty(key, value);
    });
  }, [themeId]);

  // Alarm generator
  useEffect(() => {
    const interval = setInterval(() => {
      const msgs = ALARM_MESSAGES[lang];
      const alarm = {...msgs[Math.floor(Math.random()*msgs.length)], time: dayjs().format('HH:mm:ss'), id: Date.now()};
      setAlarms(prev => [alarm, ...prev].slice(0, 50));
      setAlarmCount(prev => prev + 1);
      if (alarm.sev === 'critical') {
        setToasts(prev => [...prev, alarm]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== alarm.id)), 4000);
      }
    }, 8000 + Math.random() * 12000);
    return () => clearInterval(interval);
  }, [lang]);

  // Close alarm dropdown on click outside
  useEffect(() => {
    const handler = (e) => { if(showAlarms && !e.target.closest('.alarm-bell') && !e.target.closest('.alarm-dropdown')) setShowAlarms(false); };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, [showAlarms]);

  // All hooks MUST be before any conditional returns
  const pageRef = useRef(page);
  pageRef.current = page;

  const navigateWithLoader = useCallback((targetPage) => {
    if (targetPage === pageRef.current) return;
    LoaderStore.start({ mode: 'solid' });
    setPage(targetPage);
    // 1 full pulse cycle (2s) then exit fade (1.5s) = 3.5s total
    setTimeout(() => LoaderStore.stop(), 2000);
  }, []);

  const onLoadingDone = useCallback(() => { /* overlay dissolved */ }, []);

  const antThemeConfig = useMemo(() => ({
    algorithm: activeTheme.mode === 'dark' ? antTheme.darkAlgorithm : antTheme.defaultAlgorithm,
    token: {
      ...activeTheme.antTokens,
      fontFamily: "'Inter', -apple-system, sans-serif",
    },
  }), [themeId]);

  if (page === 'login') {
    return (
      <ConfigProvider theme={antThemeConfig}>
        <LoginPage t={t} setPage={setPage} setCurrentApp={setCurrentApp} lang={lang} setLang={setLang} themeId={themeId} setThemeId={setThemeId}/>
      </ConfigProvider>
    );
  }

  const sp = { t, lang, currentSite: focusedEntityId, focusedEntityId, setFocusedEntityId, navigateWithLoader }; // shared page props
  const pages = {
    dashboard: <DashboardPage {...sp}/>,
    fleet: <FleetPage {...sp}/>,
    devices: <DevicesPage {...sp}/>,
    entityBrowser: <EntityBrowserPage {...sp}/>,
    alerts: <AlertsPage {...sp} alarms={alarms}/>,
    rulesEngine: <RulesEnginePage {...sp}/>,
    tariffArbitrage: <TariffPage {...sp}/>,
    peakShaving: <PeakShavingPage {...sp}/>,
    batteryMgmt: <BatteryPage {...sp}/>,
    evCharging: <EVChargingPage {...sp}/>,
    configuration: <ConfigurationPage {...sp}/>,
    // Map app
    siteMap: <SiteMapPage {...sp}/>,
    siteList: <FleetPage {...sp}/>,
    // Alarm app
    alertHistory: <AlertsPage {...sp} alarms={alarms}/>,
    alertRules: <RulesEnginePage {...sp}/>,
    // Marketplace app
    marketplace: <MarketplacePage {...sp}/>,
    myApps: <MarketplacePage {...sp}/>,
    // Developer Studio app
    entityTemplates: <DeveloperStudioPage {...sp} tab="templates"/>,
    propertyDict: <DeveloperStudioPage {...sp} tab="properties"/>,
    apiKeys: <DeveloperStudioPage {...sp} tab="apikeys"/>,
    domainPlugins: <DeveloperStudioPage {...sp} tab="domains"/>,
    flowTemplates: <DeveloperStudioPage {...sp} tab="flows"/>,
    mcpTools: <DeveloperStudioPage {...sp} tab="mcp"/>,
    // Config app extras
    gridCongestion: <GridCongestionPage {...sp}/>,
    compliance: <CompliancePage {...sp}/>,
    iotFleet: <IoTFleetPage {...sp}/>,
  };

  return (
    <ConfigProvider theme={antThemeConfig}>
      <div className={`app-layout${prevPageRef.current === 'login' ? ' shell-enter' : ''}`}>
        <Sidebar page={page} setPage={setPage} navigateWithLoader={navigateWithLoader} t={t} lang={lang} focusedEntityId={focusedEntityId} setFocusedEntityId={setFocusedEntityId}
          currentApp={currentApp} setCurrentApp={setCurrentApp}/>
        <div className="main-area" style={{position:'relative'}}>
          <Header page={page} t={t} lang={lang} setLang={setLang} themeId={themeId}
            setThemeId={setThemeId} alarms={alarms} alarmCount={alarmCount}
            showAlarms={showAlarms} setShowAlarms={setShowAlarms}
            focusedEntityId={focusedEntityId} setFocusedEntityId={setFocusedEntityId}
            setPage={setPage} navigateWithLoader={navigateWithLoader} setCurrentApp={setCurrentApp} currentApp={currentApp}/>
          <div className={`content ${prevPageRef.current === 'loading' ? 'content-reveal' : ''}`} key={page}
            onAnimationEnd={() => { prevPageRef.current = page; }}>
            {pages[page] || <DashboardPage {...sp}/>}
          </div>
          <OrbitLoaderOverlay onDone={onLoadingDone}/>
        </div>
      </div>
      {/* Toast notifications */}
      <div className="toast-container">
        {toasts.map(toast => (
          <div key={toast.id} className="toast critical">
            <div className="alarm-dot" style={{background:'var(--error)',width:8,height:8,borderRadius:'50%',flexShrink:0}}/>
            <div>
              <div style={{fontWeight:500}}>{toast.msg}</div>
              <div style={{fontSize:11,color:'var(--text-tertiary)'}}>{toast.dev}</div>
            </div>
          </div>
        ))}
      </div>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
