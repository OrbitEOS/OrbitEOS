<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs><style>text { font-family: Inter, -apple-system, sans-serif; }</style></defs>
  <rect width="1440" height="900" fill="#f9fafb"/>

  <!-- SIDEBAR -->
  <g id="Ant.Layout.Sider">
    <rect width="240" height="900" fill="#fafafa"/>
    <rect x="239" width="1" height="900" fill="#e5e7eb"/>
    <rect x="20" y="16" width="24" height="24" rx="6" fill="#1a5fff"/>
    <path d="M28 22l4 6h-8l4-6z" fill="white" opacity="0.9"/>
    <text x="52" y="33" font-size="15" font-weight="600" fill="#111827">OrbitEOS</text>
    <rect x="0" y="56" width="240" height="1" fill="#e5e7eb"/>
    <rect x="12" y="68" width="216" height="36" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="28" y="90" font-size="12" fill="#6b7280">De Groot Agri · Maasland</text>
    <text x="56" y="142" font-size="13" fill="#6b7280">Dashboard</text>
    <text x="56" y="182" font-size="13" fill="#6b7280">Energy Flow</text>
    <text x="56" y="224" font-size="13" fill="#6b7280">Fleet</text>
    <text x="56" y="268" font-size="13" fill="#6b7280">Devices</text>
    <text x="56" y="312" font-size="13" fill="#6b7280">Alerts</text>
    <text x="56" y="356" font-size="13" fill="#6b7280">Marketplace</text>
    <text x="56" y="400" font-size="13" fill="#6b7280">Configuration</text>
    <rect x="12" y="418" width="216" height="36" rx="6" fill="#eaf5ff"/>
    <rect x="0" y="422" width="3" height="28" rx="1" fill="#1a5fff"/>
    <text x="56" y="442" font-size="13" font-weight="500" fill="#1a5fff">Grid Congestion</text>
    <rect x="0" y="840" width="240" height="1" fill="#e5e7eb"/>
    <circle cx="36" cy="872" r="16" fill="#e5e7eb"/>
    <text x="60" y="870" font-size="13" font-weight="500" fill="#111827">Deepak S.</text>
    <text x="60" y="885" font-size="11" fill="#9ca3af">Admin</text>
  </g>

  <!-- HEADER -->
  <g id="Ant.Layout.Header">
    <rect x="240" y="0" width="1200" height="56" fill="white"/>
    <rect x="240" y="55" width="1200" height="1" fill="#e5e7eb"/>
    <text x="264" y="24" font-size="13" fill="#9ca3af">Grid /</text>
    <text x="302" y="24" font-size="13" font-weight="500" fill="#111827">Grid Congestion Management</text>
    <text x="264" y="42" font-size="11" fill="#9ca3af">DSO signals, load shedding events, and congestion response</text>
  </g>

  <!-- CONTENT -->
  <g id="Ant.Layout.Content" transform="translate(240, 56)">
    <rect width="1200" height="844" fill="#f9fafb"/>

    <!-- STATUS BANNER -->
    <g id="Ant.Alert.GridStatus" transform="translate(24, 16)">
      <rect width="1152" height="56" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
      <circle cx="28" cy="28" r="8" fill="#f59e0b"/>
      <text x="24" y="32" font-size="12" fill="white" font-weight="600" text-anchor="middle">!</text>
      <text x="48" y="24" font-size="13" font-weight="600" fill="#92400e">DSO Congestion Signal Active</text>
      <text x="48" y="42" font-size="12" fill="#a16207">Stedin has issued a feed-in curtailment for your region. Max export: 15 kW until 16:00.</text>
      <rect x="1040" y="14" width="92" height="28" rx="6" fill="white" stroke="#fde68a" stroke-width="1"/>
      <text x="1086" y="33" font-size="11" font-weight="500" fill="#f59e0b" text-anchor="middle">Acknowledge</text>
    </g>

    <!-- STAT CARDS -->
    <g transform="translate(24, 88)">
      <rect width="275" height="90" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="28" font-size="11" fill="#9ca3af">GRID CONNECTION</text>
      <text x="20" y="52" font-size="20" font-weight="700" fill="#111827">3×25A</text>
      <text x="20" y="72" font-size="11" fill="#6b7280">Stedin, Maasland substation</text>

      <rect x="295" y="0" width="275" height="90" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="315" y="28" font-size="11" fill="#9ca3af">CURRENT EXPORT</text>
      <text x="315" y="52" font-size="20" font-weight="700" fill="#f59e0b">12.4 kW</text>
      <text x="315" y="72" font-size="11" fill="#f59e0b">Curtailed (limit: 15 kW)</text>

      <rect x="590" y="0" width="275" height="90" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="610" y="28" font-size="11" fill="#9ca3af">CURTAILMENT EVENTS (MTD)</text>
      <text x="610" y="52" font-size="20" font-weight="700" fill="#111827">7</text>
      <text x="610" y="72" font-size="11" fill="#6b7280">Total: 14.2 hours this month</text>

      <rect x="885" y="0" width="267" height="90" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="905" y="28" font-size="11" fill="#9ca3af">ENERGY CURTAILED (MTD)</text>
      <text x="905" y="52" font-size="20" font-weight="700" fill="#ef4444">42 kWh</text>
      <text x="905" y="72" font-size="11" fill="#ef4444">€6.30 revenue lost</text>
    </g>

    <!-- CONGESTION EVENT LOG -->
    <g id="Ant.Table.CongestionEvents" transform="translate(24, 194)">
      <rect width="1152" height="340" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="600" fill="#111827">Congestion Event Log</text>

      <rect x="0" y="48" width="1152" height="36" fill="#fafafa"/>
      <text x="20" y="71" font-size="11" fill="#9ca3af" font-weight="600">TIMESTAMP</text>
      <text x="180" y="71" font-size="11" fill="#9ca3af" font-weight="600">DSO</text>
      <text x="280" y="71" font-size="11" fill="#9ca3af" font-weight="600">SIGNAL TYPE</text>
      <text x="440" y="71" font-size="11" fill="#9ca3af" font-weight="600">LIMIT</text>
      <text x="540" y="71" font-size="11" fill="#9ca3af" font-weight="600">DURATION</text>
      <text x="660" y="71" font-size="11" fill="#9ca3af" font-weight="600">ACTION TAKEN</text>
      <text x="900" y="71" font-size="11" fill="#9ca3af" font-weight="600">STATUS</text>
      <text x="1020" y="71" font-size="11" fill="#9ca3af" font-weight="600">CURTAILED</text>

      <!-- Active event -->
      <rect x="4" y="88" width="1144" height="40" rx="4" fill="#fffbeb" opacity="0.5"/>
      <text x="20" y="112" font-size="12" font-weight="500" fill="#111827">Today 13:00</text>
      <text x="180" y="112" font-size="12" fill="#111827">Stedin</text>
      <rect x="280" y="99" width="100" height="22" rx="11" fill="#fef2f2"/>
      <text x="292" y="114" font-size="10" fill="#ef4444">Feed-in Curtail</text>
      <text x="440" y="112" font-size="12" fill="#111827">15 kW export</text>
      <text x="540" y="112" font-size="12" fill="#111827">Ongoing (3h)</text>
      <text x="660" y="112" font-size="12" fill="#111827">Battery charge + EV boost</text>
      <rect x="900" y="99" width="56" height="22" rx="11" fill="#fefce8"/>
      <text x="912" y="114" font-size="10" fill="#f59e0b">Active</text>
      <text x="1020" y="112" font-size="12" fill="#f59e0b">8.2 kWh</text>
      <rect x="0" y="132" width="1152" height="1" fill="#f3f4f6"/>

      <text x="20" y="156" font-size="12" fill="#111827">Mar 21 09:30</text>
      <text x="180" y="156" font-size="12" fill="#111827">Stedin</text>
      <rect x="280" y="143" width="100" height="22" rx="11" fill="#fefce8"/>
      <text x="292" y="158" font-size="10" fill="#f59e0b">Load Shedding</text>
      <text x="440" y="156" font-size="12" fill="#111827">30 kW import</text>
      <text x="540" y="156" font-size="12" fill="#111827">2h 15m</text>
      <text x="660" y="156" font-size="12" fill="#111827">Battery discharge + EV pause</text>
      <rect x="900" y="143" width="68" height="22" rx="11" fill="#def6e7"/>
      <text x="912" y="158" font-size="10" fill="#22c55e">Resolved</text>
      <text x="1020" y="156" font-size="12" fill="#111827">—</text>
      <rect x="0" y="172" width="1152" height="1" fill="#f3f4f6"/>

      <text x="20" y="196" font-size="12" fill="#111827">Mar 19 14:00</text>
      <text x="180" y="196" font-size="12" fill="#111827">Stedin</text>
      <rect x="280" y="183" width="100" height="22" rx="11" fill="#fef2f2"/>
      <text x="292" y="198" font-size="10" fill="#ef4444">Feed-in Curtail</text>
      <text x="440" y="196" font-size="12" fill="#111827">10 kW export</text>
      <text x="540" y="196" font-size="12" fill="#111827">4h 30m</text>
      <text x="660" y="196" font-size="12" fill="#111827">Full self-consumption mode</text>
      <rect x="900" y="183" width="68" height="22" rx="11" fill="#def6e7"/>
      <text x="912" y="198" font-size="10" fill="#22c55e">Resolved</text>
      <text x="1020" y="196" font-size="12" fill="#111827">18.4 kWh</text>
      <rect x="0" y="212" width="1152" height="1" fill="#f3f4f6"/>

      <text x="20" y="236" font-size="12" fill="#111827">Mar 17 11:15</text>
      <text x="180" y="236" font-size="12" fill="#111827">Stedin</text>
      <rect x="280" y="223" width="100" height="22" rx="11" fill="#fefce8"/>
      <text x="292" y="238" font-size="10" fill="#f59e0b">Load Shedding</text>
      <text x="440" y="236" font-size="12" fill="#111827">25 kW import</text>
      <text x="540" y="236" font-size="12" fill="#111827">1h 45m</text>
      <text x="660" y="236" font-size="12" fill="#111827">Shed non-critical loads</text>
      <rect x="900" y="223" width="68" height="22" rx="11" fill="#def6e7"/>
      <text x="912" y="238" font-size="10" fill="#22c55e">Resolved</text>
      <text x="1020" y="236" font-size="12" fill="#111827">—</text>

      <text x="20" y="320" font-size="12" fill="#9ca3af">Showing 1-4 of 7 events</text>
    </g>

    <!-- AUTOMATIC RESPONSE CONFIG -->
    <g id="Ant.Card.AutoResponse" transform="translate(24, 550)">
      <rect width="564" height="270" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="600" fill="#111827">Automatic Response Configuration</text>

      <!-- Response rules -->
      <g transform="translate(20, 52)">
        <text x="0" y="16" font-size="12" font-weight="500" fill="#111827">Feed-in Curtailment Response</text>
        <rect x="440" y="2" width="44" height="24" rx="12" fill="#1a5fff"/>
        <circle cx="464" cy="14" r="9" fill="white"/>

        <text x="16" y="40" font-size="11" fill="#6b7280">1. Redirect excess to battery (priority 1)</text>
        <text x="16" y="58" font-size="11" fill="#6b7280">2. Increase EV charge rate (priority 2)</text>
        <text x="16" y="76" font-size="11" fill="#6b7280">3. Reduce inverter output to limit (priority 3)</text>
      </g>

      <rect x="20" y="140" width="524" height="1" fill="#f3f4f6"/>

      <g transform="translate(20, 152)">
        <text x="0" y="16" font-size="12" font-weight="500" fill="#111827">Load Shedding Response</text>
        <rect x="440" y="2" width="44" height="24" rx="12" fill="#1a5fff"/>
        <circle cx="464" cy="14" r="9" fill="white"/>

        <text x="16" y="40" font-size="11" fill="#6b7280">1. Discharge battery to cover gap (priority 1)</text>
        <text x="16" y="58" font-size="11" fill="#6b7280">2. Pause EV charging (priority 2)</text>
        <text x="16" y="76" font-size="11" fill="#6b7280">3. Shed non-critical loads via smart plugs (priority 3)</text>
      </g>
    </g>

    <!-- DSO INTEGRATION STATUS -->
    <g id="Ant.Card.DSOStatus" transform="translate(608, 550)">
      <rect width="568" height="270" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="600" fill="#111827">DSO Integration</text>

      <text x="20" y="64" font-size="12" fill="#9ca3af">Operator</text>
      <text x="140" y="64" font-size="12" font-weight="500" fill="#111827">Stedin Netbeheer</text>

      <text x="20" y="92" font-size="12" fill="#9ca3af">Protocol</text>
      <text x="140" y="92" font-size="12" fill="#111827">USEF / OpenADR 2.0b</text>

      <text x="20" y="120" font-size="12" fill="#9ca3af">EAN</text>
      <text x="140" y="120" font-size="12" fill="#111827">871685900012345678</text>

      <text x="20" y="148" font-size="12" fill="#9ca3af">Connection</text>
      <rect x="140" y="136" width="72" height="20" rx="10" fill="#def6e7"/>
      <text x="152" y="150" font-size="11" fill="#22c55e">Connected</text>

      <text x="20" y="176" font-size="12" fill="#9ca3af">Last signal</text>
      <text x="140" y="176" font-size="12" fill="#111827">Today 13:00 (Feed-in Curtail)</text>

      <text x="20" y="204" font-size="12" fill="#9ca3af">Response time</text>
      <text x="140" y="204" font-size="12" fill="#22c55e">Avg 2.3 sec</text>

      <text x="20" y="232" font-size="12" fill="#9ca3af">Compliance</text>
      <text x="140" y="232" font-size="12" font-weight="500" fill="#22c55e">100% — All signals handled</text>

      <text x="20" y="260" font-size="12" fill="#9ca3af">Energiewet</text>
      <text x="140" y="260" font-size="12" fill="#22c55e">Compliant (Art. 12.4, 15.2)</text>
    </g>
  </g>
</svg>