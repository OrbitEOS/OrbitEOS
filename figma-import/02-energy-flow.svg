<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <style>text { font-family: Inter, -apple-system, sans-serif; }</style>
    <marker id="arrowG" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L6 3L0 6z" fill="#22c55e"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L6 3L0 6z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowA" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L6 3L0 6z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1440" height="900" fill="#f9fafb"/>

  <!-- ==================== SIDEBAR ==================== -->
  <g id="Ant.Layout.Sider">
    <rect width="240" height="900" fill="#fafafa"/>
    <rect x="239" width="1" height="900" fill="#e5e7eb"/>
    <rect x="20" y="16" width="24" height="24" rx="6" fill="#1a5fff"/>
    <path d="M28 22l4 6h-8l4-6z" fill="white" opacity="0.9"/>
    <text x="52" y="33" font-size="15" font-weight="600" fill="#111827">OrbitEOS</text>
    <rect x="0" y="56" width="240" height="1" fill="#e5e7eb"/>
    <rect x="12" y="68" width="216" height="36" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="28" y="90" font-size="12" fill="#6b7280">De Groot Agri · Maasland</text>

    <!-- Menu items -->
    <text x="56" y="142" font-size="13" fill="#6b7280">Dashboard</text>
    <!-- Energy Flow - Active -->
    <rect x="12" y="160" width="216" height="36" rx="6" fill="#eaf5ff"/>
    <rect x="0" y="164" width="3" height="28" rx="1" fill="#1a5fff"/>
    <text x="56" y="182" font-size="13" font-weight="500" fill="#1a5fff">Energy Flow</text>
    <text x="56" y="224" font-size="13" fill="#6b7280">Fleet</text>
    <text x="56" y="268" font-size="13" fill="#6b7280">Devices</text>
    <text x="56" y="312" font-size="13" fill="#6b7280">Alerts</text>
    <text x="56" y="356" font-size="13" fill="#6b7280">Marketplace</text>
    <text x="56" y="400" font-size="13" fill="#6b7280">Configuration</text>

    <rect x="0" y="840" width="240" height="1" fill="#e5e7eb"/>
    <circle cx="36" cy="872" r="16" fill="#e5e7eb"/>
    <text x="60" y="870" font-size="13" font-weight="500" fill="#111827">Deepak S.</text>
    <text x="60" y="885" font-size="11" fill="#9ca3af">Admin</text>
  </g>

  <!-- ==================== HEADER ==================== -->
  <g id="Ant.Layout.Header">
    <rect x="240" y="0" width="1200" height="56" fill="white"/>
    <rect x="240" y="55" width="1200" height="1" fill="#e5e7eb"/>
    <text x="264" y="24" font-size="13" fill="#9ca3af">Sites /</text>
    <text x="312" y="24" font-size="13" font-weight="500" fill="#111827">Energy Flow</text>
    <text x="264" y="42" font-size="11" fill="#9ca3af">De Groot Agri · Live feed</text>
    <rect x="1220" y="12" width="32" height="32" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="1302" y="12" width="114" height="32" rx="6" fill="#1a5fff"/>
    <text x="1359" y="33" font-size="13" font-weight="500" fill="white" text-anchor="middle">+ Add Site</text>
  </g>

  <!-- ==================== CONTENT ==================== -->
  <g id="Ant.Layout.Content" transform="translate(240, 56)">
    <rect width="1200" height="844" fill="#f9fafb"/>

    <!-- Segmented Time Period -->
    <g id="Ant.Segmented.TimePeriod" transform="translate(24, 16)">
      <rect width="340" height="32" rx="6" fill="#f3f4f6"/>
      <rect x="2" y="2" width="60" height="28" rx="5" fill="#1a5fff"/>
      <text x="32" y="21" font-size="12" font-weight="600" fill="white" text-anchor="middle">Live</text>
      <text x="100" y="21" font-size="12" font-weight="500" fill="#6b7280" text-anchor="middle">Today</text>
      <text x="168" y="21" font-size="12" font-weight="500" fill="#6b7280" text-anchor="middle">Week</text>
      <text x="236" y="21" font-size="12" font-weight="500" fill="#6b7280" text-anchor="middle">Month</text>
      <text x="304" y="21" font-size="12" font-weight="500" fill="#6b7280" text-anchor="middle">Year</text>
    </g>

    <!-- ====== FLOW DIAGRAM ====== -->
    <g id="Ant.Card.FlowDiagram">
      <rect x="24" y="60" width="1152" height="480" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="44" y="88" font-size="14" font-weight="600" fill="#111827">Energy Flow Diagram</text>

      <!-- SOURCE NODES (Left) -->
      <!-- Solar PV -->
      <g id="FlowNode.SolarPV" transform="translate(80, 160)">
        <rect width="140" height="80" rx="8" fill="white" stroke="#22c55e" stroke-width="2"/>
        <rect width="4" height="80" rx="0" fill="#22c55e"/>
        <circle cx="36" cy="30" r="14" fill="#f0fdf4"/>
        <circle cx="36" cy="30" r="6" fill="#22c55e"/>
        <line x1="36" y1="18" x2="36" y2="14" stroke="#22c55e" stroke-width="1.5"/>
        <line x1="36" y1="42" x2="36" y2="46" stroke="#22c55e" stroke-width="1.5"/>
        <line x1="24" y1="30" x2="20" y2="30" stroke="#22c55e" stroke-width="1.5"/>
        <line x1="48" y1="30" x2="52" y2="30" stroke="#22c55e" stroke-width="1.5"/>
        <text x="68" y="28" font-size="11" font-weight="600" fill="#111827">Solar PV</text>
        <text x="68" y="46" font-size="16" font-weight="700" fill="#111827">12.4 <tspan font-size="11" fill="#9ca3af">kW</tspan></text>
      </g>

      <!-- Wind -->
      <g id="FlowNode.Wind" transform="translate(80, 290)">
        <rect width="140" height="80" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
        <rect width="4" height="80" fill="#3b82f6"/>
        <circle cx="36" cy="30" r="14" fill="#eff6ff"/>
        <path d="M30 30 Q36 22 42 30 Q36 38 30 30" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
        <text x="68" y="28" font-size="11" font-weight="600" fill="#111827">Wind</text>
        <text x="68" y="46" font-size="16" font-weight="700" fill="#111827">3.2 <tspan font-size="11" fill="#9ca3af">kW</tspan></text>
      </g>

      <!-- Grid -->
      <g id="FlowNode.Grid" transform="translate(80, 420)">
        <rect width="140" height="80" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
        <rect width="4" height="80" fill="#f59e0b"/>
        <circle cx="36" cy="30" r="14" fill="#fffbeb"/>
        <circle cx="36" cy="30" r="8" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
        <line x1="28" y1="30" x2="44" y2="30" stroke="#f59e0b" stroke-width="1"/>
        <line x1="36" y1="22" x2="36" y2="38" stroke="#f59e0b" stroke-width="1"/>
        <text x="68" y="28" font-size="11" font-weight="600" fill="#111827">Grid</text>
        <text x="68" y="46" font-size="16" font-weight="700" fill="#111827">2.1 <tspan font-size="11" fill="#9ca3af">kW</tspan></text>
      </g>

      <!-- CENTER HUB -->
      <g id="FlowNode.Hub" transform="translate(520, 270)">
        <circle cx="60" cy="60" r="56" fill="white" stroke="#22c55e" stroke-width="3"/>
        <circle cx="60" cy="60" r="48" fill="#f0fdf4" opacity="0.5"/>
        <text x="60" y="50" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">HUB</text>
        <text x="60" y="72" font-size="20" font-weight="700" fill="#111827" text-anchor="middle">17.7</text>
        <text x="60" y="88" font-size="11" fill="#9ca3af" text-anchor="middle">kW total</text>
      </g>

      <!-- CONSUMER NODES (Right) -->
      <!-- Battery -->
      <g id="FlowNode.Battery" transform="translate(780, 140)">
        <rect width="160" height="80" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
        <rect width="4" height="80" fill="#8b5cf6"/>
        <circle cx="36" cy="30" r="14" fill="#f5f3ff"/>
        <rect x="30" y="22" width="12" height="16" rx="2" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
        <rect x="34" y="20" width="4" height="2" fill="#8b5cf6"/>
        <rect x="32" y="30" width="8" height="6" fill="#8b5cf6" opacity="0.6"/>
        <text x="68" y="24" font-size="11" font-weight="600" fill="#111827">Battery</text>
        <text x="68" y="42" font-size="14" font-weight="700" fill="#111827">88% <tspan font-size="10" fill="#9ca3af">SoC</tspan></text>
        <text x="68" y="58" font-size="10" fill="#8b5cf6">5.2 kW charging</text>
      </g>

      <!-- EV Charging -->
      <g id="FlowNode.EV" transform="translate(780, 280)">
        <rect width="160" height="80" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
        <rect width="4" height="80" fill="#3b82f6"/>
        <circle cx="36" cy="30" r="14" fill="#eff6ff"/>
        <path d="M28 34h16M30 28h12v12h-12z" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
        <text x="68" y="28" font-size="11" font-weight="600" fill="#111827">EV Charging</text>
        <text x="68" y="48" font-size="16" font-weight="700" fill="#111827">11.0 <tspan font-size="11" fill="#9ca3af">kW</tspan></text>
      </g>

      <!-- Building Loads -->
      <g id="FlowNode.Loads" transform="translate(780, 420)">
        <rect width="160" height="80" rx="8" fill="white" stroke="#9ca3af" stroke-width="2"/>
        <rect width="4" height="80" fill="#9ca3af"/>
        <circle cx="36" cy="30" r="14" fill="#f9fafb"/>
        <path d="M28 38h16v-12l-8-6-8 6z" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
        <text x="68" y="28" font-size="11" font-weight="600" fill="#111827">Building Loads</text>
        <text x="68" y="48" font-size="16" font-weight="700" fill="#111827">1.5 <tspan font-size="11" fill="#9ca3af">kW</tspan></text>
      </g>

      <!-- FLOW PATHS: Sources → Hub -->
      <path d="M220 200 Q 370 200 520 310" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowG)"/>
      <path d="M220 330 Q 370 330 520 330" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowB)"/>
      <path d="M220 460 Q 370 460 520 350" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.4" marker-end="url(#arrowA)"/>

      <!-- FLOW PATHS: Hub → Consumers -->
      <path d="M640 310 Q 710 200 780 180" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.4"/>
      <path d="M640 330 Q 710 330 780 320" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.4"/>
      <path d="M640 350 Q 710 430 780 460" stroke="#9ca3af" stroke-width="2" fill="none" opacity="0.4"/>

      <!-- Flow dots on paths -->
      <circle cx="370" cy="250" r="4" fill="#22c55e" opacity="0.8"/>
      <circle cx="370" cy="330" r="4" fill="#3b82f6" opacity="0.8"/>
      <circle cx="370" cy="410" r="4" fill="#f59e0b" opacity="0.8"/>
      <circle cx="710" cy="240" r="4" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="710" cy="330" r="4" fill="#3b82f6" opacity="0.8"/>
      <circle cx="710" cy="420" r="4" fill="#9ca3af" opacity="0.8"/>
    </g>

    <!-- ====== LIVE METRICS ====== -->
    <g id="Ant.Card.LiveMetrics" transform="translate(24, 556)">
      <!-- Self-Consumption -->
      <g id="Ant.Card.SelfConsumption">
        <rect width="370" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
        <text x="20" y="28" font-size="11" fill="#9ca3af" font-weight="500">SELF-CONSUMPTION</text>
        <text x="20" y="56" font-size="24" font-weight="700" fill="#111827">84%</text>
        <rect x="20" y="72" width="330" height="6" rx="3" fill="#f3f4f6"/>
        <rect x="20" y="72" width="277" height="6" rx="3" fill="#22c55e"/>
        <text x="350" y="88" font-size="10" fill="#9ca3af" text-anchor="end">Target: 80%</text>
      </g>

      <!-- Grid Independence -->
      <g id="Ant.Card.GridIndependence" transform="translate(390, 0)">
        <rect width="370" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
        <text x="20" y="28" font-size="11" fill="#9ca3af" font-weight="500">GRID INDEPENDENCE</text>
        <text x="20" y="56" font-size="24" font-weight="700" fill="#111827">91%</text>
        <rect x="20" y="72" width="330" height="6" rx="3" fill="#f3f4f6"/>
        <rect x="20" y="72" width="300" height="6" rx="3" fill="#3b82f6"/>
        <text x="350" y="88" font-size="10" fill="#9ca3af" text-anchor="end">Target: 85%</text>
      </g>

      <!-- Battery Cycles -->
      <g id="Ant.Card.BatteryCycles" transform="translate(780, 0)">
        <rect width="370" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
        <text x="20" y="28" font-size="11" fill="#9ca3af" font-weight="500">BATTERY CYCLES</text>
        <text x="20" y="56" font-size="24" font-weight="700" fill="#111827">342 <tspan font-size="13" fill="#9ca3af" font-weight="400">/ 6000 lifetime</tspan></text>
        <rect x="20" y="72" width="330" height="6" rx="3" fill="#f3f4f6"/>
        <rect x="20" y="72" width="19" height="6" rx="3" fill="#8b5cf6"/>
        <text x="350" y="88" font-size="10" fill="#9ca3af" text-anchor="end">5.7%</text>
      </g>
    </g>
  </g>
</svg>