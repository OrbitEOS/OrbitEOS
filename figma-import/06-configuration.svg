<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs><style>text { font-family: Inter, -apple-system, sans-serif; }</style></defs>
  <rect width="1440" height="900" fill="#f9fafb"/>

  <!-- SIDEBAR -->
  <g id="Ant.Layout.Sider">
    <rect width="240" height="900" fill="#fafafa"/>
    <rect x="239" width="1" height="900" fill="#e5e7eb"/>
    <rect x="20" y="16" width="24" height="24" rx="6" fill="#1a5fff"/>
    <path d="M28 22l4 6h-8l4-6z" fill="white" opacity="0.9"/>
    <text x="52" y="33" font-size="15" font-weight="600" fill="#111827">OrbitEOS</text>
    <rect x="0" y="56" width="240" height="1" fill="#e5e7eb"/>
    <rect x="12" y="68" width="216" height="36" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="28" y="90" font-size="12" fill="#6b7280">De Groot Agri · Maasland</text>
    <text x="56" y="142" font-size="13" fill="#6b7280">Dashboard</text>
    <text x="56" y="182" font-size="13" fill="#6b7280">Energy Flow</text>
    <text x="56" y="224" font-size="13" fill="#6b7280">Fleet</text>
    <text x="56" y="268" font-size="13" fill="#6b7280">Devices</text>
    <text x="56" y="312" font-size="13" fill="#6b7280">Alerts</text>
    <text x="56" y="356" font-size="13" fill="#6b7280">Marketplace</text>
    <rect x="12" y="370" width="216" height="36" rx="6" fill="#eaf5ff"/>
    <rect x="0" y="374" width="3" height="28" rx="1" fill="#1a5fff"/>
    <text x="56" y="394" font-size="13" font-weight="500" fill="#1a5fff">Configuration</text>
    <rect x="0" y="840" width="240" height="1" fill="#e5e7eb"/>
    <circle cx="36" cy="872" r="16" fill="#e5e7eb"/>
    <text x="60" y="870" font-size="13" font-weight="500" fill="#111827">Deepak S.</text>
    <text x="60" y="885" font-size="11" fill="#9ca3af">Admin</text>
  </g>

  <!-- HEADER -->
  <g id="Ant.Layout.Header">
    <rect x="240" y="0" width="1200" height="56" fill="white"/>
    <rect x="240" y="55" width="1200" height="1" fill="#e5e7eb"/>
    <text x="264" y="24" font-size="13" fill="#9ca3af">Sites /</text>
    <text x="312" y="24" font-size="13" font-weight="500" fill="#111827">Configuration</text>
    <text x="264" y="42" font-size="11" fill="#9ca3af">System settings and preferences</text>
    <rect x="1180" y="12" width="100" height="32" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <text x="1230" y="33" font-size="12" font-weight="500" fill="#6b7280" text-anchor="middle">Export Config</text>
    <rect x="1302" y="12" width="114" height="32" rx="6" fill="#1a5fff"/>
    <text x="1359" y="33" font-size="13" font-weight="500" fill="white" text-anchor="middle">Save Changes</text>
  </g>

  <!-- CONTENT -->
  <g id="Ant.Layout.Content" transform="translate(240, 56)">
    <rect width="1200" height="844" fill="#f9fafb"/>

    <!-- LEFT NAV -->
    <g id="Ant.Menu.ConfigSections" transform="translate(24, 16)">
      <rect width="260" height="380" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <!-- General - Active -->
      <rect x="4" y="4" width="252" height="44" rx="6" fill="#eaf5ff"/>
      <text x="20" y="32" font-size="13" font-weight="500" fill="#1a5fff">General</text>
      <!-- Other items -->
      <text x="20" y="74" font-size="13" fill="#6b7280">Site Settings</text>
      <rect x="4" y="52" width="252" height="1" fill="#f3f4f6"/>
      <text x="20" y="118" font-size="13" fill="#6b7280">Device Groups</text>
      <rect x="4" y="96" width="252" height="1" fill="#f3f4f6"/>
      <text x="20" y="162" font-size="13" fill="#6b7280">Automations</text>
      <rect x="4" y="140" width="252" height="1" fill="#f3f4f6"/>
      <text x="20" y="206" font-size="13" fill="#6b7280">Users &amp; Roles</text>
      <rect x="4" y="184" width="252" height="1" fill="#f3f4f6"/>
      <text x="20" y="250" font-size="13" fill="#6b7280">Integrations</text>
      <rect x="4" y="228" width="252" height="1" fill="#f3f4f6"/>
      <text x="20" y="294" font-size="13" fill="#6b7280">Notifications</text>
      <rect x="4" y="272" width="252" height="1" fill="#f3f4f6"/>
      <text x="20" y="338" font-size="13" fill="#6b7280">API Keys</text>
    </g>

    <!-- RIGHT PANEL: General Settings Form -->
    <g id="Ant.Card.ConfigPanel" transform="translate(304, 16)">
      <rect width="872" height="800" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>

      <text x="24" y="36" font-size="16" font-weight="600" fill="#111827">General Settings</text>
      <text x="24" y="56" font-size="12" fill="#9ca3af">Configure your OrbitEOS platform</text>

      <!-- Platform Name -->
      <text x="24" y="92" font-size="13" font-weight="500" fill="#111827">Platform Name</text>
      <rect x="24" y="100" width="400" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="36" y="123" font-size="13" fill="#111827">OrbitEOS</text>

      <!-- Default Language -->
      <text x="24" y="162" font-size="13" font-weight="500" fill="#111827">Default Language</text>
      <rect x="24" y="170" width="400" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="36" y="193" font-size="13" fill="#111827">English (EN)</text>
      <path d="M408 186l4 5h-8l4-5z" fill="#9ca3af"/>

      <!-- Timezone -->
      <text x="24" y="232" font-size="13" font-weight="500" fill="#111827">Timezone</text>
      <rect x="24" y="240" width="400" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="36" y="263" font-size="13" fill="#111827">Europe/Amsterdam (UTC+1)</text>
      <path d="M408 256l4 5h-8l4-5z" fill="#9ca3af"/>

      <!-- Currency -->
      <text x="24" y="302" font-size="13" font-weight="500" fill="#111827">Currency</text>
      <rect x="24" y="310" width="400" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="36" y="333" font-size="13" fill="#111827">EUR (€)</text>
      <path d="M408 326l4 5h-8l4-5z" fill="#9ca3af"/>

      <!-- Date Format -->
      <text x="24" y="372" font-size="13" font-weight="500" fill="#111827">Date Format</text>
      <rect x="24" y="380" width="400" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="36" y="403" font-size="13" fill="#111827">DD/MM/YYYY</text>
      <path d="M408 396l4 5h-8l4-5z" fill="#9ca3af"/>

      <!-- Divider -->
      <rect x="24" y="432" width="824" height="1" fill="#f3f4f6"/>

      <!-- Energy Settings -->
      <text x="24" y="460" font-size="14" font-weight="600" fill="#111827">Energy Settings</text>

      <!-- Energy Unit Radio -->
      <text x="24" y="492" font-size="13" font-weight="500" fill="#111827">Energy Unit</text>
      <circle cx="36" cy="512" r="8" stroke="#1a5fff" stroke-width="2" fill="white"/>
      <circle cx="36" cy="512" r="4" fill="#1a5fff"/>
      <text x="52" y="516" font-size="13" fill="#111827">kWh</text>
      <circle cx="120" cy="512" r="8" stroke="#e5e7eb" stroke-width="1.5" fill="white"/>
      <text x="136" y="516" font-size="13" fill="#6b7280">MWh</text>
      <circle cx="200" cy="512" r="8" stroke="#e5e7eb" stroke-width="1.5" fill="white"/>
      <text x="216" y="516" font-size="13" fill="#6b7280">Wh</text>

      <!-- Self-consumption Target -->
      <text x="24" y="552" font-size="13" font-weight="500" fill="#111827">Self-consumption Target</text>
      <rect x="24" y="560" width="120" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="36" y="583" font-size="13" fill="#111827">80</text>
      <text x="152" y="583" font-size="13" fill="#9ca3af">%</text>

      <!-- Divider -->
      <rect x="24" y="612" width="824" height="1" fill="#f3f4f6"/>

      <!-- Toggles -->
      <text x="24" y="642" font-size="13" font-weight="500" fill="#111827">Enable real-time monitoring</text>
      <rect x="760" y="628" width="44" height="24" rx="12" fill="#1a5fff"/>
      <circle cx="784" cy="640" r="9" fill="white"/>

      <text x="24" y="682" font-size="13" font-weight="500" fill="#111827">Auto-acknowledge info alerts</text>
      <rect x="760" y="668" width="44" height="24" rx="12" fill="#1a5fff"/>
      <circle cx="784" cy="680" r="9" fill="white"/>

      <text x="24" y="722" font-size="13" font-weight="500" fill="#111827">Send daily email reports</text>
      <rect x="760" y="708" width="44" height="24" rx="12" fill="#e5e7eb"/>
      <circle cx="780" cy="720" r="9" fill="white"/>

      <!-- Divider -->
      <rect x="24" y="748" width="824" height="1" fill="#f3f4f6"/>

      <!-- Action buttons -->
      <text x="680" y="780" font-size="13" fill="#6b7280">Cancel</text>
      <rect x="724" y="762" width="124" height="36" rx="6" fill="#1a5fff"/>
      <text x="786" y="785" font-size="13" font-weight="500" fill="white" text-anchor="middle">Save Changes</text>
    </g>
  </g>
</svg>