<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs><style>text { font-family: Inter, -apple-system, sans-serif; }</style></defs>
  <rect width="1440" height="900" fill="#f9fafb"/>

  <!-- SIDEBAR -->
  <g id="Ant.Layout.Sider">
    <rect width="240" height="900" fill="#fafafa"/>
    <rect x="239" width="1" height="900" fill="#e5e7eb"/>
    <rect x="20" y="16" width="24" height="24" rx="6" fill="#1a5fff"/>
    <path d="M28 22l4 6h-8l4-6z" fill="white" opacity="0.9"/>
    <text x="52" y="33" font-size="15" font-weight="600" fill="#111827">OrbitEOS</text>
    <rect x="0" y="56" width="240" height="1" fill="#e5e7eb"/>
    <rect x="12" y="68" width="216" height="36" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="28" y="90" font-size="12" fill="#6b7280">De Groot Agri · Maasland</text>
    <text x="56" y="142" font-size="13" fill="#6b7280">Dashboard</text>
    <text x="56" y="182" font-size="13" fill="#6b7280">Energy Flow</text>
    <rect x="12" y="200" width="216" height="36" rx="6" fill="#eaf5ff"/>
    <rect x="0" y="204" width="3" height="28" rx="1" fill="#1a5fff"/>
    <text x="56" y="224" font-size="13" font-weight="500" fill="#1a5fff">Fleet</text>
    <text x="56" y="268" font-size="13" fill="#6b7280">Devices</text>
    <text x="56" y="312" font-size="13" fill="#6b7280">Alerts</text>
    <text x="56" y="356" font-size="13" fill="#6b7280">Marketplace</text>
    <text x="56" y="400" font-size="13" fill="#6b7280">Configuration</text>
    <rect x="0" y="840" width="240" height="1" fill="#e5e7eb"/>
    <circle cx="36" cy="872" r="16" fill="#e5e7eb"/>
    <text x="60" y="870" font-size="13" font-weight="500" fill="#111827">Deepak S.</text>
    <text x="60" y="885" font-size="11" fill="#9ca3af">Admin</text>
  </g>

  <!-- HEADER -->
  <g id="Ant.Layout.Header">
    <rect x="240" y="0" width="1200" height="56" fill="white"/>
    <rect x="240" y="55" width="1200" height="1" fill="#e5e7eb"/>
    <text x="264" y="24" font-size="13" fill="#9ca3af">Sites /</text>
    <text x="312" y="24" font-size="13" font-weight="500" fill="#111827">Fleet</text>
    <text x="264" y="42" font-size="11" fill="#9ca3af">Manage all sites and assets</text>
    <rect x="1302" y="12" width="114" height="32" rx="6" fill="#1a5fff"/>
    <text x="1359" y="33" font-size="13" font-weight="500" fill="white" text-anchor="middle">+ Add Site</text>
  </g>

  <!-- CONTENT -->
  <g id="Ant.Layout.Content" transform="translate(240, 56)">
    <rect width="1200" height="844" fill="#f9fafb"/>

    <!-- FILTER BAR -->
    <g id="Ant.Card.Filters" transform="translate(24, 16)">
      <rect x="0" y="0" width="260" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="36" y="23" font-size="12" fill="#d1d5db">Search sites...</text>
      <circle cx="18" cy="18" r="6" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
      <line x1="22" y1="22" x2="26" y2="26" stroke="#9ca3af" stroke-width="1.5"/>

      <rect x="276" y="0" width="140" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="292" y="23" font-size="12" fill="#6b7280">All Statuses</text>
      <path d="M400 16l4 5h-8l4-5z" fill="#9ca3af"/>

      <rect x="432" y="0" width="140" height="36" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="448" y="23" font-size="12" fill="#6b7280">All Regions</text>
      <path d="M556 16l4 5h-8l4-5z" fill="#9ca3af"/>

      <text x="600" y="23" font-size="12" fill="#1a5fff" font-weight="500">Reset Filters</text>
    </g>

    <!-- FLEET STATS -->
    <g id="Ant.Card.FleetStats" transform="translate(24, 68)">
      <rect width="370" height="80" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="28" font-size="11" fill="#9ca3af">TOTAL SITES</text>
      <text x="20" y="52" font-size="22" font-weight="700" fill="#111827">4</text>
      <text x="20" y="68" font-size="11" fill="#22c55e" font-weight="500">2 new this month</text>

      <rect x="390" y="0" width="370" height="80" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="410" y="28" font-size="11" fill="#9ca3af">ONLINE DEVICES</text>
      <text x="410" y="52" font-size="22" font-weight="700" fill="#111827">35/38</text>
      <text x="410" y="68" font-size="11" fill="#22c55e" font-weight="500">92% uptime</text>

      <rect x="780" y="0" width="370" height="80" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="800" y="28" font-size="11" fill="#9ca3af">TOTAL CAPACITY</text>
      <text x="800" y="52" font-size="22" font-weight="700" fill="#111827">148 kW</text>
      <text x="800" y="68" font-size="11" fill="#22c55e" font-weight="500">+12% vs last quarter</text>
    </g>

