        <text x="240" y="25" font-size="11" fill="#9ca3af" font-weight="600">LOCATION</text>
        <text x="440" y="25" font-size="11" fill="#9ca3af" font-weight="600">DEVICES</text>
        <text x="540" y="25" font-size="11" fill="#9ca3af" font-weight="600">CAPACITY</text>
        <text x="660" y="25" font-size="11" fill="#9ca3af" font-weight="600">STATUS</text>
        <text x="800" y="25" font-size="11" fill="#9ca3af" font-weight="600">SELF-CONSUMPTION</text>
        <text x="1060" y="25" font-size="11" fill="#9ca3af" font-weight="600">ACTIONS</text>
      </g>

      <!-- Row 1 -->
      <g id="Ant.Table.Row.1">
        <text x="20" y="68" font-size="13" font-weight="500" fill="#111827">De Groot Agri</text>
        <text x="240" y="68" font-size="12" fill="#6b7280">Maasland, NL</text>
        <text x="440" y="68" font-size="13" fill="#111827">8</text>
        <text x="540" y="68" font-size="13" fill="#111827">42 kW</text>
        <rect x="660" y="55" width="50" height="20" rx="10" fill="#def6e7"/>
        <text x="672" y="69" font-size="11" fill="#22c55e">Online</text>
        <text x="800" y="68" font-size="13" font-weight="500" fill="#111827">84%</text>
        <rect x="840" y="62" width="80" height="6" rx="3" fill="#f3f4f6"/>
        <rect x="840" y="62" width="67" height="6" rx="3" fill="#22c55e"/>
        <text x="1070" y="68" font-size="16" fill="#9ca3af">···</text>
        <rect x="0" y="85" width="1152" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Row 2 -->
      <g id="Ant.Table.Row.2">
        <text x="20" y="112" font-size="13" font-weight="500" fill="#111827">Amersfoort Residential</text>
        <text x="240" y="112" font-size="12" fill="#6b7280">Amersfoort, NL</text>
        <text x="440" y="112" font-size="13" fill="#111827">6</text>
        <text x="540" y="112" font-size="13" fill="#111827">18 kW</text>
        <rect x="660" y="99" width="50" height="20" rx="10" fill="#def6e7"/>
        <text x="672" y="113" font-size="11" fill="#22c55e">Online</text>
        <text x="800" y="112" font-size="13" font-weight="500" fill="#111827">91%</text>
        <rect x="840" y="106" width="80" height="6" rx="3" fill="#f3f4f6"/>
        <rect x="840" y="106" width="73" height="6" rx="3" fill="#22c55e"/>
        <text x="1070" y="112" font-size="16" fill="#9ca3af">···</text>
        <rect x="0" y="129" width="1152" height="1" fill="#f3f4f6"/>
