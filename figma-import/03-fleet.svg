      <!-- Row 3 -->
      <g id="Ant.Table.Row.3">
        <text x="20" y="156" font-size="13" font-weight="500" fill="#111827">Utrecht Commercial</text>
        <text x="240" y="156" font-size="12" fill="#6b7280">Utrecht, NL</text>
        <text x="440" y="156" font-size="13" fill="#111827">12</text>
        <text x="540" y="156" font-size="13" fill="#111827">64 kW</text>
        <rect x="660" y="143" width="50" height="20" rx="10" fill="#def6e7"/>
        <text x="672" y="157" font-size="11" fill="#22c55e">Online</text>
        <text x="800" y="156" font-size="13" font-weight="500" fill="#111827">78%</text>
        <rect x="840" y="150" width="80" height="6" rx="3" fill="#f3f4f6"/>
        <rect x="840" y="150" width="62" height="6" rx="3" fill="#22c55e"/>
        <text x="1070" y="156" font-size="16" fill="#9ca3af">···</text>
        <rect x="0" y="173" width="1152" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Row 4 -->
      <g id="Ant.Table.Row.4">
        <text x="20" y="200" font-size="13" font-weight="500" fill="#111827">Rotterdam Industrial</text>
        <text x="240" y="200" font-size="12" fill="#6b7280">Rotterdam, NL</text>
        <text x="440" y="200" font-size="13" fill="#111827">12</text>
        <text x="540" y="200" font-size="13" fill="#111827">24 kW</text>
        <rect x="660" y="187" width="82" height="20" rx="10" fill="#fef3c7"/>
        <text x="672" y="201" font-size="11" fill="#f59e0b">Maintenance</text>
        <text x="800" y="200" font-size="13" font-weight="500" fill="#111827">62%</text>
        <rect x="840" y="194" width="80" height="6" rx="3" fill="#f3f4f6"/>
        <rect x="840" y="194" width="50" height="6" rx="3" fill="#f59e0b"/>
        <text x="1070" y="200" font-size="16" fill="#9ca3af">···</text>
        <rect x="0" y="217" width="1152" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Pagination -->
      <text x="20" y="440" font-size="12" fill="#9ca3af">Showing 1-4 of 4 sites</text>
      <rect x="1060" y="424" width="28" height="28" rx="4" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="1074" y="443" font-size="12" fill="#9ca3af" text-anchor="middle">&lt;</text>
      <rect x="1094" y="424" width="28" height="28" rx="4" fill="#1a5fff"/>
      <text x="1108" y="443" font-size="12" fill="white" text-anchor="middle" font-weight="600">1</text>
      <rect x="1128" y="424" width="28" height="28" rx="4" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="1142" y="443" font-size="12" fill="#9ca3af" text-anchor="middle">&gt;</text>
