<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <style>text { font-family: Inter, -apple-system, sans-serif; }</style>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="680" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a5fff"/>
      <stop offset="100%" stop-color="#0f3d99"/>
    </linearGradient>
  </defs>

  <!-- ==================== LEFT BRAND PANEL ==================== -->
  <g id="LoginBrand.ParticleZone">
    <rect width="680" height="900" fill="url(#brandGrad)"/>

    <!-- Particles / decorative circles -->
    <circle cx="120" cy="150" r="40" fill="white" opacity="0.04"/>
    <circle cx="580" cy="80" r="25" fill="white" opacity="0.06"/>
    <circle cx="350" cy="200" r="8" fill="white" opacity="0.1"/>
    <circle cx="100" cy="500" r="60" fill="white" opacity="0.03"/>
    <circle cx="500" cy="400" r="15" fill="white" opacity="0.08"/>
    <circle cx="200" cy="700" r="35" fill="white" opacity="0.04"/>
    <circle cx="600" cy="650" r="20" fill="white" opacity="0.06"/>
    <circle cx="450" cy="750" r="50" fill="white" opacity="0.03"/>
    <circle cx="80" cy="350" r="6" fill="white" opacity="0.15"/>
    <circle cx="300" cy="600" r="4" fill="white" opacity="0.2"/>
    <circle cx="550" cy="300" r="5" fill="white" opacity="0.12"/>
    <circle cx="400" cy="100" r="3" fill="white" opacity="0.18"/>
    <circle cx="150" cy="820" r="10" fill="white" opacity="0.08"/>
    <circle cx="620" cy="500" r="30" fill="white" opacity="0.03"/>
    <circle cx="250" cy="450" r="12" fill="white" opacity="0.06"/>

    <!-- Curved decorative lines -->
    <path d="M0 300 Q 200 250 400 350 Q 500 400 680 320" stroke="white" stroke-width="1" fill="none" opacity="0.06"/>
    <path d="M0 600 Q 150 550 340 620 Q 500 670 680 580" stroke="white" stroke-width="1" fill="none" opacity="0.04"/>

    <!-- Logo + Brand Text -->
    <g transform="translate(340, 380)">
      <!-- Logo icon -->
      <rect x="-24" y="-24" width="48" height="48" rx="12" fill="white" opacity="0.15"/>
      <path d="M-6 -8l6 -8 6 8h-4v10h-4v-10z" fill="white" opacity="0.9"/>

      <!-- Brand name -->
      <text x="0" y="40" font-size="32" font-weight="700" fill="white" text-anchor="middle" font-style="italic">OrbitEOS</text>
      <text x="0" y="64" font-size="16" fill="white" opacity="0.7" text-anchor="middle">Energy Management System</text>

      <!-- Tagline -->
      <text x="0" y="110" font-size="14" fill="white" opacity="0.5" text-anchor="middle">Monitor, optimize, and control your entire</text>
      <text x="0" y="130" font-size="14" fill="white" opacity="0.5" text-anchor="middle">energy infrastructure from a single platform.</text>
    </g>

    <!-- Bottom info -->
    <text x="24" y="880" font-size="12" fill="white" opacity="0.4">© 2026 OrbitEOS</text>
    <text x="656" y="880" font-size="12" fill="white" opacity="0.4" text-anchor="end">v2.4.1</text>
  </g>

  <!-- ==================== RIGHT LOGIN FORM ==================== -->
  <g id="LoginForm.Panel">
    <rect x="680" y="0" width="760" height="900" fill="white"/>

    <g transform="translate(870, 320)">
      <!-- Heading -->
      <text x="0" y="0" font-size="24" font-weight="700" fill="#111827">Welcome back</text>
      <text x="0" y="28" font-size="14" fill="#6b7280">Sign in to your account</text>

      <!-- Email field -->
      <text x="0" y="72" font-size="13" font-weight="500" fill="#111827">Email</text>
      <rect x="0" y="82" width="380" height="40" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="12" y="107" font-size="13" fill="#d1d5db">name@company.com</text>

      <!-- Password field -->
      <text x="0" y="148" font-size="13" font-weight="500" fill="#111827">Password</text>
      <text x="310" y="148" font-size="12" fill="#1a5fff" text-anchor="end">Forgot password?</text>
      <rect x="0" y="158" width="380" height="40" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="12" y="183" font-size="13" fill="#d1d5db">Enter your password</text>
      <!-- Eye icon -->
      <circle cx="360" cy="178" r="6" stroke="#9ca3af" stroke-width="1.5" fill="none"/>
      <circle cx="360" cy="178" r="2" fill="#9ca3af"/>

      <!-- Remember me -->
      <rect x="0" y="214" width="16" height="16" rx="3" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="24" y="227" font-size="13" fill="#6b7280">Remember me</text>

      <!-- Sign In button -->
      <rect x="0" y="252" width="380" height="40" rx="6" fill="#1a5fff"/>
      <text x="190" y="277" font-size="14" font-weight="600" fill="white" text-anchor="middle">Sign In</text>

      <!-- Divider with "or" -->
      <rect x="0" y="314" width="170" height="1" fill="#e5e7eb"/>
      <text x="190" y="319" font-size="12" fill="#9ca3af" text-anchor="middle">or</text>
      <rect x="210" y="314" width="170" height="1" fill="#e5e7eb"/>

      <!-- SSO button -->
      <rect x="0" y="336" width="380" height="40" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <text x="190" y="361" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">Sign in with SSO</text>

      <!-- Bottom link -->
      <text x="130" y="410" font-size="13" fill="#6b7280" text-anchor="middle">Don't have an account?</text>
      <text x="260" y="410" font-size="13" fill="#1a5fff" text-anchor="middle">Contact Admin</text>
    </g>
  </g>
</svg>