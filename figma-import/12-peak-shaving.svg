<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs><style>text { font-family: Inter, -apple-system, sans-serif; }</style></defs>
  <rect width="1440" height="900" fill="#f9fafb"/>

  <!-- SIDEBAR -->
  <g id="Ant.Layout.Sider">
    <rect width="240" height="900" fill="#fafafa"/>
    <rect x="239" width="1" height="900" fill="#e5e7eb"/>
    <rect x="20" y="16" width="24" height="24" rx="6" fill="#1a5fff"/>
    <path d="M28 22l4 6h-8l4-6z" fill="white" opacity="0.9"/>
    <text x="52" y="33" font-size="15" font-weight="600" fill="#111827">OrbitEOS</text>
    <rect x="0" y="56" width="240" height="1" fill="#e5e7eb"/>
    <rect x="12" y="68" width="216" height="36" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="28" y="90" font-size="12" fill="#6b7280">De Groot Agri · Maasland</text>
    <text x="56" y="142" font-size="13" fill="#6b7280">Dashboard</text>
    <text x="56" y="182" font-size="13" fill="#6b7280">Energy Flow</text>
    <text x="56" y="224" font-size="13" fill="#6b7280">Fleet</text>
    <text x="56" y="268" font-size="13" fill="#6b7280">Devices</text>
    <text x="56" y="312" font-size="13" fill="#6b7280">Alerts</text>
    <text x="56" y="356" font-size="13" fill="#6b7280">Marketplace</text>
    <text x="56" y="400" font-size="13" fill="#6b7280">Configuration</text>
    <rect x="12" y="418" width="216" height="36" rx="6" fill="#eaf5ff"/>
    <rect x="0" y="422" width="3" height="28" rx="1" fill="#1a5fff"/>
    <text x="56" y="442" font-size="13" font-weight="500" fill="#1a5fff">Peak Shaving</text>
    <rect x="0" y="840" width="240" height="1" fill="#e5e7eb"/>
    <circle cx="36" cy="872" r="16" fill="#e5e7eb"/>
    <text x="60" y="870" font-size="13" font-weight="500" fill="#111827">Deepak S.</text>
    <text x="60" y="885" font-size="11" fill="#9ca3af">Admin</text>
  </g>

  <!-- HEADER -->
  <g id="Ant.Layout.Header">
    <rect x="240" y="0" width="1200" height="56" fill="white"/>
    <rect x="240" y="55" width="1200" height="1" fill="#e5e7eb"/>
    <text x="264" y="24" font-size="13" fill="#9ca3af">Energy /</text>
    <text x="318" y="24" font-size="13" font-weight="500" fill="#111827">Peak Shaving Monitor</text>
    <text x="264" y="42" font-size="11" fill="#9ca3af">Live demand monitoring and peak limit management</text>
  </g>

  <!-- CONTENT -->
  <g id="Ant.Layout.Content" transform="translate(240, 56)">
    <rect width="1200" height="844" fill="#f9fafb"/>

    <!-- LIVE DEMAND GAUGE -->
    <g id="Ant.Card.LiveDemand" transform="translate(24, 16)">
      <rect width="380" height="220" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="600" fill="#111827">Live Demand</text>
      <circle cx="20" cy="28" r="4" fill="#22c55e"/>

      <!-- Gauge arc -->
      <g transform="translate(190, 150)">
        <!-- Background arc -->
        <path d="M-100 0 A100 100 0 0 1 100 0" fill="none" stroke="#f3f4f6" stroke-width="16" stroke-linecap="round"/>
        <!-- Safe zone -->
        <path d="M-100 0 A100 100 0 0 1 50 -86.6" fill="none" stroke="#22c55e" stroke-width="16" stroke-linecap="round"/>
        <!-- Warning zone -->
        <path d="M50 -86.6 A100 100 0 0 1 86.6 -50" fill="none" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/>
        <!-- Danger zone -->
        <path d="M86.6 -50 A100 100 0 0 1 100 0" fill="none" stroke="#ef4444" stroke-width="16" stroke-linecap="round"/>
        <!-- Needle position (at ~75%) -->
        <line x1="0" y1="0" x2="60" y2="-65" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
        <circle cx="0" cy="0" r="6" fill="#111827"/>
      </g>

      <text x="190" y="180" font-size="28" font-weight="700" fill="#111827" text-anchor="middle">32.4</text>
      <text x="190" y="200" font-size="13" fill="#9ca3af" text-anchor="middle">kW of 40 kW limit</text>
    </g>

    <!-- PEAK STATUS CARDS -->
    <g transform="translate(424, 16)">
      <!-- Contract Limit -->
      <rect width="250" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="28" font-size="11" fill="#9ca3af">CONTRACT LIMIT</text>
      <text x="20" y="56" font-size="24" font-weight="700" fill="#111827">40 kW</text>
      <text x="20" y="78" font-size="11" fill="#6b7280">Monthly peak demand cap</text>

      <!-- Current Month Peak -->
      <rect x="270" y="0" width="250" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="290" y="28" font-size="11" fill="#9ca3af">MONTH PEAK</text>
      <text x="290" y="56" font-size="24" font-weight="700" fill="#f59e0b">38.2 kW</text>
      <text x="290" y="78" font-size="11" fill="#f59e0b">95.5% of limit — caution</text>

      <!-- Headroom -->
      <rect x="540" y="0" width="240" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="560" y="28" font-size="11" fill="#9ca3af">HEADROOM</text>
      <text x="560" y="56" font-size="24" font-weight="700" fill="#22c55e">7.6 kW</text>
      <text x="560" y="78" font-size="11" fill="#22c55e">Available before limit</text>
    </g>

    <!-- BATTERY ASSIST STATUS -->
    <g transform="translate(424, 132)">
      <rect width="780" height="104" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="28" font-size="13" font-weight="600" fill="#111827">Battery Peak Assist</text>

      <text x="20" y="56" font-size="12" fill="#6b7280">Status:</text>
      <rect x="68" y="44" width="60" height="20" rx="10" fill="#def6e7"/>
      <text x="80" y="58" font-size="11" fill="#22c55e">Ready</text>

      <text x="160" y="56" font-size="12" fill="#6b7280">Battery SoC:</text>
      <text x="240" y="56" font-size="12" font-weight="500" fill="#111827">72%</text>

      <text x="300" y="56" font-size="12" fill="#6b7280">Available:</text>
      <text x="362" y="56" font-size="12" font-weight="500" fill="#111827">8.4 kWh</text>

      <text x="440" y="56" font-size="12" fill="#6b7280">Max discharge:</text>
      <text x="540" y="56" font-size="12" font-weight="500" fill="#111827">10 kW</text>

      <!-- Threshold bar -->
      <text x="20" y="86" font-size="11" fill="#6b7280">Activation threshold:</text>
      <rect x="160" y="78" width="400" height="8" rx="4" fill="#f3f4f6"/>
      <rect x="160" y="78" width="340" height="8" rx="4" fill="#1a5fff"/>
      <text x="570" y="88" font-size="11" fill="#111827">85% (34 kW)</text>
    </g>

    <!-- 15-MIN DEMAND CHART -->
    <g id="Ant.Card.DemandChart" transform="translate(24, 252)">
      <rect width="1152" height="320" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="600" fill="#111827">15-Minute Demand Profile</text>
      <text x="20" y="50" font-size="11" fill="#9ca3af">Today — showing 15-min intervals with peak limit overlay</text>

      <!-- Segmented time range -->
      <rect x="900" y="14" width="232" height="28" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
      <rect x="904" y="18" width="54" height="20" rx="4" fill="#1a5fff"/>
      <text x="931" y="32" font-size="10" font-weight="500" fill="white" text-anchor="middle">Today</text>
      <text x="993" y="32" font-size="10" fill="#6b7280" text-anchor="middle">Week</text>
      <text x="1063" y="32" font-size="10" fill="#6b7280" text-anchor="middle">Month</text>

      <!-- Y axis -->
      <text x="20" y="86" font-size="10" fill="#9ca3af">50kW</text>
      <text x="20" y="136" font-size="10" fill="#9ca3af">40kW</text>
      <text x="20" y="186" font-size="10" fill="#9ca3af">30kW</text>
      <text x="20" y="236" font-size="10" fill="#9ca3af">20kW</text>
      <text x="20" y="286" font-size="10" fill="#9ca3af">10kW</text>

      <!-- Grid lines -->
      <line x1="56" y1="82" x2="1132" y2="82" stroke="#f3f4f6" stroke-width="1"/>
      <line x1="56" y1="132" x2="1132" y2="132" stroke="#f3f4f6" stroke-width="1"/>
      <line x1="56" y1="182" x2="1132" y2="182" stroke="#f3f4f6" stroke-width="1"/>
      <line x1="56" y1="232" x2="1132" y2="232" stroke="#f3f4f6" stroke-width="1"/>
      <line x1="56" y1="282" x2="1132" y2="282" stroke="#f3f4f6" stroke-width="1"/>

      <!-- Peak limit line -->
      <line x1="56" y1="132" x2="1132" y2="132" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4"/>
      <rect x="1070" y="122" width="62" height="20" rx="4" fill="#fef2f2"/>
      <text x="1101" y="136" font-size="10" fill="#ef4444" text-anchor="middle">40 kW</text>

      <!-- Demand area chart (simplified as bars) -->
      <rect x="60" y="232" width="16" height="50" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="80" y="222" width="16" height="60" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="100" y="232" width="16" height="50" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="120" y="242" width="16" height="40" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="140" y="242" width="16" height="40" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="160" y="252" width="16" height="30" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="180" y="252" width="16" height="30" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="200" y="232" width="16" height="50" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="220" y="202" width="16" height="80" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="240" y="172" width="16" height="110" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="260" y="152" width="16" height="130" rx="1" fill="#3b82f6" opacity="0.6"/>
      <rect x="280" y="142" width="16" height="140" rx="1" fill="#f59e0b" opacity="0.8"/>
      <rect x="300" y="138" width="16" height="144" rx="1" fill="#f59e0b" opacity="0.8"/>
      <!-- Near/over limit -->
      <rect x="320" y="128" width="16" height="154" rx="1" fill="#ef4444" opacity="0.8"/>
      <rect x="340" y="132" width="16" height="150" rx="1" fill="#f59e0b" opacity="0.8"/>
      <rect x="360" y="142" width="16" height="140" rx="1" fill="#f59e0b" opacity="0.8"/>
      <rect x="380" y="162" width="16" height="120" rx="1" fill="#3b82f6" opacity="0.6"/>
      <!-- Current -->
      <rect x="400" y="168" width="16" height="114" rx="1" fill="#1a5fff"/>

      <!-- Battery discharge overlay (green bars below the blue) -->
      <rect x="280" y="142" width="16" height="20" rx="1" fill="#22c55e" opacity="0.5"/>
      <rect x="300" y="138" width="16" height="22" rx="1" fill="#22c55e" opacity="0.5"/>
      <rect x="320" y="128" width="16" height="30" rx="1" fill="#22c55e" opacity="0.5"/>
      <rect x="340" y="132" width="16" height="24" rx="1" fill="#22c55e" opacity="0.5"/>

      <!-- X axis -->
      <text x="60" y="302" font-size="9" fill="#9ca3af">00:00</text>
      <text x="160" y="302" font-size="9" fill="#9ca3af">03:00</text>
      <text x="260" y="302" font-size="9" fill="#9ca3af">06:00</text>
      <text x="360" y="302" font-size="9" fill="#9ca3af">09:00</text>
      <text x="400" y="302" font-size="9" fill="#1a5fff" font-weight="500">Now</text>

      <!-- Legend -->
      <rect x="600" y="294" width="8" height="8" rx="2" fill="#3b82f6"/>
      <text x="614" y="302" font-size="10" fill="#6b7280">Grid demand</text>
      <rect x="700" y="294" width="8" height="8" rx="2" fill="#22c55e"/>
      <text x="714" y="302" font-size="10" fill="#6b7280">Battery assist</text>
      <rect x="810" y="294" width="8" height="8" rx="2" fill="#ef4444"/>
      <text x="824" y="302" font-size="10" fill="#6b7280">Over limit</text>
    </g>

    <!-- PEAK EVENTS LOG -->
    <g id="Ant.Card.PeakEvents" transform="translate(24, 588)">
      <rect width="1152" height="230" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="20" y="32" font-size="14" font-weight="600" fill="#111827">Peak Events This Month</text>

      <rect x="0" y="48" width="1152" height="36" fill="#fafafa"/>
      <text x="20" y="71" font-size="11" fill="#9ca3af" font-weight="600">TIMESTAMP</text>
      <text x="200" y="71" font-size="11" fill="#9ca3af" font-weight="600">PEAK VALUE</text>
      <text x="340" y="71" font-size="11" fill="#9ca3af" font-weight="600">DURATION</text>
      <text x="480" y="71" font-size="11" fill="#9ca3af" font-weight="600">BATTERY RESPONSE</text>
      <text x="680" y="71" font-size="11" fill="#9ca3af" font-weight="600">RESULT</text>
      <text x="900" y="71" font-size="11" fill="#9ca3af" font-weight="600">PENALTY AVOIDED</text>

      <text x="20" y="108" font-size="12" fill="#111827">Mar 23, 09:15</text>
      <text x="200" y="108" font-size="12" font-weight="500" fill="#ef4444">41.2 kW</text>
      <text x="340" y="108" font-size="12" fill="#111827">4 min</text>
      <text x="480" y="108" font-size="12" fill="#22c55e">Discharged 2.8 kWh</text>
      <rect x="680" y="95" width="68" height="20" rx="10" fill="#def6e7"/>
      <text x="692" y="109" font-size="11" fill="#22c55e">Mitigated</text>
      <text x="900" y="108" font-size="12" font-weight="500" fill="#22c55e">€120</text>
      <rect x="0" y="120" width="1152" height="1" fill="#f3f4f6"/>

      <text x="20" y="148" font-size="12" fill="#111827">Mar 21, 17:42</text>
      <text x="200" y="148" font-size="12" font-weight="500" fill="#f59e0b">39.8 kW</text>
      <text x="340" y="148" font-size="12" fill="#111827">8 min</text>
      <text x="480" y="148" font-size="12" fill="#22c55e">Discharged 1.2 kWh</text>
      <rect x="680" y="135" width="68" height="20" rx="10" fill="#def6e7"/>
      <text x="692" y="149" font-size="11" fill="#22c55e">Mitigated</text>
      <text x="900" y="148" font-size="12" font-weight="500" fill="#22c55e">€120</text>
      <rect x="0" y="160" width="1152" height="1" fill="#f3f4f6"/>

      <text x="20" y="188" font-size="12" fill="#111827">Mar 18, 08:30</text>
      <text x="200" y="188" font-size="12" font-weight="500" fill="#ef4444">42.6 kW</text>
      <text x="340" y="188" font-size="12" fill="#111827">12 min</text>
      <text x="480" y="188" font-size="12" fill="#ef4444">Battery SoC too low (8%)</text>
      <rect x="680" y="175" width="56" height="20" rx="10" fill="#fef2f2"/>
      <text x="692" y="189" font-size="11" fill="#ef4444">Breach</text>
      <text x="900" y="188" font-size="12" font-weight="500" fill="#ef4444">€0</text>

      <!-- Summary -->
      <rect x="20" y="206" width="1112" height="1" fill="#e5e7eb"/>
      <text x="20" y="224" font-size="12" font-weight="500" fill="#111827">Total penalties avoided this month: €240  |  Breaches: 1  |  Success rate: 92%</text>
    </g>
  </g>
</svg>