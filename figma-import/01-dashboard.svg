<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <style>
      text { font-family: Inter, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Page Background -->
  <rect width="1440" height="900" fill="#f9fafb"/>

  <!-- ==================== SIDEBAR ==================== -->
  <g id="Ant.Layout.Sider">
    <rect width="240" height="900" fill="#fafafa"/>
    <rect x="239" width="1" height="900" fill="#e5e7eb"/>

    <!-- Logo -->
    <g id="Ant.Sider.Logo">
      <rect x="20" y="16" width="24" height="24" rx="6" fill="#1a5fff"/>
      <path d="M28 22l4 6h-8l4-6z" fill="white" opacity="0.9"/>
      <text x="52" y="33" font-size="15" font-weight="600" fill="#111827">OrbitEOS</text>
    </g>

    <!-- Divider -->
    <rect x="0" y="56" width="240" height="1" fill="#e5e7eb"/>

    <!-- Site Selector -->
    <g id="Ant.Select.SiteSelector">
      <rect x="12" y="68" width="216" height="36" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
      <text x="28" y="90" font-size="12" fill="#6b7280">De Groot Agri · Maasland</text>
      <path d="M212 83l4 5h-8l4-5z" fill="#9ca3af"/>
    </g>

    <!-- Menu -->
    <g id="Ant.Menu">
      <!-- Dashboard - Active -->
      <g id="Ant.Menu.Item.Dashboard.active">
        <rect x="12" y="120" width="216" height="36" rx="6" fill="#eaf5ff"/>
        <rect x="0" y="124" width="3" height="28" rx="1" fill="#1a5fff"/>
        <path d="M30 130h6v6h-6zM38 130h6v6h-6zM30 138h6v6h-6zM38 138h6v6h-6z" fill="#1a5fff" opacity="0.8"/>
        <text x="56" y="142" font-size="13" font-weight="500" fill="#1a5fff">Dashboard</text>
      </g>
      <!-- Energy Flow -->
      <g id="Ant.Menu.Item.EnergyFlow">
        <path d="M32 172l3 6 3-3 3 6" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="56" y="180" font-size="13" fill="#6b7280">Energy Flow</text>
      </g>
      <!-- Fleet -->
      <g id="Ant.Menu.Item.Fleet">
        <rect x="28" y="210" width="14" height="3" rx="1" fill="#6b7280" opacity="0.6"/>
        <rect x="28" y="215" width="14" height="3" rx="1" fill="#6b7280" opacity="0.8"/>
        <rect x="28" y="220" width="14" height="3" rx="1" fill="#6b7280"/>
        <text x="56" y="224" font-size="13" fill="#6b7280">Fleet</text>
      </g>
      <!-- Devices -->
      <g id="Ant.Menu.Item.Devices">
        <rect x="29" y="254" width="12" height="12" rx="2" stroke="#6b7280" stroke-width="1.5" fill="none"/>
        <circle cx="35" cy="260" r="2" fill="#6b7280"/>
        <text x="56" y="268" font-size="13" fill="#6b7280">Devices</text>
      </g>
      <!-- Alerts -->
      <g id="Ant.Menu.Item.Alerts">
        <path d="M35 296c-4 0-6 3-6 5h12c0-2-2-5-6-5z M31 302h8" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="56" y="312" font-size="13" fill="#6b7280">Alerts</text>
      </g>
      <!-- Marketplace -->
      <g id="Ant.Menu.Item.Marketplace">
        <path d="M30 344v8h10v-8M28 344h14" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <text x="56" y="356" font-size="13" fill="#6b7280">Marketplace</text>
      </g>
      <!-- Configuration -->
      <g id="Ant.Menu.Item.Configuration">
        <circle cx="35" cy="394" r="5" stroke="#6b7280" stroke-width="1.5" fill="none"/>
        <circle cx="35" cy="394" r="2" fill="#6b7280"/>
        <text x="56" y="400" font-size="13" fill="#6b7280">Configuration</text>
      </g>
    </g>

    <!-- Bottom Divider -->
    <rect x="0" y="840" width="240" height="1" fill="#e5e7eb"/>

    <!-- User Avatar -->
    <g id="Ant.Avatar.User">
      <circle cx="36" cy="872" r="16" fill="#e5e7eb"/>
      <circle cx="36" cy="868" r="5" fill="#9ca3af"/>
      <path d="M24 884c0-6 5-10 12-10s12 4 12 10" fill="#9ca3af"/>
      <text x="60" y="870" font-size="13" font-weight="500" fill="#111827">Deepak S.</text>
      <text x="60" y="885" font-size="11" fill="#9ca3af">Admin</text>
    </g>
  </g>

  <!-- ==================== HEADER ==================== -->
  <g id="Ant.Layout.Header">
    <rect x="240" y="0" width="1200" height="56" fill="white"/>
    <rect x="240" y="55" width="1200" height="1" fill="#e5e7eb"/>

    <!-- Breadcrumb -->
    <text x="264" y="24" font-size="13" fill="#9ca3af">Sites /</text>
    <text x="312" y="24" font-size="13" font-weight="500" fill="#111827">Dashboard</text>
    <text x="264" y="42" font-size="11" fill="#9ca3af">De Groot Agri · Updated 2 min ago</text>

    <!-- Bell Button -->
    <g id="Ant.Button.Icon.Bell">
      <rect x="1220" y="12" width="32" height="32" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
      <path d="M1236 22c-3 0-5 2.5-5 4.5h10c0-2-2-4.5-5-4.5z M1233 27.5h6" stroke="#6b7280" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="1241" cy="20" r="3" fill="#ef4444"/>
      <text x="1240" y="22" font-size="7" fill="white" text-anchor="middle" font-weight="600">2</text>
    </g>

    <!-- Add Site Button -->
    <g id="Ant.Button.Primary.AddSite">
      <rect x="1302" y="12" width="114" height="32" rx="6" fill="#1a5fff"/>
      <text x="1359" y="33" font-size="13" font-weight="500" fill="white" text-anchor="middle">+ Add Site</text>
    </g>
  </g>

  <!-- ==================== CONTENT ==================== -->
  <g id="Ant.Layout.Content" transform="translate(240, 56)">
    <rect width="1200" height="844" fill="#f9fafb"/>

    <!-- Section Title -->
    <text x="24" y="40" font-size="16" font-weight="600" fill="#111827">Today's Overview</text>

    <!-- ====== STAT CARDS ====== -->
    <!-- Total Generation -->
    <g id="Ant.Card.Statistic.totalGen">
      <rect x="24" y="60" width="272" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <rect x="24" y="60" width="4" height="100" rx="0" fill="#22c55e"/>
      <rect x="24" y="60" width="4" height="4" fill="#22c55e"/>
      <text x="40" y="82" font-size="11" fill="#9ca3af">Total Generation</text>
      <text x="40" y="115" font-size="28" font-weight="600" fill="#111827">342</text>
      <text x="94" y="115" font-size="13" fill="#9ca3af">kWh</text>
      <text x="40" y="140" font-size="12" font-weight="500" fill="#22c55e">↑ +12% vs yesterday</text>
    </g>

    <!-- Grid Import -->
    <g id="Ant.Card.Statistic.gridImport">
      <rect x="312" y="60" width="272" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <rect x="312" y="60" width="4" height="100" fill="#3b82f6"/>
      <text x="328" y="82" font-size="11" fill="#9ca3af">Grid Import</text>
      <text x="328" y="115" font-size="28" font-weight="600" fill="#111827">28</text>
      <text x="364" y="115" font-size="13" fill="#9ca3af">kWh</text>
      <text x="328" y="140" font-size="12" font-weight="500" fill="#3b82f6">↓ -8% vs yesterday</text>
    </g>

    <!-- Battery SoC -->
    <g id="Ant.Card.Statistic.batterySoc">
      <rect x="600" y="60" width="272" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <rect x="600" y="60" width="4" height="100" fill="#8b5cf6"/>
      <text x="616" y="82" font-size="11" fill="#9ca3af">Battery SoC</text>
      <text x="616" y="115" font-size="28" font-weight="600" fill="#111827">87</text>
      <text x="656" y="115" font-size="13" fill="#9ca3af">%</text>
      <text x="616" y="140" font-size="12" font-weight="500" fill="#8b5cf6">↑ +5% vs yesterday</text>
    </g>

    <!-- Cost Saved -->
    <g id="Ant.Card.Statistic.costSaved">
      <rect x="888" y="60" width="272" height="100" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <rect x="888" y="60" width="4" height="100" fill="#f59e0b"/>
      <text x="904" y="82" font-size="11" fill="#9ca3af">Cost Saved</text>
      <text x="904" y="115" font-size="28" font-weight="600" fill="#111827">€ 41</text>
      <text x="904" y="140" font-size="12" font-weight="500" fill="#f59e0b">↑ +€9 vs yesterday</text>
    </g>

    <!-- ====== ENERGY CHART ====== -->
    <g id="Ant.Card.EnergyChart">
      <rect x="24" y="176" width="740" height="272" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="44" y="200" font-size="14" font-weight="600" fill="#111827">Energy Flow — Today</text>

      <!-- Chart baseline -->
      <rect x="60" y="400" width="680" height="1" fill="#f3f4f6"/>

      <!-- Bars -->
      <rect x="85" y="384" width="32" height="16" rx="2" fill="#22c55e" opacity="0.85"/>
      <text x="101" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">00h</text>

      <rect x="170" y="388" width="32" height="12" rx="2" fill="#22c55e" opacity="0.85"/>
      <text x="186" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">03h</text>

      <rect x="255" y="390" width="32" height="10" rx="2" fill="#22c55e" opacity="0.85"/>
      <text x="271" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">06h</text>

      <rect x="340" y="364" width="32" height="36" rx="2" fill="#22c55e" opacity="0.85"/>
      <text x="356" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">09h</text>

      <rect x="425" y="296" width="32" height="104" rx="2" fill="#22c55e"/>
      <text x="441" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">12h</text>

      <rect x="510" y="264" width="32" height="136" rx="2" fill="#22c55e"/>
      <text x="526" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">15h</text>

      <rect x="595" y="310" width="32" height="90" rx="2" fill="#22c55e" opacity="0.9"/>
      <text x="611" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">18h</text>

      <rect x="680" y="380" width="32" height="20" rx="2" fill="#22c55e" opacity="0.85"/>
      <text x="696" y="412" font-size="10" fill="#9ca3af" text-anchor="middle">21h</text>
    </g>

    <!-- ====== ENERGY MIX ====== -->
    <g id="Ant.Card.EnergyMix">
      <rect x="780" y="176" width="396" height="272" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="800" y="200" font-size="14" font-weight="600" fill="#111827">Energy Mix</text>

      <!-- Donut Chart -->
      <circle cx="880" cy="330" r="55" fill="none" stroke="#f3f4f6" stroke-width="20"/>
      <!-- Solar 72% = 259.2 deg -->
      <circle cx="880" cy="330" r="55" fill="none" stroke="#22c55e" stroke-width="20"
              stroke-dasharray="226 345" stroke-dashoffset="0" transform="rotate(-90 880 330)"/>
      <!-- Battery 20% = 72 deg -->
      <circle cx="880" cy="330" r="55" fill="none" stroke="#3b82f6" stroke-width="20"
              stroke-dasharray="62.8 345" stroke-dashoffset="-226" transform="rotate(-90 880 330)"/>
      <!-- Grid 8% = 28.8 deg -->
      <circle cx="880" cy="330" r="55" fill="none" stroke="#f59e0b" stroke-width="20"
              stroke-dasharray="25.1 345" stroke-dashoffset="-288.8" transform="rotate(-90 880 330)"/>

      <!-- Center text -->
      <text x="880" y="326" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">342</text>
      <text x="880" y="344" font-size="11" fill="#9ca3af" text-anchor="middle">kWh</text>

      <!-- Legend -->
      <rect x="980" y="290" width="10" height="10" rx="2" fill="#22c55e"/>
      <text x="996" y="300" font-size="12" fill="#6b7280">Solar PV 72%</text>

      <rect x="980" y="316" width="10" height="10" rx="2" fill="#3b82f6"/>
      <text x="996" y="326" font-size="12" fill="#6b7280">Battery 20%</text>

      <rect x="980" y="342" width="10" height="10" rx="2" fill="#f59e0b"/>
      <text x="996" y="352" font-size="12" fill="#6b7280">Grid 8%</text>
    </g>

    <!-- ====== DEVICE CONTROL ====== -->
    <g id="Ant.Card.DeviceControl">
      <rect x="24" y="464" width="548" height="340" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="44" y="488" font-size="14" font-weight="600" fill="#111827">Device Control</text>

      <!-- Row 1: PV Inverter -->
      <g id="Ant.Table.Row.PV">
        <circle cx="44" cy="527" r="4" fill="#22c55e"/>
        <text x="60" y="522" font-size="13" font-weight="500" fill="#111827">PV Inverter SMA 10kW</text>
        <rect x="60" y="530" width="50" height="18" rx="9" fill="#def6e7"/>
        <text x="68" y="543" font-size="11" fill="#22c55e">Online</text>
        <text x="500" y="530" font-size="13" font-weight="500" fill="#111827" text-anchor="end">8.4 kW</text>
        <rect x="24" y="555" width="548" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Row 2: BESS -->
      <g id="Ant.Table.Row.BESS">
        <circle cx="44" cy="579" r="4" fill="#3b82f6"/>
        <text x="60" y="574" font-size="13" font-weight="500" fill="#111827">BESS BYD 20 kWh</text>
        <rect x="60" y="582" width="62" height="18" rx="9" fill="#e2ecfe"/>
        <text x="68" y="595" font-size="11" fill="#3b82f6">Charging</text>
        <text x="500" y="582" font-size="13" font-weight="500" fill="#111827" text-anchor="end">87% SoC</text>
        <rect x="24" y="607" width="548" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Row 3: EV Charger -->
      <g id="Ant.Table.Row.EV">
        <circle cx="44" cy="631" r="4" fill="#22c55e"/>
        <text x="60" y="626" font-size="13" font-weight="500" fill="#111827">EV Charger OCPP 2.0</text>
        <rect x="60" y="634" width="50" height="18" rx="9" fill="#def6e7"/>
        <text x="68" y="647" font-size="11" fill="#22c55e">Active</text>
        <text x="500" y="634" font-size="13" font-weight="500" fill="#111827" text-anchor="end">11 kW</text>
        <rect x="24" y="659" width="548" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Row 4: DSMR -->
      <g id="Ant.Table.Row.DSMR">
        <circle cx="44" cy="683" r="4" fill="#22c55e"/>
        <text x="60" y="678" font-size="13" font-weight="500" fill="#111827">DSMR P1 Smart Meter</text>
        <rect x="60" y="686" width="50" height="18" rx="9" fill="#def6e7"/>
        <text x="68" y="699" font-size="11" fill="#22c55e">Online</text>
        <text x="500" y="686" font-size="13" font-weight="500" fill="#111827" text-anchor="end">1.2 kW</text>
        <rect x="24" y="711" width="548" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Row 5: Modbus -->
      <g id="Ant.Table.Row.Modbus">
        <circle cx="44" cy="735" r="4" fill="#d1d5db"/>
        <text x="60" y="730" font-size="13" font-weight="500" fill="#111827">Modbus RTU Controller</text>
        <rect x="60" y="738" width="56" height="18" rx="9" fill="#f0f1f3"/>
        <text x="68" y="751" font-size="11" fill="#9ca3af">Standby</text>
        <text x="500" y="738" font-size="13" font-weight="500" fill="#111827" text-anchor="end">—</text>
        <rect x="24" y="763" width="548" height="1" fill="#f3f4f6"/>
      </g>
    </g>

    <!-- ====== ACTIVE ALERTS ====== -->
    <g id="Ant.Card.ActiveAlerts">
      <rect x="588" y="464" width="588" height="340" rx="8" fill="white" stroke="#f3f4f6" stroke-width="1"/>
      <text x="608" y="488" font-size="14" font-weight="600" fill="#111827">Active Alerts</text>

      <!-- Critical Tag -->
      <g id="Ant.Tag.criticalCount">
        <rect x="718" y="474" width="72" height="20" rx="10" fill="#fde3e3"/>
        <text x="730" y="488" font-size="11" fill="#ef4444">3 Critical</text>
      </g>

      <!-- Alert 1 -->
      <g id="Ant.List.AlertItem.1">
        <rect x="588" y="504" width="4" height="52" fill="#ef4444"/>
        <text x="608" y="525" font-size="13" font-weight="500" fill="#111827">Grid overload risk detected</text>
        <text x="1100" y="525" font-size="11" fill="#9ca3af" text-anchor="end">2 min ago</text>
        <rect x="588" y="555" width="588" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Alert 2 -->
      <g id="Ant.List.AlertItem.2">
        <rect x="588" y="556" width="4" height="52" fill="#f59e0b"/>
        <text x="608" y="577" font-size="13" font-weight="500" fill="#111827">Battery SoC below threshold</text>
        <text x="1100" y="577" font-size="11" fill="#9ca3af" text-anchor="end">18 min ago</text>
        <rect x="588" y="607" width="588" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Alert 3 -->
      <g id="Ant.List.AlertItem.3">
        <rect x="588" y="608" width="4" height="52" fill="#f59e0b"/>
        <text x="608" y="629" font-size="13" font-weight="500" fill="#111827">OCPP charger offline (EVCP-03)</text>
        <text x="1100" y="629" font-size="11" fill="#9ca3af" text-anchor="end">1h ago</text>
        <rect x="588" y="659" width="588" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Alert 4 -->
      <g id="Ant.List.AlertItem.4">
        <rect x="588" y="660" width="4" height="52" fill="#3b82f6"/>
        <text x="608" y="681" font-size="13" font-weight="500" fill="#111827">P1 meter sync restored</text>
        <text x="1100" y="681" font-size="11" fill="#9ca3af" text-anchor="end">2h ago</text>
        <rect x="588" y="711" width="588" height="1" fill="#f3f4f6"/>
      </g>

      <!-- Alert 5 -->
      <g id="Ant.List.AlertItem.5">
        <rect x="588" y="712" width="4" height="52" fill="#22c55e"/>
        <text x="608" y="733" font-size="13" font-weight="500" fill="#111827">Forecast accuracy: 94.2%</text>
        <text x="1100" y="733" font-size="11" fill="#9ca3af" text-anchor="end">6h ago</text>
        <rect x="588" y="763" width="588" height="1" fill="#f3f4f6"/>
      </g>
    </g>
  </g>
</svg>